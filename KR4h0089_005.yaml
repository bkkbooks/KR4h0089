body:
  text: 元音遺響卷五元胡布撰五言律詩隱居十首擾擾自不靜營營誰肯休能閒非俗客入道鮮時流浩氣乾坤塞髙風海嶽秋由來超世士自古在林丘其二安貧宜有素處世欲無言拘束尊名教煩憂念庶蕃衣冠符道氣學行表儒門試與論消息流觀萬化原其三劉向青藜杖林宗折角巾山川古莽國人物葛天民息比穹林鳥游如活水鱗桃源人世上此處是通津其四坦夷敦朴素淡泊得閒情長日惟端坐窮年遂養生摶風鵬翮起望月兔胎成倘有夸毗意毋勞勸耦耕其五行輕便草屨卧暖愛苑廬克己成儒行教人看道書雲行天浩蕩春盎物舒徐彼此無殊致元元得自如其六否獨當危行幽貞謝衆紛見人如顧敵入獸不驚羣風雨隨琴操星辰緯劒文囂囂塵世事漸覺耳無聞其七農桑千里接雨露四時調河海流通貫山川氣泬寥梅花詩滿壁柏葉酒盈瓢莫怪踰垣去衣冠未可要其八不復趨人利方將恤我仁閒應腴道味懶得任天真溪水淨堪浴皋蘭香可紉翛然成獨樂靜定瑩心神其九即水窮源滙探丸見括囊綱常人道立匡廓世維張凡翳淘虛晃天和貫混茫昔年縈抱意胸宇淨毫芒其十習靜宜塵想觀心息動機名言根體用至道徹淵微美利乾能事休傾否弗違永言貞遁吉兹理有攸歸閒居十首功利誣前志耕蠶息此鄉年華忙裏迫日晷靜中長山水窮雙屐風雲富八荒憑將千古意長嘯暮天蒼其二得法餐蓬虆無根養昔邪培金初長礦種玉早成葩顔色青精飯肌膚白乳花但能存靜默㑹自結丹砂其三野水通花徑回流䕃果園游鳬如葉縣飛鶴自雷門澤世勳名晚居閒道義尊此身同草木何有答乾坤其四溪山鄰勝迹樓觀接中台銀漢流雲散金天霽月來不言均四序何德備三才自得天然趣幽懷萬古開其五柴扉芳草遍桂障小山幽月白吹簫夜天空倚杖秋乾坤塵漠漠江海思悠悠只合將琴劒移家住沃洲其六助胃多烹术輕身久茹芝昌陽根益夀雲母粉充饑靈液滋金骨瓊漿潄玉池乘風何所待莊列淡無為其七斗室寬天下虛中抱至仁應酬能中節物我總熙春海嶽增雄觀浮休寄眇身不須矜白眼已是出紅塵其八遺珠探象罔煮土識長生脈望仙經得驚精玉釜烹士惟崇至德道不貴虛名自有清明在非求外物成其九天葩開罨畫地籟鼓雲和夕嶂兼空淨秋江得月多黃金髙武辨白屋守文魔俎豆尋常禮當時講幾何其十釀秫方充酒樵林始足薪入山無利路負郭有閒人碧笈清都籍黃圖太古民秖應雲作伴慣得鶴隨身遷居雜興十首野艇隨流水長天際落霞江湖塵外靜穹壤望中賒石鼎翻茶縠陶樽泛菊花飽諳山澤僻耕種在雲涯其二岸閣紫雲深山扉緑栁隂水風醒醉眼溪月洗塵心天道從消長人寰遞古今平生知此意不復計升沈其三桃竹緣臯堞柳蘿蝕澗梁栁坰金散縷梅甸玉飄香生殖山中富豪華世上狂那知垂釣者心事付滄浪其四種藥宜巖竇澆畦有桔橰中山移縹李度索擬蟠桃春色郊原迥朝光海岱髙眼前今古興流覽意滔滔其五花重錦圍亭山環綺疊屏茶香清鶴夢琴弄託鴻冥東渚遙空碧南雲隔望青憑髙一披豁步月返嵓扃其六髙士下瑶軿清風坐野亭澄懷虛北海飲量隘南溟磊石種魚法乘軒相鶴經未能垂朽腐且共養羶腥其七山翁黃獨酒羽客紫霞杯刻竹題詩罷開軒待月來群英鍾嶽秀華藻發天才昨夜星芒動文光炯上台其八虛懷無一事端坐息浮埃萬化由心出羣靈假氣來鳶飛觀感察龍卧識胚胎昨夜山頭雨還經地底雷其九逝水惜流年深山樂靜便煙霞如有待風月浩無邊混沌遺形外鴻濛象帝先無端羲畫出萬古泄幽𤣥其十衣食寄樵漁山樊任卷舒無知同培塿有象表籧篨運化天為轂成形地作輿明窗塵倣佛一擬託清虛先民二首先民敦朴素末俗事驕奢重義多貧士為仁少富家綱常吾不忝漁獵爾何誇德惡符冥感昭昭理有涯又韜光誠自愛守默更誰禁老幻匡時願貧辜博施心鼓刀無夙望叩角有遺音亦欲資章甫羞將短髮簪題竹溪書屋為永嘉李華逺賦一泓通巨海千幹掣連鰲劒古金秋徑堂空璧月髙紅牙籖舊帙宫錦奪新袍經史鄴侯富元非詩酒豪寶劒篇釁子經歐冶望氣入豐城池雄朝已化匣雌夜屢驚琫玉交花萼刃血掩星明掛墓猶將信負背恐難憑詠石仇車方誤中神鞭驚血流人化懸知節羊變或難求蘚潤珠含露蘿碧月生秋方向君平問當念宋人留所居二首江靜銀河接雲銷玉宇空門當五栁曲身在百花中寶瑟紅樓近仙槎碧海通自全樗櫟質不是傲英雄又逸志惟求靜棲身不寄譁謳歌同野老鼓吹聽池蛙雲氣連遙樹江光散落霞無因樹勳業亦是託生涯採桑女妾苦蠶無食郎自袖懷金向非照膽鏡對面不窺心妾若愛黃金詎肯事籠筐黃金多人有君妻不採桑秋夜即事碧樹生秋思澄江散晚隂中天雲色靜萬户月華深栁甸環煙寺花樓出翠岑因循逺塵垢何必計山林莫摘蓮花葉莫摘蓮花葉摘葉子不肥莫採泥中藕弱蒂幸牽絲摘蓮傷嫩刺採藕罥輕泥泥深妾沒足刺痛妾愁眉寄展邦雄大隱猶蒙垢狂夫乃呌閽諸侯初按節天子久臨軒圖畫刁𤣥僞朝廷李勉尊十年江海客何以補乾坤止海濱去亂豈辭難寧親缺問安窮河知地逺望海覺天寬客久通吳語童昏揖漢官十年家國願未擬尚盤桓村居三首魯酒盈缸熟江花過眼新主家貧好客稚子笑迎人井邑三農稔河山四望春故鄉明月在依舊隔兵塵其二元亮猶耽菊儀休恥茹葵宦情孤劒在國難大臣知自顧同涇渭非關泣路岐五雲天日表拭淚望京師其三碧草迷荒壘春桑藹近郊驚烏棲擇木客燕去辭巢禮有朝廷舊貧多市井交苦無簪笏願不纍子雲嘲題張氏珍藏倪雲林小景蘿月當溪屋松雲繞石亭瑟空閒玉柱劒古滅金星望氣覘三曜開襟極八溟白鵝承逺寄翌日寫黃庭雙桐生空井翠葉承華露銀床拂徑枝泉將季月竭根分沃土滋具實留丹鳯汲古縆朱絲時春還照影鸞交湛碧漪故居燕燕燕復燕燕冷去炎來見認取舊時巢識得新人面懸知廷火灾不是悲紅線得食勿喃喃新人保深眷坐雨二首碧落羣峰外衡門五栁邉頑雲猶障水麗日欲經天問俗增愁苦論兵憶嵗年如何王猛計寂寞祖生鞭又落葉初飄瓦流風故亂簾山虛雲抱石樹闊雨交簷已分黃雞社方膺赤雀占平生千古意牢落著書淹有所傳北闕皇風振東宫寶厯登雖殘周太廟足倚漢中興德在仁無敵恩先勇莫矜好符堯舜治星象泰階徴曉坐一夜雨聲盡繞溪流水深停鸞依竹實眠鶴戀松隂煮石供真賞看雲契道心那堪小窗靜相對斗華岑答何伯度寄畫竹自分得清曠秋空山月髙坐閲滄洲客玉鈎金錯刀風枝調鳯羽雲葉展龍綃待取侵天日連竿掣六鰲偶題水落見魚梁秋空數雁行浮烟欺弱草古木耐殘陽緑蟻金壺滿花苔玉劒長誰能戀幽賞相對鬢毛蒼巫山髙倣佛巫山髙雲雨陽臺曲妖鬼惑襄王夸辭耽宋玉風髙碧巒靜林逺浮烟緑月出秋冥冥喧聲夜猿續題雲山便面為官仲肅賦紫氣通函谷滄波接潁隂留雲三畝宅棹月五湖心楚鳯歌猶寡齊牛歎已深因君持此曲江海覔知音有道寫寄叔夏隱士有道應知命無求足養和少憂聞禮晚貧恥受恩多尤怨乖名義因循致亂訛周公頻入夢搔首意如何淡湖熊氏幽居二首柏葉三秋嫩松隂六月涼斷橋通水氣虛牖納天光鮮鱠銀絲滑香粳玉頴長過庭詩禮在何意問巖廊又鶴帳虛山館溫坡接野亭丹楓圍錦幛雪嶺出銀屏謾倚將軍樹還瞻處士星飛騰好才力早晚破滄溟奉寄宋季仲溫不見宋髙士頓亡書法竒風雲洞筋腕金鐵起蛟螭吝字詩尤簡逃名世愈知若君躬履踐豈後古人為客懷四首踰月留花縣山寒晝不暄如何嗔眼暗秖是覺天昏玉飯魚羮美銀酥鱉炙繁歸心似流水百匝繞家園其二岸岸栽桑梓村村足稻粱近山民病虎入郭吏如商作客非懷土思親故望鄉近途羸馬在猶得涉氷霜其三獨客懷親夜髙堂憶别時久隂妨去路一月後歸期望日青天逺看雲白雁遲平生家國願百折氣扶衰其四山雪明殘夜江雲薄曉隂寒莎輕緑淨凍葉亂紅深論是潛夫癖瓢煩靜者心從來泉石趣何待此投簪答宋倬不為相思苦情知會面艱别從兵後數見似夢中看抱璞非留滯衝霄好羽翰為農亦暫爾豈得久泥蟠贈别天台柯山人山人拂素手擊劍動剛風忽與行雲滅流歌繞太空天橫銀漢白日爛海門紅望望苑龍逺星橋落綵虹琴朱絲結緑綺流水將髙山抑節金徽裡飄響碧雲間曲調古今異音聲理亂關急管繁弦出枯桐合久閒贈别山石英海客抱竒璞自言山石英清心事知已奴僕待公卿笑盡一壺酒將為萬里行知君未豹變穢濁且潛名草緑草知人意聨隂傍石闌霜根秋不死劒葉夏生寒亂稼非同莠無香愧似蘭皇天生植意推分故相安春曉即事栁重金盈縷梅緘玉滿枝早雲將鳯鬛斜月帶蛾眉人坐熙春裏山開太古時衡門倚泉石相過有佳期大垂手翠袖雲初卷金蓮步欲欹雪纖回鳯態酒暈暖蛾眉逐吹微淹氣臨箏誤拂絲金谷休教晚春風惜少時小垂手寶叉輕按節犀筯半諧聲腰斜低舞燕喉趂小春鶯杏粉塗黃潤桃臉畫眉清若弄參差玉疑降許飛璚上清道士方方壺為表叔冲虛天師作五圖皆龍虎名勝庚戌過自山中表叔冲虛公命賦詩南山秋色太古有蒼玉翬飛凌素秋一從開混沌元氣相和流乾象耀圓景坤儀迹方周至哉歸有道尺素竭冥搜噅玉垂綸至人撫𤣥運神功冥化機豈於得魚意遂以忘筌為天闊山空處水流雲定時際此心手契物我了無疑髙風振衣萬壑灑朝瞑連山漲雄圖𤣥風鼓大漠天籟緣空虛引我碧瑶玦因之紫霞裾飄然極八表游心觀太初臨坡髙興坡仙滑稽流壺子江海氣爰以一寸毫邈此百年意攜鱸寄雅興夢鶴亦竒思慷慨展新圖髙情見形似湘水斗壇瀟湘好雲水流月豔藂篁掃石仰碧落乾文星斗章一彈龍唇琴再拂虎盤囊鶴唳泠風至飛步躡三光還山居作汲澗引滄浪看山詠鳯凰河圖雄地紀雲錦絢天章牧豎淹齊相耰夫隱楚狂寥寥春草裏誰識禹餘糧晚坐聞陳山人歌溪樹晚隂合水亭涼氣多殘霞遙海色曲沼逼天河華髮青冥士商音白石歌為君一洗耳三掬入溟波晚歸别柯陳善野服稱朱顔松溪看藥還披襟延皓月闢户納青山道在何論隱時危不厭閒惟應將隻履送客入秦關白雲舍二首誤按古詩原編髫齓失慈訓所依仰椿齡游方忍盤娛惻惻吾在經晨發陟遙岑東瞻際滄溟浮雲莽鄉園千里餘空青又慨此念親舍興恨涕交零死者吾弗逮生者無歸寧躑躅向周道終朝耿余情何當逐飛雲舒卷還柴荆􅎵瀡奉父志攀號過母塋餘生慰存沒庶用諧天經江上曉懷曙拂千峯斂秋澄萬木隂亂紅銷日上淨碧染江深紂世歸山意秦年蹈海心鍾期久淪落何許辨徽音送饒彥材太原省親思親西望日為國北征心見子先家問懷鄉記土音一門敦孝誼萬里竭忠忱早使清區宇聨鑣返故林挽黃先生壯節文聲舊危時隱德優子賢方祿養志大忽天游司馬書猶在延陵劒不收佳城將短些勒石表貞丘題梨花枝上黃鸝語恰恰金調羽盈盈玉拂枝青樓傷曉夢碧樹感秋時舌巧含風潤花清照日遲章臺多彈射莫作後歸期挽辛伯初哀哀辛處士吾淚盡江東里閈藥緣在朋儕交誼窮時乖家有子道屈世無功安寢兵戈裏幾人棺槨同題畫二首老樹生秋氣遙山切暝隂天空銀漢曉月黑草堂深園綺終難致巢由或可尋黑頭家國願未愜畫圖心又草昧風雲起空濛宇宙分窮山周水澤無地著人羣落落擎天幹霏霏障日氛九疑千古淚不是弔湘君城山閣詩危閣憑孤堞虛窗納萬山曉紅銷掛鏡秋緑淨飛鬟作吏攜書往寧親待祿還南陽好孫子家慶老逾閒春曉虹梁棲弱燕翠栁度新鶯旭日千門曉春花萬樹明望雲心更切居美道彌貞試待舒蒼翮翾飛四海清春日即事栁暗掖垣深春濃小院隂啼梟空啄屋困雀不驚林發土看雄劍拘幽被雅琴澄清當日事憤悱此時心偶題四首寄張隱士耕鑿此山中年深鄙俚通詩成教稚子酒熟勸鄰翁霽月金沙白流霞玉洞紅人情兼物理不是偶然同其二門跨猗蘭徑亭臨太乙池荷香侵盞斚竹氣淨簾帷虛湛根無極塵勞息有為達生窮夢幻蕉鹿已深期其三白首淹雄略清心問大還露華滋紺髮丹髓駐紅顔長䇿憂天下虛名避世間德公遺意在乘興鹿門山其四泠風生玉樹膏露潤芝田斧劚雲根术瓢探石竇泉浮寰光載地𤣥象近瞻天中有髙明士端居體自然示從遊虛無為道體剛健本乾行竅妙光中合心花靜裏明化機由一氣𤣥感合三清寄語無鞅衆斯言廣度生倪雲林小畫并自題因次韻道舊尚友松陵舊方舟遡泖流雲林邀劒履丹壑閟藏修葉縣曽飛舄函關或駕牛惟餘毫素在清興滿滄洲答逸虛道者靜定忘形體光芒運化工去來呼吸裏出入有無中抱一寧非子乘虛不待風東華旌道要與我此言同武當練山人謂余隱居有仙氣徴詩因感四首草樹青連野溪潭白映空林風琴自韻軒月酒誰同北海襟懷裏東山氣宇中飛飛寥廓意心事託冥鴻其二投閒唯養浩觀化欲凌虛許侍中仙骨陶山相隱居匡維虛碧落中正奠黃輿試坐苑齊裏春風席晏如其三六著黃眉老三參碧眼師分風縮地脈鍊石補天維夕弄紫泥海朝餐金幹芝鳯麟洲上路邀我折璚枝其四朱鳥三秋見氷蠶九夏涼文犀裁卧簟紫錦織奚囊秉簡陳安世傳言郭密香五千言外意應不在文章濯足圖為吳良材作按古詩原誤編靈均滄浪清杜老八荒意千古有竒懷滔滔東流水長風鼓松籟磐石淨如洗望眼際寥天南圖息千里野老野老無餘事陶瓶有宿糧花開籬下賞酒熟甕邉嘗覆屋黃苑暖搖風緑樹涼魚羮飽飯後濯足望滄浪囊空二首中和貧亦達莊敬行方成天地氣同順蠻夷化必行固窮安義命有道自亨貞金玉身中物歸求已富盈又性迂耽已學計拙背人情道大富千古心髙貧一生坦夷培曠達恬淡朂清明迹我熙春域家珍禁大成挽李五松先生題里承髙義華旌慘禮魂詩書遺傳舍賔友散龍門仙李仁風逺靈椿世澤繁唯餘五松樹掛劒表孤墳元音遺響卷五
