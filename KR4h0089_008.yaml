body:
  text: 元音遺響卷八元胡布撰五言聨句下山與諸公宿丘愚宅偕劉二紹聨句佳友接良覯名山愜幽期方欣樽俎異紹少息登頓危樓宇豁秋杪布星河淡清輝遙旻度寒吹紹爽氣浸棟衣公幹懷古歡布延陵企遐思朗吟黃鶴篇紹倒瀉金屈巵浩有萬古意布而舒千載悲飛觴竟華筵紹妙舞弦朱絲咸籍抱異材布過庭美蘭芝汝南負重器紹雅量涵澄陂不辭清夜間布但惜白日馳各厲鴻鵠志紹毋矜兒女私艱虞方薦臻布哀樂本相持有遺事兼濟紹藴真諒惟時申章朂前修布篤誼敦明規令終在黽俯紹久要謝瑕疵尚顧離别懷矢言金石辭布七言聨句中秋後三日偕表兄劉紹由上藍經龍塘尋訪普彥清隱居于資福之麓留宿聨句晨霏淡沱雨毿毿紹首路聨鑣過上藍布遙嶂白雲生木末紹美人秋水望江南布子真舊谷時難覔紹康樂名山性所耽布湖海盍簪樽酒夕紹幾人相共寫憂惔布再聨韻三首柬彥清知已支離江海鬢毛毿布為愛丘樊隱蔚藍紹茒屋石田孤嶼外布竹林莎徑一溪南紹渭莘雄業何能致布箕潁間情好共耽紹顧我艱難安出處布感君交誼共憂惔紹其二烏帽西風兩鬢毿逺尋髙隱叩精藍布山騰玉氣風雲表地插金精象緯南紹蓋世勳名情愈薄居間耕釣老逾耽布遊從剩有東林興已覺羈心散內惔紹其三落落喬松翠羽毿沄沄溪脈淨于藍紹秋風鴻雁來天外野艇鸕鷀繞舍南布從古飯牛知寧戚于今呼鸖有盧耽紹相逢何幸居林下悶世愔愔適自惔布彥清次韻碧山涼樹甫毿毿秋入澄溪水似藍彈鋏不無居稷下摛文何有賦江南東山屐齒尋常補北海樽醪夙昔耽枉沐髙軒連璧至草堂今夕釋憂惔回途有懷彥清知已聨句四首涉江歸路采芙蓉悵望佳人莫我從紹髙樹絶涼紅葉暗逺山秋淨白雲封布冥冥寥廓翔威鳯湛湛淵􅔿隱蟄龍紹此意祇應陶令解東籬千古企孤蹤布其二馬頭飛雨濕征衫來到幽居思不凡布一榻卧雲茒屋靜五松環徑古苔緘紹青精老去同誰飯黃獨肥時祇自劖布乘興不嫌來往數重攜琴鶴度秋岩紹其三江鄉雲物淡秋容布靜者幽居得過從紹三徑鞠存髙士節布千齡松恥大夫封紹名髙日下知鳴鶴布道隱隆中憶卧龍紹自慰鄙懷欣逺覿布孰能肥遁慕遐蹤紹其四西風涼氣透輕衫紹馬上看山自不凡布半嶺夕陽鴻雁度紹一川秋色水雲緘布靈芝為約髙人賦紹琥珀還從野老劖布終古為霖期大澤紹旁求何必問商巖布次聨句韻三首柬彥清知已嘯軒暨劉二紹表兄并述已志空山松柏翠交毿上拂寥天氣蔚藍閩嶠金城通表裏軍峰砥柱障東南風雲夢老三生石龍虎丹成十月耽猶向塵勞歎淹泊秖應和樂滌歊惔重陽後一日偕表兄劉二紹過饒季和宅留飲聨句蒹葭零露曉瀼瀼紹酒熟山中訪草堂布芳宴夙承酬令節紹菊花今已過重陽布雕盤白雪翻魚鱠紹玉碗清風飲蔗漿布自信朱陳風俗美紹酣歌千古意難忘布四言清綏黃孝子詩豫童時聞鄉里黃一真尋母事又見鄉先生頌之以文章詩長罹于艱去亂一紀涉歷北南知父母兄弟妻子之暌違于兵也天下之廣有甚焉者嗚呼國家一有不幸忠臣孝子出矣忠孝之在天地猶金鐵之在火百鍊而不為所移非貞剛堅挺之質不足當之天常之所攸宜非異能也季世淪惑徴諸矜譽悲夫己亥嵗黃諸孫古愚求詩入帙豫獨感壬辰以來天下之為人子者不愧黃一真幾希乃追為之詩曰民彜自天理亂義存蹈危何靦死無傷恩惟皇建國一視同仁革宋踐阼兵下南藩俘掠不道擴靖中原曰黃氏母奔亂愛身道逺息薄客三十春兒大知禮痛母不還發廣大願緇衣髠顔越歷海甸走達荆蠻渚宫襄郢如跬步間孝感天致大義昭貫歘下汝州知母所安子見母喜母念子難彛倫世表骨肉天完佛力道心克踰孔艱迎致千里生養死全旌門渠渠兵後巋然曰豫生晚後數十年目逆頌文耳流事傳何意丁危迹踐憂患聖訓昭昭服膺拳拳寸心二者百感紛干再歌屺岵翹企首山得不愧怍天下孰先春蘭其芳寒菊其鮮猗黃母子尚薦九泉南風歌至德交孚生物暢茂以洽萬民愠解財阜賡歌責難卿雲象德鼚軒鼓舞俊乂在側授受休光仁被八表前王聖哲後世夢杳白雲謡昔觴瑶池八駿躨躨惟皇夀穀以冀後來思豫東歸和洽羣黎去不復野山川儼而駑駘雄雄御䇿天飛八駿云逝顧所望非送鴻墩流目寥青八風揚揚揮弦心逺去翼天長蹇豫沖曠寓不稽方培塿何知情淡坐忘一周俯仰萬象駢羅文光吞啖日月蕩摩首川浩浩壅決洪波九萬一息不盈噓呵道卷體藏曰嬰山樊恬養取適維昧所安六合謭隘塵芥寬間行雲悠悠援琴載彈六言律詩走筆賦六言二首萬里慈親塞外三秋倦客天涯鴻溝白日塵滿龍闕青雲路賖父老悲風錦樹將軍古血銅花十年戰骨秋草一枕漁樵嵗華其二江海情親鶴氅風塵淚灑龍淵西憶庭闈雲下北望長安日邉射䇿金門有願勒勛銅柱何年半生忠孝未遂浩志淹留豈然元音遺響卷八
