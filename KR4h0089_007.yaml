body:
  text: 元音遺響卷七元胡布撰五言絶句子夜變歌十首劈碎短竹笻誰能居山峰峰生山中央磊磈刺心胸其二打殺雙鴛鴦催死到白頭白頭不肯飛守分合當休其三相思如江水東流不向西東流有回轉相思見歸時其四春蠶掛門口抱絲到莊前鏡昏不見面施朱紅可憐其五儂愛芙蓉花如何拔花根花乾綴枝蒂老死守紅痕其六出門無所道尋龜卦憂惱見龜猶自可無龜當奈何其七蒲是無心蒲藕是荷根蒂蒲花見散亂蓮子結心苦其八汲井不能乾井深望瓶還雖是轆轤轉手繩見泉難其九船自當風信失怨浪顛傾牽絲繩大柁竿長難支撑其十愛歡人共道遇歡夢暫見心是九疑山腸作車輪轉墨菊彭澤歸來後緇塵㸃鬢絲烏紗漉酒罷掛在菊花枝曉望憑虛御旦氣曠望當髙臺水白將天去雲紅挾日來把釣八十鼓刀翁風雲渭水逢三千六百釣一釣取齊封自君之出矣四首自君之出矣鸞鏡黯無光不嫌紅粉汚持底試新粧其二自君之出矣不是怨空閨勳庸久未立封章那可齊其三君勞王事日妾事舅姑心别離千萬年恩情生死深其四憶别翻成夢愁寒預寄衣穿衣見妾面得信似君歸夢中作拂拭紫霞裾騰身白玉京天空雲氣冷夜半露華生雪夜作羽帳梨雲白虛窗霽雪明正當長夜裏只道日光生聞并州旱江水解牽愁愁心百折流憑將無限淚灑雨向并州七言絶句山中雜興十首山如奔馬水遊龍獵獵雲霞錦綺重一覽九州明望眼天髙日朗豁心胸其二壯心登涉不辭危俯愛熙和遂物私忽漫青雲生步履便從西北補天維其三登山有屐水乘舟匹馬籃輿任遠遊磊磈滿懷艱步履只堪青眼睇浮休其四歸來江上鼓雲和曲罷泠風振珮珂惆悵無人將逸操鏡天秋淨月明多其五坐深清興滿林塘老樹隂濃比屋涼自足一巵澆磊磈茒齊髙枕到羲皇其六髙天鴻雁翼秋清海宇紅雲去路明傳語鯤鵬今幾息南圖空闊豈無情其七銀漢浮楂八月寒河源清淺共誰看鑿空攜石歸來後從此天機不得安其八澄清真欲剪鯨鯢壯氣威稜力未疲更竭五湖翻四海大蘇枯槁洗瘡痍其九求田問舍拙謀為百事無營足養頥賴有清明方寸地靜如秋肅動春熙其十朗朗心田物我同相忘塵世與山中浮雲淨掃秋無際璧月光華徹太空遊仙詩十首眇軀天地寄蜉蝣囊括虛丸位斗牛流目紫霞三萬里泠風一息廣寒遊其二松花久服羽毛輕鶴上璚簫弄月明拂拭紫宫磨鏡石中天端坐待河清其三濟隂園客事蠶桑草實充飢五色香怪得繅絲繭如甕織成星斗滿衣裳其四天髙地下杳難攀欲詰皇人溟涬間仙境清虛塵世濁深仁何事棄浮寰其五竦身徐步達清都下視茫茫歷劫汚欲倒天瓢澆九域人寰合返古初無其六霓旌閃閃絳臺微緩引空歌啓玉扉𤣥鹿脯延千歲夀氷蠶絲織六銖衣其七遙遙閶闔緑金門路近璚林玉氣溫北望鳯巢雲萬頃拂天珠樹倚崑崙其八錦段囊琴憶楚明瑶箏幾曲受飛璚八風從律諧宫徴廣樂鈞天九奏成其九蒼龍天矯迎黃帝白鶴飄颻道紫皇自得金精和五氣便將呼吸納三光其十玉貌長年浩養頥金風午夜透簾帷太虛一氣恢無象元始非豫却認誰奉寄二兄兄奉慈闈傍楚山弟勤王命客閩關人生忠孝行天下千里渾如跬步間夢中作雲裾縹眇躡飛霞路入玉京仙子家瑶階長日碧䦨靜一陳狂風掃落花虬鬚客羣雄圖䜟已多門餘子無過將相尊不入長安經卦肆白騾依舊向中原明皇吹笛圖緑玉昭華别有名自從吹曲戰塵生三郎曽灑伊州淚凝碧池頭弔海青絶句二首蘆荻花殘豆葉黃秋風八月雁南翔年年墜露漙枯木老樹何心耐九霜又碧波千里漾浮漚畫槳驚飛入亂流莫漫水村煙霧裏虞羅多在釣磯頭久隂江南冬暖不知寒長把晴雲帶雨看如今纍月愁隂合轉盼青天白日難發淡湖鶴林輕霧散餘寒翠竹交隂不礙冠十里曉風花作陳亂飛梅雪擁征鞍劉紹宅題芭蕉碧玉盈盈翠袖寒月明秋影盼青鸞雲緘不展芳心嫩怨向西風泣露團再刻竹二首玉鸞雙引綵雲中劒羽泠泠灑碧空一曲昭華明月裏飛璚無力任秋風又翡翠啼煙亂晚青斜穿璧月過瑶屏雙成九弄玲瓏玉同躡金苞紫鳯翎有贈三珠樹底紫鸞笙九弄參差玉譜成青鳥不來明月冷六銖衣薄怯秋清月夜鳯山笛聲月光如水寫秋空長笛悲來萬里風不是山髙去天近那因吹入五雲中得陳堯咨胡璉書知故交存殁悵然賦此三千里外書能到五六年間事已非今日徒將天下淚倚天傾作萬珠璣答孫行簡見寄二首自分青萍閟紫芒誰論鐵筆厲秋霜銀箏不是彈明月悶向空山泣鳯凰又時來軒冕可能逃君有長才信所遭莫遣蒲輪恐山客山中松桂訝旌旄題畫自從贏得五湖身白眼江干笑問津只道五湖風浪惡狂流更有濟川人返棹圖歸來江上有扁舟相伴閒身狎白鷗棹向江東訪徐庶無端談笑取公侯蒼松圖緑竹如雲草閣寒門前流水五湖寬長松自挺山林氣莫作當年柱石看有感雲林遙隔鹿門山長路囂塵倦往還自信龎公逺城府不因名姓在人間題畫二首華髮歸來著素冠碧山秋興楚天寬自從閒却風雲手江漢經綸理釣竿又緑水青山草澤春悠悠舟楫寄閒身五湖淪落無知已畫裏鴟夷識故人丙辰十月初五日發龍江羈人得遣如承檄日暮登舟似到家烏鵲定傳天外喜慈闈今夜占燈花畫馬當時造父為誰容變幻風雲有類從一自穆王窮轍跡天間何處覔真龍墨菊陶潛宅是右軍家移得秋芳共嵗華金質曉凝煙霧重東籬爛漫墨池花紅梅半酣姑射臉烘桃玉笛風清絳雪髙買得鮫綃重著色猩猩血染赤霜袍題二牧死節卷柏君夀疊子初國士從容盡節秋二公忠倡起遐陬三山明月清漳水一樣丹𠂻萬古流天鵝斷岸蘆花撲浪腥一雙棲泊向長汀鶱飛未欲凌霄漢豈傍蓬蒿畏海青富春垂釣圖軒冕泥塗本異名論交一宿去天庭十年老我江湖夢祇向圖中覔客星題畫江上琴聲水面風空山流響振霜鍾平生心手南薰曲鼓向潛淵起蟄龍牛自牧畫竹寄馮宗泰求題蒼鸞七葉紫金苞露冷葳蕤憶舊巢分得一枝來嶰谷掣鰲竿上化龍梢方壺畫竹寄周知州太守題封金瀣沆壺仙折寄玉琳琅鳯翎幾葉瀟湘露留作髙軒九夏涼送聶尚文赴選衛國諸孫國士風九苞華采麗蒼穹都將久蟄林泉志散作為霖澤物功題方壺半窗風雨竹折得琅玕幾葉青泠風入手翠濤輕金苞不展湘蕤露灑向秋窗作雨聲題方壺畫江雲渭樹寄黃子雍壺子殷勤畫裏詩寄來工部慰相思都將魏闕風雲意散作湖江汗漫期送黃伯章應辟潁川遺德懋諸孫廊廟璠璵白玉溫此去挾書千萬乘好將忠孝繼賢門陳本初應辟昭代才華出頖宫元龍豪氣拂秋空致君堯舜須儒術好建良臣濟世功棲雀圖二首章臺羅綺錦成團花栁繁隂有彈丸何似空山荆棘裏春風穩借一枝安又跳出穠芳萬錦團暫棲榛棘避金丸上林無限間關者不似山樊夢寐安次韻孫作大雅思歸四絶各述已志學得條桑種薄田竹溪茒屋鳯山前青雲長得三珠樹碧落飛來一道泉其二浩蕩乾坤寄此身苞蘆蝦菜戀江村自從天爵拘名節只合經書遺子孫其三老去虛心將徑竹饑來返哺愛慈鴉忠貞孝友無消息惆悵南天白日斜其四壯髮飄蕭四十踰羈艱何意問陶漁為屠白額除民患每掣金鰲備饌厨次韻倪雲林自題竹石小畫筆底天章逈不羣寫生羞說李將軍空林著得林貞魄笑殺師雄媚縞裙題風煙雪月梅四首翠羽聲殘夢覺時昭華玉琯曉參差璚林昨夜春寒淺貌得梨雲不受吹其二羅浮仙子黯香魂筆底陽和水墨痕多事縞衣蒙玉質三千弱水又黃昏其三玉屑盈盈玉瓣低陽烏東上醉如泥寫真好似楊生手璚樹千秋翠羽啼其四瑶葩萬樹俯清江宵魄寒回玉笛腔不是金波吹瀲灧肯分清影到書窗題宋好古橫披竹鳯翎蕭瑟吐寒芒碧玉分隂剪剪香試啓橫窗看月色清風天籟起瀟湘題錢舜舉折枝桃五陵春色巧胚胎桃李家山取次開不惜月中攀桂手寫他長者折枝來漫興四首石林環抱白雲村曲沼潛通活水源莫訝山中富葩藻春風萬彚藹蓬門其二家住雲林結翠微故交寥落過門稀滄江夜色樵漁罷水月虛明送客歸其三學得鴟夷世外遊雲濤天壤寄安流五陵書劒隨行李頭白江湖一釣舟其四江海風塵瞇壯圖故山生計在樵蘇年來金土皆同價辭賦雖工肯賣無題出山便面琴劒西遊幾日還秋風匹馬度江關石門松籟休回顧不為蒼生不出山蕭翼賺蘭亭圖唐皇智取誠何在蕭翼諛成計已深傳笑畫圖因玩物君臣千古戒欺心昱方畫寄無盡無盡轉贈逺峰逺峰求題昱方佳製寄傳翁持比璚瑶貺逺峰不是無言一轉語風雲毫素起蛟龍三友雙雀圖三友自矜霜雪操雙禽穩借嵗寒枝鶱飛未欲當隂慘共待陽和布物私九龍圖三首陽九亨貞德正中蘇枯澤物瑞年豐祇應毫素圖神器不遣風雲訝葉公其二寰宇無塵海不波忽然隂慘出羣魔漁民損物成何事周處雄才世上多其三天池潛躍久無聞用九非時豈有羣似是筆端千古意摩挲老眼識風雲題畫冉冉行雲翳太空竟無霖雨作年豐毒龍不挽天河水徒使蒼生怨化工雨後泛舟有作二首隂霾亘日黯愁寒深藉狂風為掃殘此夕月涼蘭棹穩寥天雲氣共誰看又雲消四裔淨無塵忽漫青天萬彚新驟雨狂風不知處五湖明月屬閒人松谷詩好從巖穴養貞姿大厦傾頽豈易支此去化龍蟠后土千秋西北障天維元音遺響卷七
