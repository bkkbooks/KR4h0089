body:
  text: 元音遺響總集類提要臣等謹案元音遺響十卷前八卷為胡布詩又名崆洞樵音後二卷則張達劉紹詩也三人蓋元之遺老而他書未有敘述及之者故其出處莫詳今即詩中考之則紹為布姻家曾入汝南王幕布與紹詩序稱俱客閩帥不遂所志蓋元末皆嘗參謀軍事者布又有詩云我時瘴癘使分迹南荒最又云自我使島夷銜命出蠻障是布復嘗奉使海外矣又布有入理問所作及丙辰嵗獄中元夕詩注云先生以髙蹈有忤時政被謫又丙辰十月初五發龍江詩云羈人得遣如承檄日暮登舟似到家丙辰為洪武九年是必明初徵之不屈被囚既而得釋者也至其近聞自從諸詩中有想見霓旌擁行在之句當在順帝北狩後所作故國故君之思拳拳不置志有可憫其他格調亦皆髙古不失漢魏遺音乃自來選元明詩者多不能舉其姓氏此本不知誰何輯録亦可謂僅而獲存者矣布字子申達字秀充皆旴江人紹字子憲黎川人也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ba870da2a19793025221a611266c2590d5b3a93cecc41f78b6cb0a16ccaffd76
