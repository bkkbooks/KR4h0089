body:
  text: 元音遺響巻四元胡布撰行類長劒行男兒當作萬夫豪俯拾青紫如鴻毛時来擁篲横區宇剖决浮雲凌九霄蘇秦昔時貧賤阨掉三寸舌相六國位髙金多歸故鄉入門妻嫂皆下堂一家勢利尚如此路上行人誰家子丈夫恥作児女悲燕雀焉知鴻鵠志酒酣憤歌歌激烈雙眼窺天唾地裂便從東海批龍鱗更向南山探虎穴寧能寂寂雞鶩羣微與螻蟻爭紛紜金盤六博快一擲采取將相圗麒麟不然凌風事逺舉南招羨門拉松子汎覽清氣乗隂陽周流無極御八荒君子行奉寄𤣥瑋張先生饑從猛虎食渴酌天池泉天池清且逺猛虎食恒鮮莫以松柏貞不樹桃與李莫以蒭蕘賤鄙言不入耳慷慨求衣食直道偏荆杞有異春華榮不同秋霜死古之英雄人豈得處疑似滿歌行蚤嵗逢危迨長百罹從軍苦樂遐路險巇途窮涉逺海飢蛟毒鰐聲參差眇體寄波上驚憂百折殆不能奮飛中道混異流不為貧賤移原生拙貨殖陶子常苦飢陽山猛虎夾路啼參辰錯莫夜無期夜無期殷憂填胸誰當我知入山蹈海思懐自安獨善之事奚益於遺黎願見海清泰階平睿哲握機寰宇享毁珠與玉寳善人以致平成周道如砥直如矢萬方熈熈登春臺塊獨與天為徒共安畊鑿誠快哉擬得牆欲髙行乾大包物地無疆海不擇流源深長廣庭倚力柱梁一醜百惡圓鑿枘方漢卿毁齒楚臣蹈江九重囘眀豈捄亡願君如天宏畢照擬日光擬當事君行處貴不矜下徳由尊不及卑此直難同彼枉衆楚咻一齊美惡但聞譽譏譽譏君見宜一誠俟事萬機樸忠信不欺反當欲遊南山行日月不同經山海且周移理亂相踰越萬世若通逵文武帝天下獨夫見陵夷周公三吐哺天下相同歸大聖不獨斷衆人盡所私股肱信善善賢愚類不違各有王佐才趨向審所之反當車已駕行具薄酒冀敷厚情主賔合徳絲管停聲起舞奉萬夀樂獻答千齡勿愧暫驩宴期念長合并君子有所思行嚴駕出燕冀引領東都門曽臺鱗雕甍繡柱擎飛軒八節考鐘皷列筵鼎食尊歌舞徴齊趙粉黛不給繁泰安棄兵甲搆艱十一存尚倚仁洽久宗祀幸未湮匪直戒滿盈諒由觀化原豈惟堯舜治歴年遂不泯真儒可乏術横天肆流奔衛翼藉康哲圗迴獨煩陳端念勞居逸積思盡厥臣百職監繇𨽻宴安豈禍根迴天自有經興復歸本元將告衆多士服徳以昭愆江南行吴姬白苧衫撥櫂唱江南江花鬭繁錦江水漾新藍吴児雙雙歌竹枝弄篙濺水不成泥風過楊花吹不起鴛鴦相間白鷗飛别有紅樓花的的鮫結綵囊信抛擲十二方釵隔畫簾鵶黄螺翠春無力小儂新挽北人頭壓鬢雲鸞吐月鈎别按中州去聲韻繁弦度曲和輕謳北客過從經北里南船買賣来南市囘頭不顧買笑金過眼何曽羨公子為君醉為若歌不為兔絲依女蘿但願一顰還一笑見骨金鐶無用照傷歌行百川逝水絶還流夸父逐日不囘頭秋風鴻雁春風燕河東織女西牽牛湘君見竹還見淚逺人歸来石當起汨羅濯徳君可迴憂天未崩杞人死黄河奔流接太行終不難行道里長有窮之君雙斷臂難返九日駐頽光神仙可憑藥可久不見秦皇并漢武放歌行宿雲流隂度城闕城頭烏啼城上月胡笳歇拍羌笛哀穹廬將軍淚成血匣劒星文光欲動羅帷青燈明復滅空將夢裏見先皇曽是軍中識英傑伊昔青㝠奮鵰鶚鶱飛百萬翔寥廓而今白眼泣麒麟啁啾鳥雀追風塵風塵隂隂暗河縣經過行人問征戰還將漢北裂帛紅囘向遼東帶書箭箭飛翎折鏃斷金馬死沙塲春草深不見征塵掩骸骨朝朝暮暮隴雲隂西當太白環荆楚北斬樓蘭叱降虜黄鬚鮮卑應夢来白面終童棄繻去可憐功業歸偏將道傍枕藉成丘壤九衢呵從何紛紜列屋珠貂不相讓别有南陽開甲第轉日回天擅經濟意氣由来縛虎雄縦横烏事屠龍計屠龍縛虎技難憑續弦煎膠竒自矜自謂亞夫知劇孟過從易水問荆卿國難欲除恥欲雪督亢圗窮匕不發將軍不惜將軍頭侠客空成汗漫遊猛虎行蒲稗傷禾黍潢潦汚道路渴吸潢潦水蒲稗行且茹食而充中復煦煦子既云可孰不豫謂我南山有蒻蒲昔為展席潔可敷底春土腴石乃滋推枝布葉何離離願同子坐欎棲裂葉鑱根啖而嬉實我飢潔子綏謂如不可潔孰云美且都謂如不可潔孰云棄禮謨蒻蒲可食子奚不懌誰不自憐謂我子識煌煌京洛行獨處傷鰥盛室妬妍位道無規飾過多怨魯連恥帝千金何顧豫讓不死伏橋有俟天下雲従夷齊竟去加冠于屨義所弗處荆卿攘袂燕得國士將軍授首謂死王事叔孫之起兩生毅然且聖且賢不昧我天極量恢恢遺風泰基市門茍留梅生長之皇業宏仁暢越八表我寧一枝無所感妙得主隳仇良足於留極人臣貴登神仙遊墻上難為趨行東方曈曈星晳晳鵲飛門前梧樹集啓我荆扉視遥見逺人以晨征客從東西南北來息疲馬結綬拂長纓請客上堂出屈巵自言空村但餔糜客辭别家年及期九州豺虎夾道啼豪賢在路不擇噬月黒水白汨深泥曠野無人居雨雪何霏霏狐兔在地走機羅空設施麏䴥成羣飲人脂獸走啖不及逺道行人往往不能馳蒿萊蔽目生黄雀飛去暮未棲虎大見雀駭見雀去山樹雀遺弊虎皮虎視空睥睨白日禽獸爭馳突人羣呵禦至日没日没復縦横人各不保生路難行棘與荆何能逺游逐利名拂客面上塵爬搔蟣與蝨食我餔糜居我山水窟飲泉力耕種山樊寥寥夀安逸客今憂思父與兄何不拔劍邀徒旅斫草驅狐兔彎弓月張抨豺虎黄雀麏䴥不足數父母妻子得相見乃不此身隔異縣慊慊心意闗莫以此言淚如霰孤兒行兒無父母尚在家貧不自保身寄他鄉罹患害父母生兒時貴兒貴是男屬當休明時親朋来盍簪陳禮羅酒漿衎衎譽言談長且八九尺仁厚豐令顔羣下若屏氣威容不可干父母樂安逸家事所擯斥百萬上留田買花度年日強奴事慈父利我所貨殖資財竟蕩盡兒大無家室父母貧又老咨嗟何所道父逺兒不歸良時委芳草豈無鄉里思人情多是非豈無鄉里人貌好心不知兒父天一隅寒温莫候期道路日悠逺行人去且遲拔劍出門去恥作兒女啼四顧多悲風浮雲掠天飛熊羆號前虎嘯後怒髮指天汗流頤兒命一何辜蒼蒼當為誰兒有寸心天若為憐時羿前驅奡後乗烏獲奔車魯陽駐景列仙縮地軒轅出令保合骨肉遺民全命稷契皋陶允平庶政大道無為民法不競下逮萬世休光猗盛黄鵠行黄鵠早寡哀思故雄無何怨尤義命允終君家有髙樓雕楹繡柱錦盤龍綺羅疊裀褥金錯豔重重儂居茅盖屋長夜卧如弓志尚不相謀寸心遂難同君家椎肥牛飲醇酒歌鐘歴亂彈箏擊缶儂登北山采薇茹芝潔若氷雪強神注頥自非口體人安事相追隨豈茍富貴慕豈易貧賤去所長泉下恥所短寰中苦大義不乖違死生誠何事儂是一婦人欲愧天下士對酒行我有一片心寥落萬古愁今晨對美酒浩蕩付東流我昔探穴求虎子西登芒碭候雲氣皷刀之人理釣竿南山牛歌長夜起少年激烈負壯圗自當天下竒丈夫直欲乗風破巨浪入海攫取驪龍珠英英湛盧劒玉琫青珊瑚久不得剸犀象斬猰㺄星文繡澁霜花枯幽隂汚土豈足掩神王寳氣貫斗干天樞時来天地賭一擲握柄身先萬夫敵大人虎變非擬量肯為竪子迴容色肆中虬髯生撫刃強調笑流目視河山餘子等末照一目飛龍人君先我同調豈無昂蔵凌九霄以爾席巻歸包茅雙龍偃蹇不並駕鳯凰鵰鶚各有巢舉觴酣歌酹萬古悲風蕭條為我起九日不可迴青天古人心事長已矣長已矣不復来千秋一知已餘子將相才棄瓢老翁好襟懐寥寥乃見富春臺風雲圗畫出東海百代碌碌徒喧豗我御泠風振髙節上追數子相超越皷翼九萬登鴻蒙浩與大塊同噫咽括囊元氣於巻舒槖籥六合天為徒踸踔行朝亦恒苦飢暮亦恒苦飢山中好薇蕨猛虎向人啼我行茫茫安所之白日無光天昏翳隂風慘如西北起執手河梁上我無舟檝子不得共濟還顧途路間塵沙被肌體牛奔同馬走毛冷縮如蝟道里在咫尺難行不可止三百六十日㡬日如夢裏相逢行世路多岐曲岐曲達長安妍醜紛相逐輪蹄交其間去者不憚逺来人或悲酸榮辱理有常孰能籌萬端維昔尚聲勢捷逕所攀援事君本無誠功烈侈宏觀利禄及妻子奴𨽻肆餘驩孜孜狥一已僥倖涉國難尺長有丈展寸否千憂煩陽揜隂為惡暴白詎可殫姦私深自恤汗簡乃欺謾矯首東都門歴歴銜怨訕脩天以要人未必淪異患物誠事不忤清源無濁瀾相逢岐曲人欲竟此長歎鞠歌行魚目哂明珠鰕䱉笑龍蟄三獻何貽刖足羞荆山萬玉為之泣仲尼大聖人削迹於魯衛蔡澤狀嵌枯詭譎致相位賈生不必恥絳灌漢廷羽翼藉園綺時命有同然逸民猶任使盜跖之惡已横天令終康裕登遐年顔囘竟夭折亞聖何能冀自全化工無私循至理善善惡惡如流水達道貴自然梟獍非倫擬艶歌行杏梁初月上桂障晚香團並照花羞面聨芳氣拂蘭流鸎慚曲度舞燕比腰寛買笑千金易知音一顧難瑶琴聲乍轉嬌歌興已䦨含笑俱傾意託語尚羞顔藕絲裙帶合竹葉酒杯殘的的帷中燭灼灼腕上環情如斷金石恩有重丘山誠願垂燭光多幸保環圓引類鹽梅引甘以酸為和味以鹹為主傷鹽喉哽咽過梅心悽楚調適貴得中心手天為度間髮不容私吹毛亦兼與神功佐四運翼徳懋公輔璇璣典寛衡日月光合宇仁和扇恵風膏澤均時雨惟天予我心惟正儀我矩一夫曰飢寒由已使無所皋䕫有玉燭永言佩斯語雲龍引芒碭秋空見羽毛龍光雲氣與天髙五湖何處無明月斫竹南山坐釣鼇思歸引春行倦長路赫日逼隆暑肅殺每傷神嚴威雪交雨怫欎念鄉邑剛風起郊墅衣錦夜行遊將何辨文縷非無逐日足豺狼正旁午欲假圗南翼䲭梟列行伍儼儼五雲表玉闕開金户天黒不見人妖狐友虓虎饞扠與惡嚼遥目無逆覩延頸望所思龜山蔽東魯樊籠傷局促缿筩嗟幽聚皎如萬璣珵信美在異土焚籠斬世網駕雲返吾宇曲類入塞曲入塞常在先出戰常在前骨不委沙塲貌不上凌煙死逐百戰塵生全萬死身不封李飛將餓殺真將軍鬼雄與人傑生死答君恩出塞曲被甲二十年全軀萬矢中腥風凌白刃人死我成功受降論百萬俘馘過西東窴顔石復刻烏丸壘亦空振武揚兵氣宣徳暢皇風金鞭行擊節八面凱歌同天子臨軒陛剖符登美封簪花上林苑醉酒明光宫再拜奉萬年太平歌治隆所願全民命不敢計勲庸懐仙曲矯首寥天見黄鶴雲翎翩翩入青廓金泉百沸湧丹砂九靈老人烹紫霞霓結斾旌星軫駕逸虚之宫五光夜待予鵠立𤣥黄中一激清風洗天下磨刀曲二首恨不早有生目逆夷齊清恨不能丹青貌取魯連形持此恥天下誰為天下英其二莫作青銅鏡照面不照心常恐日月光覆盆難俯臨願君憑龍背直見海底深大道曲鳥鼠不足登鼎爼羅網不能致龍虎所以曠達人甘心託卑汚乘田委吏豈足數聖人當之安所主潔世隕天全傷清非律度堯舜百代事規規有常程夷齊以義去後代死沽名伊尹三往來效者失其誠老耼伏柱史切切避虚聲子房全去就去就魯連輕欲食當思耕欲衣樹蠶桑逞舌畫雄畧假仁仁義亡鯤鵬鎩翮蔽三光鷦鷯深處一枝蔵竹花結實鳯凰至卿雲五采明朝陽經天緯地論賢聖王喬矯手畧不聽呼吸元氣御日月天地有窮道難盡巻者不復舒志尚焉可並萬世迭更變億兆各順令烏棲曲四首宜城春酒鬱金黄樓上屠蘇百和香同心寳帶合歡結烏棲樹頭拜明月其二錦幔遥屏輝五采烏棲月出薫香藹此時氣息兩相憐含嬌弄態不能前其三感郎言誓為郎憶魚為比目鳥比翼烏啼月落東曙開俱飛魚鳥約重来其四疊股釵横金鳯凰連環佩結玉鴛鴦啼烏啞啞楚天曙金玉容華逐郎去五言雜體輕舉篇弱齡秉清戒齊心學上騰羨門教服术偓佺引拾璚鍊氣常通液補腦急還精歴紀校功滿一舉得身輕寳駕乗流電珠履躡繁星憑虚倚閶闔肆遊寓紫京木精友方朔日華驗廣成靈桃豔芝囿璚蘂粲椒庭樹剝玉文棗枝懸金脊藤黄眉覽六著青瞳指五城徒侣皆仙氣服御盡長生俯見泰山小坐待黄河清率土不足顧六合豈難并始異塵愚境進卑世俗情古思去年征小月今嵗入雲中書去春鶯後夢歸秋鴈空瑤筝折繁柱翠被掩重籠裁衣猶想體臨粧羞照容妾豈懐私意君亮裏精忠但惜芳年邁未建列侯功君行當䇿勲妾行當預封驄馬驅十五學劒器偏騎生馬駒二十斬樓蘭輕身西射胡虵弓彎月影鳥陳布星圗響碧鳴珂玉生紅滴汗珠自矜毫髮義寧憚萬金軀身當國難死名恥衆人俱必使清區㝢垂勲竹帛書槐虚魄初凝始公位屢徴今兔目經時淺鼠耳訝春深炕枝承麗日斂柯條纂林曲曲朱闌靜葉業緑雲隂首冬若服實長生諒可任排難烈士有名累不恥貧賤時聖哲畏匡宋蒙莊且授譏柰何改故容猶得辨妍嗤達道乃自順異服尚云非豈伊賢聖姿抗力虎狼威而况當季世冉冉輕薄為矯首謝岐路斯文不在兹公孫伏威隱居北山移象設東壁耿奎光累葉曽題里髙門表署鄉河山鍾地脈雲漢儼天章臺似嚴灘曲門當潁水陽紫霞虚亂棟翠蘚蝕飛梁石磴縁平陸煙樓接上方林泉韜紱冕經濟眷巖廊冠豈秦鶚歎歌猶楚鳯狂士矜才不世天鑒徳惟良奉和鄭編脩本解難二首聖主中興日神功佐運年卿雲開華嶽王氣障幽燕望闕河山近瞻天日月懸九成來鳯鳥八表淨狼煙跋扈將軍死通明宰相賢可無慚漢節喜復戴堯天其二帝力歌垂拱民思樂治平百靈方效順萬㝢欲銷兵衛翼金湯固陶甄玉燭明皇畿歸大統天眷及羣生九鼎終神器三光體國衡寸心雲漢表决眥望宸京慶夀堂詩為鮑别駕徳和賦靈椿湛異卉華屋仰垂眉履仁敦孝友積善保耆頥鳩盤南極杖玉賜偓佺枝綵服八龍被秋花五桂時白光延素牖繁翠結瑶芝風生交玉佩塵起拂蘭衣十年不去亂百口幸無遺生全處泰道居安眷洪私化理神堯治山川箕潁違詎忘瞻穆穆于以樂怡怡賞靜軒詩為張廣文奎賦幽棲安僻地泉石友芳襟倚景覽時秀虚扃延賞音躧君游郭履眄彼北山岑水華籠月沼竹屋韻風琴葉落驚孤鶴花動起鳴禽論感潛夫癖瓢累許由心觸此後留憩俛世詎遺簮友竹軒詩為戴尚質作遺簮二十載閒居眷朋儔感念負竒節虚心事交游廣庭風雨外青燈几案頭賴子相容與以遂慰清秋既此歎長夜復盼空樽愁將子共貞操永竟百年謀同聶鏞茂宣王行止仲袁養福能伯宴劉别駕勝彦清宅得青字上客佳時集衡門緹騎停鏗金披艶藻鳴玉振芳庭麟卣歸肴核鸞觴浮醁醽花明雜樹錦山翠鳯凰翎覽景念時聚薦芳惟徳馨酣歌退落日緩帶倚春屏主奉以百年賔酬願千齡詎知今日懐明時在丹青忽然有喜作寄張叔亨國仰朝廷大民瞻日月明百年均徳澤萬嵗樂昇平期運彌天久輿圗倚地并㳙埃蜂蠆毒謬戾虎龍爭玉闕當宵旰金甌識姓名民多屠伯虐臣有智囊傾貢楚包茅入封齊錫爵榮東宫嚴事育北斗運璣衡將帥承新澤謳歌返舊京小臣無以報獻賦頌河清陳迹渡江清秋暮乗槎碧海通何意抱熏心方嗟委爨桐驚坐無陳子掃門還魏公目眩牂牁馬心折衡陽鴻客以韎任賤我惟天眷崇臣職守銅墨衆口蹇豪雄拔羽久危鶴佐王非夢熊劒舄駢羅貴禘祫包茅空叨恩眷東候擊壤意南風雖同熠燿照尚想昔邪重宿吴興𤣥妙觀𤣥圃邀遐賞方外息塵機丹書寳真字隂洞紀靈辭脈望從經得𤣥鶴自天飛鳥下窺魚餌花落罥蛛絲流雲懸度影蕩水不成漪綵石綴珠露翠草偃金芝玩芳思寄迹逐異遽乖時吏隱懐梅福冲素緬安期欲結超然志方眷二儀私同牛諒士良董在彦志王欽守敬莘野叔耕莫士安惟恭朱武仲桓徐賁以文何恒得常宿馬庸敬常舟中時禁酤次早偕九君子為馮信祖母執紼得逐字懐宴喜留袪揭厲不成曲掞思麗霄漢緬斚想醽醁客留廣練被榻共侏儒宿環篆盤螭暖咽漏銅龍促坐披庾亮月佩韻元昆玉風靜餘春逺星發流雲逐嵐氣蕩鮮颷鏡水摩空緑舟停鷗許訝夜渴波還掬摛藻鏘瑶豔列綺光華燭尚懐同驥附終以愧貂續竹軒詩為王簿欽賦三逕伐經屢七賢游足夸樓似黄州見詩多衛武奢風裏琴聲韻月時秋氣華翠梁封蘚色玉榦蝕蘿花刻桷文初直代瓦火將斜來鳯猶鳴節掩貍終委沙客至長薄煙飛翠芳堞雨零珠跬步愁泥滑荒城况道紆歌裏来波艦架上亂風書所思驚夢想攜手尚揶揄嵇眼將青共阮淚及漣如語盜猶懐已之闗詎委繻感義金非貴待價玉還沽有虎方如勇見龍當遂圗夏侯敬業桃花别墅圗嵌竇棲雲屋湍洄帶海潮危峰虚紫翠激磵墮琨瑶樹密潛通寺山深不見樵苔磯浮雨色藥逕引春苗碧藻刺波出赬鯉透層跳緑蘿疑礙石榰木自成橋傲迹韜軒冕伊臣畏市朝繫船猶種栁飲水詎辭瓢幸此覺塵夢何言圗縠綃發霅上理棹環枝水依岸歴横塘織翠將苔葉流曲度花航綺席餘香散澄湖明月光懐人將遂見望途猶恨長奔走知形累青紫與時忘養真非谷口讀賦感山陽䲭夷故宅逺麋鹿古臺荒去水芳年逝落葉暮山蒼詎自矜班志暫假似顔蔵懐荆楚南昌鐵柱觀西坂銅陵橋懐鄉望似見阻兵路竟遥不孝疏親問負愧秩臣朝順襮猶方裏束帶自垂腰隋卿初賀雀秦冠徒歎鴞石媚愚將寳玉禍淚成邀文木知摧用武弁敢云貂雖懐銅柱援終返玉闗超結客少年場行射獵隂山下經過狭邪口俱邀信陵客共酌新豐酒不韋膠漆契郭解死生友共念雪國讎漫睇蒙塵垢剪草除草根殺人恥人後所貴豪侠義不辭骨肉朽縦死秦王劒何負將軍首自敘艱時負弱操虚已盡天爵軌途將鑒往衆感紛非昨在昔任架搆言念中榱桷三千經名禮九方遡寥廓慕義披天日抽腸見葵藿膽氣識子龍風浪懐宗慤揮金去閩楚抱玉緬河洛局局前途隘紛紛後塵錯世衢春草豔物表秋雲薄孤情動故臣長䇿矜時藥抱熏自煎㷈同汚遂支度敗垣竟可踰深坏亦㡬鑿事農畦園靜望海雲霞漠蜜香知蜂起潮退縁魚落躑躅墮丹心齟齬韜雄略素絲無色染散髮煩巾著尚疲東野馬欲展清秋鶚天徳何酬許賤生當激作心逺冀宏圗時脩嚴重託迴復循至理非予獨謇諤對鏡壯氣愁籩减朱顔客裏凋帝京紅日逺親舍白雲銷裂土天猶廣長驅地匪遥三公殊玉節七葉愧金貂直是民思漢何曽犬吠堯䜟誣方士語旌返大夫招木石禽填海河梁鵲架橋鈎陳垂王氣熒惑隕星妖恢復應多士民人諒久要竭忠文武畧禆益聖明朝賦獨孤隱居詩萬竹巢孤鳯雙潭據獨龍穴深留禹跡松古受秦封日月閒窻牖雷霆被劒鋒坐憑南郭几行䇿大宛笻苜蓿經秋嫩雕胡任水舂金方丹劵閟瑶笈彩雲重巾擲成橋度銀飛是雪溶魁罡繩步武天漢豁心胸令徳髙巢許名言振皷鐘未緣酬夙契空欲躡遺蹤海上有懐五雲連海闊一水與天通日月三台近乾坤八表同遐荒歸震蕩草澤數英雄霸業矜文治天兵小武功麒麟當大路鵰鶚展秋空上將雲臺舊宗公玉節崇羣方連國難率土返王風血滿秦城下笳吟楚帳中敢忘將寸草不必歎孤蓬徙倚瞻霄漢龍光接岱嵩殷憂殷憂初假發觸語竟焦思尚鎩飛鸞翮逺企應龍期泥沙有雲雨指顧及崦嵫舉施心猶振畫地自矜竒投鞭一水斷擊楫萬方齊燠燠推民牧元元司保釐毋讒去寸短毋變易長規眷謝舊典刑欲嚴新切治何言追緑兕終當磨白圭億萬天子夀永年𢎞緝熈鶴沙道中空林初見月老樹獨禁秋雁影望中没鯨波天際流竹深僧寺靜逕古客亭幽去亂思劉表懐才念馬周豈無霄漢志不展稻粱謀潛澤猶多彦中興在列侯星河環北極蛇豕眷南疇去日馳芳景飛雲想巨艘短衣愁逐虎長夜學歌牛收拾狂蹤去箕山累許由懐八禮臺架閣我為狂馳子負媿羈俯育方念逺家國凍衣饑食粟閩楚事偃蹇河洛行局促欲願自青海及留傷白屋異土居大朔浮名駭民俗鄙人尚潔操時議非同欲拂拭爨下桐温存髀裏肉子拔屠伯困心逺羅鉗辱即地由矛盾合汚避騁逐握手九山雲快意十里目葵藿類物性功名固邊幅夙昔分憂願噓呵濟時祝一轉成蹭蹬半生若顛覆我留迹龔勝子去追梅福去留無異理方順猶風襮竊效無君弔豈擬盡途哭悒悒我不如望望子来速萬彚仰日月羣生韞金玉肯惜匡世材為拯登年毒風雲快鵰鶚式遂歌鴻鵠贈别戚景純夙昔悵行邁淹阻及戈革共難九折路况寄千里迹雲龍渴心膽談笑致羽翼良時詎可要淑景何能即傾盖晤顔采居蘭忽盈溢塵汚或眼青齟齬彌心赤子未貧負抱我固洞披識斯文拯淪溺餘子遂規則淳古有其人聖世終見獲天代閟神器人靈寳幽匿雖全蹈海恥㡬晦潔身䇿子去此猶彼我傷家異國丈夫忠孝願鄉里生還客有道貴達兼窮途慎憂惕多詩極忠愛溺志周反側莫以空言勞長負世儒追贈子魚腸劒淬此霜花白計義感雷鳴雪恥委刃敵生當建名節既死雄血食勿以女兒情别淚灑胸臆得二兄消息書示鄉人弱弟知臣節諸兄戴母慈家猶隣戰伐國敢計安危異俗衣冠舊深恩將相知青絲調白馬赤手竊潢池力必先烏獲兵當後食其五雲封鸑鷟一老應熊羆上徳精圗治仁師貴保遺山河崇衛翼日月望旌旗天道囘經緯吾徒豈磷緇百年忠孝願三復脊令詩恒山白龍潭寺題壁行路苦煩隘暮嵗方奔走来非梅福道去恥魯連後遑遑㡬暇弔汲汲奚能就獨事陟幽遐披靈豁星斗乾文迴炳蔚帝坐銷塵垢仁徳允中興蜂蠆隨懸首沈憂家國願藉力英雄手心靜足忘疲道在形俱瘦恢宏諒有素葫蘆矜含秀豈是顧祭臨澄懐遣詩酒寒泉心膽徹潄石笙簧奏白龍霖雨資翠巘煙霞友不為洗囂頑終當避天吼何鍊師碧雲詩矯首青㝠上飛神八極中蓬萊萬里外紫翠結鴻濛仙人雙鳯簫導鶴倚秋空散花將桂女捧藥見芝童要我從太霞凝情碧雲裏遺以崑崙謡學飡蓬虆子冉冉六銖服燄燄五枝燈盤螭離火下裂鼎震雷升問道元無始大徳不能名雲行青天上寓影以寄蹤有情在川澤豈擬當飛龍巻舒本自然茫昧信難測忽起必經天既行遂滅迹瀛洲如可待一皷冲天翼毋為相邀遮九萬當不息題便面近翠漂殘靄遥青出逺岑天光通野水雲氣亂秋隂貔虎空林外龍蛇大澤深箕山無異夢魏闕有初心鳩玉方仙杖星徽擬舜琴不須彈别曲江漢少知音章山人隂陽教授秩滿歸嘉禾泠泠石峯水煜煜君山雲若人盤谷間髙舉凌世氛出侔天地宰知與造化羣方儀表坤軸晷度法乾文寒暑無停機持滿俟毫分至理豁胸臆一試無遺論功成不枉已拂袖竟何言望望流水逺雲山靄孤鶱寄謝狂馳子長歌歸故園奉寄江知司漢弱節委虚名江海負羈靮叨友賢俊人春風幸披識晤言勞軫念讜論陳宏蹟豈謂隕良圗俯仰成今昔分飛况鱗次相視煩蓁棘梅尉終飄舉顔坏茍棲息共有家國懐俱渴雲龍迹拊膺九折路感義千金璧大聖畏匡人遲遲去魯國所願隆𢎞美致身保明徳翻飛尚一鎩奮鼓垂天翼君若迅青雲我豈歌田石邯鄲才人嫁為厮養卒婦隱妾擅花容三千眷女紅寵遊名共輦被榮曽冠宫年將舊色改夢與故恩空一自經塵土百死念微躬破壁蛩吟夜枯樹鳥呼風貴榮少不逮賤辱老相從茍全父母體况慚婦寺忠闗山月未久辭沙漠奉命討祁連後逐李飛將追躡至燕然疾風飄沙礫彫弓不控弦黄旗開虎翼緑玉匣龍淵地逈聞笳咽山空見月圓持比君心照白骨滿三邊有所思篇相思不可巳相見邈難期當君懐鄉夜是妾夢歸時寳奩殘匣粉瑶瑟脆弦絲文杏酣嬌暈弱栁展愁眉綵屏香霧掩綺帳曉寒低照骨環金析見膽鏡塵飛苦為芳年去坐恐故心衰裂帛待秋雁掩淚聽朝雞亭亭將影弔脈脈寄心知香裏愁還熾想中人似來裁詩織錦去憶箭帶書歸望極將情逺途遙念馬遲素懐鍾契愛良願豈乖違一札緣風至萬里幸星馳芳樹篇碧樹臨秋風芳枝蔚華露寂寂憂思人冉冉徒行步青春去不來白日朝成暮坐恐雙輪車行摧九折路焦螟隂井歇熠燿踈簾度語夢暫留驩懐情恍如遇新人容自新故人心尚故勿以疲馬憂當計亡羊慮萬山皆北拱一水猶東注愁結楚天雲淚涕湘江雨臨髙臺篇臨髙臺翼翼何軒軒所思乃各天一方終日騁望不能還天長水且闊兩臂無翅翎安得鶱飛霄漢間臺髙高百尺臺下有水清而寒遊魚躍其中仰首見飛鳶上下亦可察山海亦可移愚夫一寸心萬智不逆知對面尚難同望想何由期臺髙水深望不極望極徒令長太息里之鄭氏子業醫于陳求詩美之神農嘗百草疲癃蔚以興岐黄道砭法賢哲代相承和出保周民越人資内經倉公極炎漢晉謐術天成隋楊業太素祝由法交并至哉孫思邈剖析驗符徴縦横分寸間俞經從井榮理訣本王氏指落起沈㝠六部悉百骸四節委七情真筌世不乏掇拾師唐冰顧彼女蘿託何傷蔓葛尋落蕣榮終夕客鳥倦還林雄才智助徳澤世尚為霖危遜有明訓夷逸豈恒任柬謝江漢枉駕山中蒹葭植弱節玉樹引芳柯謬有攀髙望深慚接武多千山迎騎氣一水淨鷗波珠履青雲士金聲白雪歌貴無嫌菲薄貧肯厭經過但恐凌霄漢何因掃薜蘿愛妾換馬私恩徒累志國難或危身方缺閨中念將收塞上勲千金猶市骨一笑豈囘春不矜蛾比月願得騎乗雲寳釧銷羈絡雕鞍飾鏤銀壯夫要汗血少女拂啼痕誰云惜窈窕當取畫麒麟陳山人隱居曠俗遺軒冕誅茆結薜蘿天心片月出雲際萬山多羽盖繙林葉芳茵被逕莎空瓢留玉磵老樹泛星河道在身俱重時非迹豈譌猗蘭當擬操藂桂有招歌射日弓間弩屠龍劒不磨風飡猶煮石雨種或披蓑何意攜紅拂無心跨白騾蓬萊今咫尺桑海事如何陪莊沈二隱君宴城東黄氏樓蒼山凌晻靄緑水淨波瀾樓出孤城外天臨四野寛璚筵開勝地玉酒奠仙壇笛曲穿雲弄箏歌對月彈隠侯熊耳爵傲吏虎皮冠盖世推才氣横秋擅羽翰自縁無谷應非欲久泥蟠憂漢多時䇿歸周但釣竿簪纓今日㑹圗像異時看共作山公醉樽空興未闌胡永年兄弟石莊二隱巻吾宗帝舜胄歘紹陳胡公百葉被奕世千齡暢皇風麟趾肅家廟鸞虬偉才雄璠璵相炳煥岸宇凌煙虹葳㽔吐綺采彛鼎光軒墉諸生啓春秋天下歌中庸曰余悚負荷越迹台垣中弱冠忝民牧十年歴兵戎塵裂匣中劒弦清膝上桐意闊時不偶心摧道非窮徒揮萬金産豈累六尺躬步影眀月裏浪懐秋天空以此傲物表長歌翼南鴻伯兄冠羣才鶚薦厠鄰封綜理局卑鄙遺民樂時雍文江水如練一勺此心同仲氏職行人公府步顒顒宣化廓清宇流誠達深𠂻累挹紫薇露時乗白鼻驄俱懐柱史隱共恥魯連功英英石莊雲歴歴山潭龍既舒彌宇宙欲巻絶㝠濛出處象日月翹鶱如岱嵩黄鶴在玉芝青山夾蒼松願勗金石年分光荆棣藂若魏兩應起保漢二疏終與姚東之言懐作志士仰天庭終身恥居卑空名提向楚獨善竟何施伊昔裂冠裳白日慘簷帷髙臺舞突獸烈火出絳旗欃槍掃六國廷闕髙五噫志士束名義思全中顧私北海節旄盡西風霜鬢吹心計周宣起眼穿漢武時終假扶搖力來臨天日姿機緣萬一間喬齡深本支囘龍闡故業捫蝨綱皇維螫手當斷腕微服偶違譏拂袖向滄浪扁舟侣䲭夷君誠東山客豈慰蒼生思挟此虎龍氣因迹雲泥機九萬有迅程波瀾浩天池如何一杯水遂活枯魚為終當匡濟任俱負鼎鈞持敢竭駑駘材共宏霄漢儀成功蹈海去恥貺璧與珪天壤倘攜手君應哦此詩黄鳥黄鳥西窻樹低枝拂短簷曉帷驚楚夢春恨隔湘簾篆碧殘香印愁紅薄鏡奩逺期龜未兆近信鵲能占酒淺金浮彩筝清玉㺯尖芳心待明月留意語纖纖山莊休沐懐鄭桓居貞桓别十年僅得一詩見寄微月出遥嶺南山生夕隂石林通玉磵風閣韻瑶琴八表縦游目四溟曠冲襟方乖簮組累忽悵别離深慨舊緬遐想披新迂逺尋雁分踰十嵗鴻末得孤吟子戀䝉山隱余懐潁水心千金保樗櫟萬古繼徽音因之固膠漆何以貺璆琳送桂子山鄒縣省親江東又送客鄒魯去寧親别席花盈酒征衣露涴塵秋中淮海路畫裏嶧山人嚴父忠為令諸昆孝法民賢邦推雅治亂世得儒臣衣錦斑衣後鄉閭拭目頻題畫送亷希魯鯨波遥際海龍幹直擎天石隱連城玉淵澄澤物泉翠竿仙子釣桂檝孝㢘船氣合神彌曠言深理造𤣥風雲徒入夢屠釣不妨賢杳杳迷形役㝠㝠逮嵗年青萍光彩動紫氣斗牛連握手論心後誰先祖逖鞭答楊茂建秀才二十韻道喪真儒病詩亡政化隳斯文天汩没大雅日陵夷應絶金鐘委聲亡月缶宜理音誰間作華采世優為古學非文字名言析本支語雖遺汗簡恵欲驗敷施子服先賢訓吾遵列聖規才難俱皓首業癖友黄眉開濟寧無術風雲自有期未淹朱墨鄙且分草茅私白眼嵇康共清心鮑叔知情窺滄海淺志局泰山卑惜别分神劒懐歸咏紫芝蓴鱸今夜夢猿鶴故山悲善養清明氣彌堅鐵石姿用須鏗爾作舍豈浩然移任道恒先已當仁敢讓師麟方哀魯狩鳯秖見堯墀上徳符三曜亨衢展九馗扶顛良有願試誦别離辭歸隱圖為張叔夏作舟檝江湖逺雲霞島嶼平遥天兼水淨遲日帶霜明草澤人誰在林泉計已成問津逢季路蹈海識田横去斂千秋氣來矜萬古情風雲徒入夢屠釣不嫌名望氣知埋劒臨流想濯纓明珠雖萬斛魁璧重連城書得圯橋秘門如谷口清卧龍終一起嘘灑為蒼生賦得春日閒居言志穹楣朝日澹邃閣曉寒新羅薄承熏淺香飄入幌頻閒情闗淑景雅致屬芳辰植園平達道濯水逺通津栁深鶯度曲花重蝶迷春琪樹羅金塢瓊樓照玉人雨山開黛鬛風沼蹙波鱗九野均天澤遺黎樂道真遜言居悔吝治世掞經綸虎變寧無待龍蟄豈終淪詎言因玩物嗒爾忘歸仁鵪鶉夷磵石礧礧陽坡草離離取適飲啄情養成山澤姿樊籠事格鬭脆翮互差池王風有深喻貧士無完衣物理賦自然奔奔竟何為奉寄全禪師髙僧惬勝槩卓錫憩三華梵唄下天樂香雲將雨花萬法匯一源衆流息紛拏方知湛淵黙足以絶世譁止水鑒空影飄風散流霞夙聞契圎悟方便演三車勉旃各遂養願得近袈裟即事溪堂霽靄散巖樹雲光落白鳥度曽巒青煙起長薄采芝逢逸叟隱几比東郭勗此山澤癯西笑長安樂雲泥分靜躁隱顯世叅錯異曲既無能夀橒斯有託企雲樓為黄伯孚作慈親竭孝養令子企雲思温凊豈不懐征徭敢後期斑衣惟間隙愛日每舒遲引領睇白衣恍如在庭闈傳之尺素圖啓彼孝慈詩于以著令典永言敦民彛次韻追和李仲公先生詩文以化為工俗儒局成法紛彼負疣贅芥蔕強扳扱負芒竟誰刺代痛㡬自搯珠玉既沈淵虎兕空出柙以兹迹元化渾渾綿翕哈蕪穢闢菑畬望穫有畚插掞才擴聞識舉乙必繼甲牲血久在槃俟與竒材㰱元音遺響巻四
