body:
  text: 元音遺響卷一元胡布撰五言古詩雜詩三十六首玄運冥至理化機無停輪昏久則昭明陽隂一亨屯草昧得養長膴膴全生仁籥吹苟乖違秋霜何其繁聖人混異曲真藏寡私恩獨不悟天隨先哲欲無言其二聖道在天地昭昭不吾欺如何握異符理與仁義違淳古仰明哲處汚虞艱時矧伊濁世士迫此無纎遺曰彼布天毒何言久相縻綿綿為魚肉跬步迹禍機大德俱淪亡昌惡益隆滋周孔格至理詰言今安歸其三惟天生險阻以膠王霸心倚地展私力民生塗炭深黃帝征蚩尤干戈傳至今古有革不享用武具所任後來侈封疆勢奪利由侵造化果有仁無地産黃金川嶽可坦夷庶幾竟微忱其四浮雲翳四澤萬象周昏芒初日川上來重隂閟晶光齊人喟永歎慷慨悲夜長長劒諒可憑一決披天章其五莊列得捷徑異軌尚同歸千載味玄言真至始云知澤世苦不早大藥亦有資仲尼何拳拳三綱果誰持煩憂非後遣典則莫前窺惟有乘風術飄飄近無為其六肅肅平原樹凄風拂柔條衆鳥豈不棲巢危霜葉凋達士志草澤大名世寥寥非無絲與竹大音不見招芥蒂爾何知蕣榮乃崇朝飢羸寶蒲稗復此棄場苗失路信多岐反道獲天妖式靡巨姦毒宏仁來者要其七良辰愜幽趣曳杖窮山樊冉冉草澤中披荆擷皋蘭馨香臨絶谷懿此出清源毋以遊好人搴芳移本根其八楚項恃重瞳驕吝洊漁獵假力削暴橫資漢闡丕業范增不老死寧與天命乖衆口徒喧紛吕翁豈凡材驅掃如流電平良實膏煤陳迹遵往軌朗鑒循昭回但諗天下慝古先莫能裁其九古莽國西極晝夜一昏曉民居類化遷日月光不照見者反虛妄寤寐劇真要意彼實踐蹊逗翳涵冥杳吾欲騰滄海往處晦機兆逐日非我能嵗程庶當料其十一士永日笑一夫終年悲醒者常拳拳醉者未易窺天地有川陸浮沈多是非撫心徒自憑豈愜人道違老聃適西戎尼父志九夷朴風安土習片善猶擇棲同塵諒不汚永懷杜德機其十一吾愛宓子賤彈琴坐髙堂單父頌賢聲四民沐春陽垂拱開至化軒轅儼衣裳帝力何有哉順則歸陶唐小大功不殊一本葉萬疆誰謂局州邑牛刀安可量其十二有生知有義利萌恥亦喪茍得益寸私當理委虛賞勢門易變態靜燭情萬狀昔者且感傷末流愈乖蕩寡求足養氣淡慮始澄想衣食接有道虛心守彌曠已矣賦逺遊逍遙釋塵網其十三庖犧結網罟季世漁民物宇宙一括囊生生死窮窟仰聞無懷氏朴重如木訥自有嘐嘐民兢兢負憂骨島夷異終禮父母死屠裂孰是暴所恩詭智茍全活宣尼德無位庶類由天孽生後三代時幽憂遂何發其十四古來文章士立言稱達生靡靡衣食事切切生死情塊然泊虛堂髙志越八紘徒言學仙蛻十九拘神形質盡同草腐光輝蔚何靈有身為心患伯陽葆元晶超舉世塵外茫茫閬風清其十五炎帝五絃琴軒轅十二筒聲律身為度子民育和雍秦音厲爽迫鄭衛佚淫風晚代美無度商聲雜汚隆豈曰穆黎庶侔德在王宫中國流聖化禮樂以知終其十六壯士貴便捷出門當蝮蛇螫手恐傷身腕落毒莫加全孝不幸中殘形其奈何以彼豺虎聲慘毁苦無多其十七黃帝夢風力秦嬴登斯髙梟鸞以類合德惡豈獨操顧彼聲利居影響無遺毫取近方跬步即微如牛毛用等逐其流立言寡虛遭擇技誠不易戢羽尚騷勞梧臺有燕石楚澤多蓬蒿百爾慎厥章儀監罔或韜聖賢惡似是利語劇昆刀含章介貞祐黽勉示同曹其十八炲煤飯幾許聖人乃生疑心信目易惑感深陳蔡時二叔誣周公後母毒伯竒天倫且反薄他人安可知綱常茍不虧大義均等夷豈無日月明疇盡耳目私秉德各莊簡千鈞諒自持其十九昨日至今日今夕復明朝少年忽老大白髮肯相饒舜禹亦孜孜憂端所空招跖蹻膺惡柄僥幸每矜驕世路自多岐媒孽迹非遼彼善則昏昏此惡既昭昭同沈腐草質彌逐贅疣消情實非嵗年天道固難要其二十昔承長老訓天人貫一理名言徴簡籍格核百子史四序代化遷二氣齊物始福禍向有門轘轅鑒旋軌顔淵如其仁何事傷夭脆彭聃稱古夀千嵗終已矣咄嗟人事盡天理謂可致報施已多乖冥冥有無事其二十一髙揭日月行孤抗羣物紛任公戒天伐首陽非全仁二途侔失得寡昧將誰親聖人無恆師反側意已勤願處皥皥鄉遺身若飄雲往止邈悠悠禮義且無聞微軀焉足纍虛白庶怡真其二十二俯仰天地間文章諒何補茍云躬踐履遑恤身後顧知行本一軌佩言希往古如何服堯舜行與桀紂伍彬彬資辨捷詭飾增文縷誅心誠未靦賊德果何懼亹亹揚法言隂衷益膠固生非三代世瞬息交逆覩魯叟苦彌縫當時滿區宇末途負乖躅諸老折心膂六臂挽不回相隨共塵土其二十三絶世一美人盈盈誇德色明珠耀玉臉蘭芳吐微息傾城寡心侣令顔逞絶國鄉閭懷顯富願獻時王側時王所愛慕貴寵可立得美人有素志毁折不自惜託身緇衣流髙睨湛虛寂既往無再返貞堅確如石使御徒辛酸觀者徒辟易寄聲路旁子毋以貌見測其二十四堯舜與桀紂共此日月光飢亦進食飲寒亦儼衣裳所異一寸心天下莫能當逺遺生靈福近迫子孫殃暴民取萬世貽笑彼秦皇其二十五茫茫蒼梧雲羃歷九疑樹二妃泣重華竹上淚如雨千秋悵不返壞土空丘墓如何天下尊至今無知處其二十六清霜昨夜下繒纊始挾溫顧念藜藿士懸鶉守窮門甕牖有餘安闒然蓬蒿園毫芒且不動豈受外物憐蹈仁如冒刃雖死道猶存髙度凌萬世一生焉足言其二十七清時被雅素聨軫皆良朋名都倍美麗嘉遊自兹興時日藹春華芳樹鳴倉庚山川叩隱遊城闕羅簮纓在位多君子側覩泰階平從容取聞暇廣筵喜合并觴行酒無度飲至或忘形誦德掞文言記辭屢叨名往逰隨夢化結想空如酲再歌鹿鳴章感時懷友生豈無向來心已矣非我情其二十八的的露泡中天地折涓埃朝陽晞華采滅迹于蒿萊粒粟在滄海冥心同死灰晶光茍自畜神理洞八垓呼吸原一氣同天可縈回大有起纎芒金風混虛臺身局浮休內心逐浮休開誰言方寸微世外有竒懷其二十九山中有偉士周世寡同調人言長安樂出門向西笑流雲眇天末浪意凌絶杪俯仰一何心身卑青天小芬芳世可揖舒卷迹難料期我鼓清風長空躡秋杳其三十儒服世冉冉理言亦紛披躬行實不逮聲聞每過之君子重有言入道由不欺誰云異今昨萬古誠一時其三十一靈草偃瑶艷英葩懌春陽采采登嘉薦薰蕕表時芳所思安可竟涉險不得將豈曰擴夙懷疇能委馨香馨香稱世譽都冶非休祥藿靡奚足貴克念所難忘其三十二神仙王子喬乃為人間遊緱山舉手後桑海更春秋六合雖莽蒼卑汚足誠羞顧念浮世情纍此眄睞周斯道云可復何能為人謀其三十三蠧幹豈獨朽華厦亦云摧巧言甘自受媒糵信難回達道處常變曲形遺世埃榮華桃李場青松顔色衰年貌委時代苦心已多乖如何蹈機士冉冉在蒿萊其三十四雞鶩無知者舉世爭辨之冥冥生昭昭人物起是非禽獸有素性人心或天欺鑒燭析塵微自諒靡不私吾欲一真贋彼棄我不違勵古以成愚封巳恆若遺何暇亹亹仁將全矜恕慈聖哲欲如天無言行四時其三十五野鶴本智鳥投羽希自全斤斤伐根者忘已以仇愆冥會符嘉祥傾心罔幽玄轘轅豈象識報施非徒然其三十六祿帛砥石器厲世磨鈍民漢髙用賢才天下歸吾仁歷祀垂四百旋踵登異人大德嘉永年文武開祚君後來多雄才樹本亦已勤積寸以遺尺何由化風淳感懷十九首晨興駕言邁勞心欎以忡之子萬里道浮雲無定蹤昔者諧心素白首委終窮風霜一失意搖落歸本藂念我鶱飛人青雲翼冥鴻憂端成望想山水幾千重延頸企九門悲嘯激流風翹思託箕潁遺音冀我同其二回飈振踈櫺明月當前除羅帷自飄揚夢寐誰與俱同心負誠約晤言義不渝髙髙天路逈繁隂澤不敷逝景浩川流枯榮遞相須駑駘非泛騖自足踐修途其三翼翼雙黃鵠千里一悲鳴音冥豈不逺舉翮周八紘淫蕩天下志匪徒謬推稱白日無雲翳揚風扇太清其四堯髙巢許節揖以天下讓巢許亦何心矯迹成髙尚超特發倫理道矢豈終枉至今髙風人天下不可強其五擾擾闤中闠來往安所之側覩明君子交臂艷夸毗窮達委命分所抱各攜持願拂衣上塵郤君相惠施拊劒顧頽陽玉石同崦嵫駑駿爭馳騖流眄重光輝上蔡有東門相對首陽基舉世公毁譽豈能在一時咄嗟同志士涕泗不能揮其六羲和無停景寸隂誠足戀任道有天和豈獨遺迍賤寥寥百世下六籍所深眷即理窮幽討探玄燭微逺天道固難知人事多懲勸劇否兆吉徴憂端倘遐遣其七惟昔承嘉運冀獲展經緯預聆賢達風國士所倫擬竒偉乃方薦矯迹循髙軌揮霍臨白刃摧頽秋霜裏壯齒眷良圗英英挾雄氣鷦鵬方食潔三河梟獍峙臨路拭浮埃彎弓不可恃白日頽西陸悲風長夜起周公入我夢孔聖或譏理貞藏多苦心哀竟將誰俟其八粲粲東園樹桃李相後先秋霜草花落彼美豈専妍窮老見鄙棄安能復少年勉力䇿勳望營營尚多愆智謀無旋軌千嵗非偶然夸父骨已朽去日西山巔榮貴茍可求黔婁為不賢其九志士有同方小人茍波扇處晦非乖異求仁蹈時蹇黃帝焦心身堯肌甚於臘許子煩一瓢天下不可易碩鼠食我苗飢牛尚負軛熒熒雙鳴雉華采麗朝日鷦鷯巢一枝分願得幽室任已全天性賢聖不踰閾用舍一樞機寡昧所由適當世匪宏度負愧謂夷逸其十徑弩常蹶張步驟射天狼天狼畏楛矢足折心摧藏多士每喧沸焉能相中傷世無英雄人暴戾故有常其十一良日登名山馳轡夸壯圗卿雲萬里外飄颻天壤俱行子在冥漠易軌信多途顧念懷傾側內熱自中敷虎奮及龍驤風雲起須臾烈劒不藏影吞舟局江湖置此臨丘垤兀兀蓬蒿居廣宇抗宏峙比足於桑樞流覽勉夷曠茫茫將焉如長嘯振寰區冀此心膽舒其十二崇岡非百尺嵑􅙙出天險世路紛迂互人心利刀劒在貴富所資處賤貧始卑一朝異顔色忠信反見疑直在李騫期三閭且乖違昔者希嘉命欎抑在今時達理懼盈滿掩晦昭內機良田曲蹊徑蒲稗逺勝之令名豈不美氷炭所推移直道無茍容遺默天下溪其十三季葉事浮靡多岐彌搆患堯不剪茅茨禹有旨酒歎遊術傾戰國中古法周漢皇綱振威霸王道此由亂詭時俠烈出矢已偉雄觀潛德登清嘉千秋一輝煥驅殄冀宏泰歘興春花燦理勢運衰榮崇朝不終晏晷度莫踰越自古增憤惋勿以竒齡邁迢遞豈乖串其十四晨風鼓徑羽翩翩翔鄧林樗櫟不自賤何意託嘉禽所託非貞幹焉得慕髙深幽芳既已渥怵惕實居心垂聲謝君子榮險非所欽其十五鮑叔知我者毁我三河傍三河當途人怵惕心內傷盛德過情譽委棄不見彰樗櫟保天年摧折者柱梁其十六採藥蓬萊山斸地百餘尺偓佺憩倒景屑玉鍊璚液揮手招松子安期起射的閶闔自天啓卿雲爛五色九仙馳鸞馭俯仰躡日月足下隘寰區臨流嘯空碧納氣化腥腐凝神于玄極即我舊山川披豁諒貞白浮丘顧我笑歷示凡庸客魚目混夜光紛紜抗孤特何况天人異勢有雲泥隔永蹈無為外玄化豈消息其十七遊鯤運北溟洪波充四裔暘谷晨霞爛日出百泉沸神仙依天棖寶玉間縹氣逍遙堪輿內金石同莖脆芒忽達遙問既來不旋逝局此塵沙體嘐嘐誦仁義我欲因風雨一息九萬里放神周要眇呼吸孰能制獨立玄冥中清風激天地其十八班班衢路子亹亹窮舌端好惡屈信際縱橫逞私言安知英雄人超竒出天然歘興賔明主理諒天下先萬化得本原一夫無飢寒進隆雍熙治退不居其賢豈事贅朱墨掞思為世妍其十九竒士局鄉鄙抗志周八極叱吒奔流電英風何烜赫敝屣棄天下侯王在揮斥一説七十城笑歸雙鴻璧世殊萬事異天道忽復易大言過夸逞浪漫無規則隘此樊籠裏伊軋相煎迫理有浩蒙蹇飛龍蔚時澤安知來者恃偉矣垂天翼詠史十二首儀象出心易開天肇人文厚生烹飪具禮以儷皮昏二十五弦瑟聲諧時晏溫庶物皥康哉嶷嶷德無尊一畫以統萬幽探萬化原先天天不違推䇿蓍龜言其二牛首起烈山赭鞭鞭草木嗇事師有恆維時播百穀品藥别味性利誨保生育食天子庶民重卦演成卜昭蘇遂出息區萌達時燠惠我萬世仁淡然化隆俗其三宛朐得寶鼎五種藝成功治氣安民生教用利不窮聖德美徇齊夢臣俱景從五行起消息星厯尚推崇瑞應玉英見垂髯迎異龍與虛合不死弓劒綴遺蹤瑄玉與嘉牲薦饗登奮庸昌哉備制禮奕世澤休風其四純衣冠黃收惟德則天大飯啜土形塯茅茨椽不采善旌謗有木天下服四罪順則安耕鑿帝力何有在禾箑脯生厨鳯儀綿十瑞偉歟揖讓化萬世休光逮蕩蕩無能名執中大無外其五陶器不苦窳竹器成夀丘至德讓不懌皇天鰥下求二女正閫綱頑嚚致和柔五十慕父母反傲誠亦周敬敷承五教藎臣格天休授受恢聖謨我人沐嘉猷其六續業疾先非胼胝役心骨仁美德不違身度聲為律沕穆乃綱紀權衡稱以出開道決山澤給餘均食物職貢各有常三壤賦成實孜孜在黎庶泣罪刑既恤大功訖四海九德甫寧一天與子啓賢重命用休匹其七夏亡伊洛竭天棄不渝紀蛟妾告吉凶矜驕事専質暴民昧大難為國徇姦軌萬姓乃不堪匹夫無嗛志唯昔走三㚇石泣泰山起喋血毒庶蕃禍淫由怨始其八祝網既歸仁視民知治道阿衡正天下復亳申帝誥有衆率怠惰嗷嗷不自保上帝錫湯征把鉞嚴天討德威定海內甚武崇王號四瀆亦已修民居仰宏造其九獨夫亂天事毁信崇惡機詭智足拒諫巧言能飾非天下奉一已凶奰日孜孜炮烋斂衆怨委棄鹿臺資七竅哀忠良斫脛虐無遺萬民塗肝腦嗛嗛中顧私龜毛兔亦角河竭兆其危寶玉衣自焚聰明致愚嗤其十崇虎譖既息羑里脫樊籠茀祿懋承天駿命畀至公漢汝逺被化虞芮質成功期頤歸善養貊矣德音洪寰區三有二服事禮彌恭大善德不形典則嗣惟崇藝王積有素錫利載周封至治穆蒸哉拳拳夢飛熊其十一芮諫卒不從榮公終得祿衛巫善監謗道路行以目侈傲日専利發器漦出櫝流毒産褒棄荒淫軌前躅川竭岐山崩檿弧驗箕服連烽奉一笑遂至驪山麓失德緒已微東西既無續其十二綱常挈萬代禮樂範百王道尊德無位金口振四方明先人紀立發後世維張不有集大成人何仰休光用行蠻貊化退舍不民忘惟功非禹下式廓侔素皇桀紂不我師背道棄天常德興昭久澤暴速實自戕尊賤有述作因之陳五章大哉善淫戒俾化與天長徽猷沐萬世仁惠浩無疆雜言二十首流目睇逺天遙情千里外延佇豈不勞神馳與心會昔我笄丱時探賾窺萬代兵爭歷年長壯節秉剛介大志喟中乖飲和養屯昧天人理悠逺生死非芥蒂孰使確石堅而來委氷潰屢空行不亂克已無尤懟久視諧夙心於焉道斯在其二髙臺翼崇漢舉首凌飛霞俯視一氣中吹噓達羣葩自天均所賦夷等定廉奢我惟貴靜専安能侣紛譁順流何滔滔渤潏激坳凹隆殺既難平人心遂無涯吾欲一穹下元元叶亨嘉志意倘可符誰云昧幽遐其三尺水般微風揚波衍紋縷疏林間藂竹摵摵響秋雨曠士懷浩蕩貞心不遑處事功與願違抱素徒延佇去鳥度流景幽憂味酸楚孰是狎兒曹徴今邁前古癡情際天眇空闊寄髙步願一託冥鴻因之事鶱翥其四南華贍文藻物我理亦齊潛真發伯陽貽毁尊仲尼衍溢非外象寓辭益以巵至哉警聾瞽式廓和天倪孰美達生言遂違經世私往往稽喻方啓彼癡人疑誠能越寰象斯語徒豁而其五班生厭書囚投筆取侯爵爰有不器才邦家膺重託稱兵非得已教戰廣民學棄置禦亦疲殘生軫元惡維時討不廷威柄仗掎角用武久為黷德荄暴雄略曰我太公望宏基肇開拓訓誓無一辭凶器古尤薄道家期三世繼後寖痿弱勉強責數竒稽心少仁慤其六豪士日萬言愚夫恆一默默者非擬量言多纍深忒聖人育廉簡守黑居楷則豈曰訥為愚損言將辨惑吉凶分靜躁喜怒徴失得孰肯友嗤嗤素皇道榛塞其七髙天浩無涯塵世汨下土中立眇寸心測量窺萬古如何狂馳子長物隨營騖金玉非服食浮榮事環注塊影氣為積周回息窮度四敘行在我陽充隂消沍達無道雲布獨善體天寓挺挺六尺軀何能共遺腐空言豈憚勞淬礪鑒𠂻素其八貧者得資財裕如成富家鄰親忽貴重行路為矜誇錦綺暖莫增珍錯飽難加以此迹炎涼世情愜豪奢有生一形體來去理幽遐而况儔物殊凝銷似遺查孜孜闤闠中膏火相焦煆豈不以此故噓枯變光華人以物誘心我惟靜澄譁茫茫撫大化有作終紛拏至人寓寥廓曠絶超雲霞汚濁較錙銖疇能共咨嗟其九鳴鳯既寂寞雅音世無聞啁啾百鳥羣聲入耳不分憶我陟堯廷九章炳離文金苞凜威采百鳥仰德尊鳯去夢亦老仁聲心耳存菶菶梧桐枝鴟梟蔽南園囚飛與盜啅映日相鶱翻小子謬時見老夫知不言物違時亦異衷素向誰論其十帝者恥秦政傳國寶秦璽桀紂職汚名淫刑後來侈三王崇揖讓季葉安篡弒訊古朴以愚宜今美華麗遂初既返道鑒燭乃唇齒代降偽亦滋人心異天理是今非古情瞽惑世聾耳良史徒喧譁遺氓竟鈎餌以仁為失道於暴斯得計周孔不復生元元長已矣其十一悲風蕩江介客子衣裳單珠玉內自充何傷暫飢寒志學企前哲經綸微緒端夷世拙營謀間邪不可干出門負氣節中道搆憂患俯仰懷匹儔吞聲納辛酸皎日麗長空海清無波瀾坦途成踸踔中止竟良難阮生尚沈湎陶子觴弦彈期運苟不符淵潛事龍蟠鼎鼎寰宇中日月雙彈丸老驥萬里途力強心未殫遺黎式遂望天道諒昭貫其十二寒暑有代謝陵谷為變遷况此血肉軀欲期金石堅積善既云德侈惡豈辭愆影響媒福禍畢酬終古然丁時動轗軻喟彼人勝天玉石蹂躪餘深衷嗟物捐大賢當閉隔塊獨安靜便頥貞度長夜傾否乘乾旋苦節得安行四時功巳全昭昭迅機兆吹萬登春妍相與際天定亨衢安永年其十三趨權如蹈火顛踣邀事功希合影爓間音威亘長空歘焉為禍門跬步狐兔蹤達人感物變矯迹託髙風鳯鸞何夔夔翼曠矰繳窮東湖有諸葛黨錮亦相從榜目在君門吉人知避凶所願保明哲危時全令終垂聲世俗士功利謝愚蒙其十四局局蓬室士泰然心宇寬草衣飯藜藿弦誦有餘歡貧者性廉靜富室尚貪殘焦燒至纍心斂怨飲恨端伯陽體無為龎子故遺安孔聖弗茍去段生遂踰垣彼富我以仁道存斯達觀一生或不足千古橫髙翰尺鷃爾何知南圗息鵬摶其十五一土培萬彚亭毒俱遂生深仁職覆燾於物如無情熙和達屯昧清肅謹嚴程少長老而死賢愚同墓塋人生異草木恥與共衰榮百年亦何為勉樹髙世名豈較錐刀利兀為時俗營吾將超寰宇稅駕白玉京其十六朱均稟不肖鯀子為聖人五世安可期福禍何能因至仁如無恩至公無私親嘐嘐誦善淫達道非所云古來唇吻際良史孰為真聖賢處難能垂鑒意已勤放士屏形迹虛懷視無垠逍遙即理化天地具一身疇與析餘波相從汩囂塵其十七仁義亦有網道德為綱維三代承搴布浩如周孔施成湯祝亦至賢聖羅雍熙禮節實經緯恢恢天不違堯桀異弛張有生諗何時黔黎當末世漁獵殆無遺總總入囊括大鈞不煩期至德在好生轘轅戴宏慈執天歸有道提挈果誰司勗此曠蕩懷允符來者規寄言抗俗士裂網被寬夷其十八神龍至陽精體化司變幻舒放與天張卷藏入無間九淵非窟宅升降何汗漫甘澍幸沾濡人間故延盼從以雲為類及時拯焦旱幽深嗟久蟄蛇虺則彌曼爰有東海檄為霖迄江漢仁澤勿留延蘇枯已稽緩雲霓慰企望翕歘聳竒觀何必訝崢嶸生生拔塗炭其十九夏周天雨金吳漢雨穀錫蒼昊理有知黎民濟飢迫貧哉翁仲孺十斛已豐積孰謂不干天茫茫歸有德奈何劇凍餒覆戴為閉隔造化終芒昧不仁乖隱惻至此果無知杞人重憂忒善淫昭感格何以致深厄徒欲叩九門至公窮詰責好生均化育仁惠司衛翼真宰果誰為毋庸曠天職其二十三才位得中五常無愧怍鼎鼎握乾文動亨靜貞固幼稽天人學至理豁聾瞽此焉非致格象緯徒呈露川竭山亦崩三辰行失序兵荒至殰殈天地竟乖措我獨致泰康何能自安處周孔不可作塵迷孰為悟彭聃信竒夀閲歷異前古物理已難齊駕言事輕舉擬古十首北風吹行雲飄颻南飛翔參辰何歷歷招搖明月光欎悒達長夜沈吟憂內傷行雲不為霖斷絶我中腸其二徒步上太行山深道里逺不念行者苦但傷白日晚溪谷多氷雪虎狼卧荒陂延頸望所思迷惑失所之感歎臨中路回顧盼平原欲御泠然風飛墮所思前其三驅車出東門揮涕臨長河徘徊理舟楫逺身寄風波所遇非同心人各尚偏頗在貴矜苦辛勢屈理無訛桃李有本性松柏託山阿誰能逃真情轗軻亂天和與君結厚愛去日恆苦多抱寂不同聲維懷諒匪他松柏質靈夀百歲欲如何其四良時不再至相見愁苦辛執手臨衢路冉冉見行人去者何草草來者日繽紛貧賤不自保富貴易情親忍作膠投漆已復海塵雲雲泥各異勢邈若隔越秦子豈羡管鮑百年猶重陳其五君子克終令小人貴一義邵生瓜田中遺榮在鋤理昔者為人羡今者固如此進退當及時毋貽富貴纍人生有得意何用顧雕瘁願得早旋歸安命寄一世毋為牽所思憂患強蒙蔽其六駑駘乏駕馭委置亦在廏履歷尋常路隨意飽芻豆良馬食盡粟花韉被文繡馳驅日千里汗血亦已久拙逸巧常勞美薄見蠢厚人生極外寵而不眷內守胡為寶金玉照耀使傾覆樗櫟非良材山林永年夀其七日暮涼風起流雲激曽隂庭柯委緑葉藂篁飄商音志士惜寸晷感時良苦心盛年徒激烈坐恐二毛侵榮名與茍利古來爭至今將子營世勳寵辱念幽深守道不封巳艱難豁胸襟君亮執宏度齟齬豈嬰忱努力致經綸毋以不克任其八今日非昨日慷慨負憂患問子何所懷聆子心欲言聞有墨胎子抗節首陽山將醜天下士臣周義無餐君受雖淫昏民人不干天衆人徒悠悠時德以仇愆大義炳日月投軀任獨難斯人久已沒髙風世凜然我願陟幽遐登山越山顛引領弔遺迹返古冀昭宣其九嚴風斷枯草去去何足道飄零不自知榮盛苦獨好故人日衰蹇新人相照耀貧老無依棲黃金惜年少北邙多丘壠荒途荆棘蕃子孫不之識問是何人墳生死有常理豈能逃聖賢但恨去日逺奄忽遂飈塵其十戚戚何所懷達人在大觀盛名為世寶令德藹辭言生當以適意既死委道存陳力昧其常何能自棄捐緑草被春華芬芳相鮮新披拂臨衢路葉葉如可紉傷彼蕙蘭花同生雜埃塵薦馨豈獨好願託清水渾培植固有常去草以除根曽易山居五詠五首白石山太古一片雪飛來成九龍天空不敢鑿萬仞裂芙蓉芙蓉峙瑶柱碎玉粲可數堯舜登郊廟拊擊百獸舞月落洞庭波霞光入秋曙歌徹飰牛人熬熬鼎鐺煮中流井汲水采月華探穴得蛟井百鍊蒼龍筋璚枝結修綆銅瓶一失手環鳯不見影拭淚照寒泉清心挹朝暝古樓基咸陽一炬火宫殿逐煙消得似林泉客故址碧山遙碧山紅日曉雲水空江杳古樹撼秋風倣佛髙樓杪髙樓昔突兀舉手接中台坐客三千人浩嘯如喧雷萬事夢幻間笑談成土灰長歌文物地去剃北山萊飲馬橋長虹不經天飲水落幽澗至今榑桑雲旭日相煥爛流風響中外天籟激吹萬枕石橫髙秋悠然卧長坂驊騮昔在野玉勒軛不挽俯飲碧潭波龍文五花粲幽隂風雨地想像起流眄七月烏鵲來天河共清淺三孫樟潛蛟漏大網遺形老樹雄批鱗拾蛻骨觸目訝腥風落落聳髙柯紫翠相蔚重不登將軍傳何恥大夫封深根託厚土烈氣挾蒼穹靈物有化遷南平感神龍休光澤奕世天地保終窮效古二首身如東海山日出被光華誰能長夜裏埃霧相邀遮濯濯榑桑枝浮廣育朝霞朝霞蔽昏雨連隂交沮洳潤澤不周物何如一壞土其二自為蕩子妻身是良家婦蕩子事萬里縱橫窮幽討會促别日長非恨相拋早恩義在人心窮達安足道况未居貧賤心親情不衰黃金舊叉釧長日市餔糜留得形容在當見歸來時劉紹山居十詠十首柿林月白霜花濃青天紫雲起連林三百株錦障四十里天然吐竒粲豈假粉黛貴燠此丹霞藪終年擅七美廣文惜落葉萬斛書漢隸頗怪不出山多為勝槩纍蕉澗雲卷緑玉函東皇閟丹經泠風時一展葉葉開天青下有暘谷波上激天籟鳴披函玩膏液神龍躍其清飛火鍊金鼎還泉漱瑶英雲卧蔭緑髮清心仰天行芳緘不動色卷奉兹山靈但恐緱嶺鶴衝之上紫京仙臺山仙臺何穹窿蔚當霄漢表二儀割天險恥接羣峰小滄溟環其左華嶽備列曜虎嘯風出林鯤化雲起沼煙蘿秋可掬璧月夜還照山人茅宇深罷瑟發清嘯濯塵坐磐石習靜窮要眇兹山與憑陵氣岸成二妙吾知雙龍物穢迹沈光耀烈氣不上騰張公復何誚蓮橋十里紅雪香流虹來飲水溪光醉心目枕石眠不起恍疑天台路霞散石梁綺路出鏡湖秋分明若耶似石泉庵佛法如止水以淨悉諸根道人湛虛照結屋俯清源燭燭摩尼珠能澄濁水渾如筏渡彼岸水行龍力勤觀相印朗月見影了無痕世學昧此理此理世罕聞鄰山龎居士可以喻吾言慧月寺逺公結蓮社康樂愛名山觀空知佛性歷劫洞人寰般若微塵大須彌粒粟慳千蓮出火底一葦渡波間苦海旃檀閣虛舟明月環梵煙金殿古花雨白樓斑得句從鄰近投書憶大還來題鸚塔偈笑别虎溪灣勝概文章在禪心日月間好因清淨域了悟死生關瓦窑峯槖籥鼓形兆羣動皆森羅滄桑理更變否泰無乖訛山嶽在天地洪爐查滓多人眇海中塵元氣克負何浩然遂所養鼎鼎居天和用能充六合卷不局隈阿芻狗昧前度宇宙則何頗哲人懋貞節危迹混其波靜性安吾仁道存心匪他眼中對崒嵂胸次蕩煩痾鍛鍊我英氣陶冶使盈科非必事清玩探竒聆笑歌誠願宏偉度勗德保瑶瑳鐫辭有昆刀萬紀庶不磨興雲嶠虹光石磴曉黛峭空崕淨飛龍蟠古根神動如見影乾元握機化天人兆玄文圭璋羅前星川嶽遙吐吞萃靈胤碩德閟精啓偉人奮激風雲氣超越忠孝門天樞裂管轄大經洊違戾聖道與時闢上智韜冥翳潛幽遂遁頥堅髙屹相峙九門風浩浩崢嶸深窟底神變感無方多自池中起桃花泉自别劉郎後鉛華棄不收胭脂三百斛亂點碧波流照日霞光爛啼風淚血稠愁心寄春色漂蕩曲江頭鳯仙坡吹笙望碧海徙倚卷石間桂女紅玉頰雲中雙綵鸞排風下層霄翊衛停霞幡南極一古老龎眉如雪皤擊節諧宫徴流聲響空山王喬謝律度正容來聽觀鈞天欲備薦風雅傷凋殘知音天上少莫道世人難曲罷登螭駕無倪以盤桓有感三首宋人不識玉至寶竒燕石乃笑卞和愚哀哀負刑厄多見嫉邪者羣邪乘姦慝齊聲指佞人世爾乖辨惑帝舜友傲象士師謝盜跖賢聖天倫際判然不踰閾俯仰無愧怍孰為名玷實聖道大坦夷名言日昭晰其二燕人少作客老歸不識鄉過晉誤形似血泣廬冢荒一朝達故墟悲盡更無傷嬪婦慟前夫來者誣其聲誠負金石心豈有後來情親疏迹既亂真贋世難明斯言傳千載周孔當復生其三海鳥避風濤安得饗非禮小物去就輕髙飛擇所止燕雀企遐慕鴟梟兀而峙貽笑魯展禽垂涎太牢味事多輕致重理有譽成毁不見鄒孟軻泣下心如水奉寄黃編修肅楚楚清夢闌晨月燭我帷起坐瞻華宇繁星粲以輝所思竟長夜室空終不歸及此忘朝夕為復夜何其君亮蓄貞幹不顧兄弟私願為雙鳴雉五采麗天飛曉立在山日苦長在市日苦短蹊險水流急溪平山流緩靜中涵羣動萬理歸一貫驟雨漲百川入海略不滿參橫月過畢半落夜當半野曠天風清立待東方旦在海上作扶桑升朝暉海水深波瀾坤維儼靈軸乾象耀浮寰一氣混元化二儀相轘轅百體本巨微生類始頗偏人生無賢愚舒卷信有然何者齊彭殤萬世俱摧殘鷦鷯以微免吞舟保巨完潛澤所不容不在潛澤間淡泊齋詩解我彭澤綬歸條成都桑功名諒有素苦節保貞藏芄蘭生中沚幽夢結春芳薦馨不同時藿靡竟夭常軒榮邈若遺立志懼弗莊佩服哲人訓逍遙時景光詠史尺音有重根腐新有餘輝誰是悲鄉土棄置草間啼蘇季百金盡還家恥嫂妻一朝冀榮寵出口保安危富貴不役人兒女自奔馳何言况草木及時遂華滋客子常畏人途路有相知擬明月何皎皎明月何皎皎列宿縱復橫延襟坐華軒泫彼秋露零矯首俯流景浩嘯激凄清回瞻嶧嶽礪左顧黃河縈素心邈千古悲歌雄劒鳴何得同志士指點向青冥御風凌八表歡笑極中京永願匪易愜壯懷空自憑崑人辭客行無停棹言念道里違憩息棠隂下聽彼崑人辭新官雖云好終是少相知舊官不可師我里日已疲昔采桑樹葉今攀桑樹枝今日獄訟理昨日獄訟稀公庭髙且逺所思諒何依俯首東南城使星徒參差空山茅屋詩為何伯明賦弱齡局世患習靜窮山隂放神八極外萃此虛堂深伊古達世士抗志青霄岑卷舒景元化事功所克任歘興有明運獨善豈初心抱膝非茍藏何傷梁父吟清泉足洗耳磐石坐弦琴道引牛車駕隴避鶴書尋倘瞻芒碭氣不得謝投簮古意妾身當何許君來相爾汝煩憂在胸懷轉厭聞笑語妾面芙容紅妾心蓮菂苦蓮菂苦心盡芙容守紅死不學鴛鴦棲亦化蝴蝶舞樹中草微根拔下土賦質寄髙枝懋洽陽和德恩榮雨露私承條交緑潤並色奪青輝繁隂分雪積強幹障炎威風搖知雀過葉落畏鴉飛被蒙翳護情矯抗中立姿願宏千嵗久結託百年期厚德良有懷深根死不移自勵二首但見日日夜倐焉冬復春賢愚一逆旅萬有終埃塵少壯志經濟為邦心不泯勇行成齟齬恍若墮重淵道德弛英芒乖違千古人中途喜王霸達道求諸身何言事狡獪韞櫝全天真知非未五十惠澤謝八垠至德各勉旃綿綿安世仁其二輪蹄激塵土青天起埃霧來去不可留日日朝成暮少年忽老醜耆舊漸物故借問疇能然烏兔無停度英雄暴威武曠士守沖素覺悟哂愚迷聚散均迷悟聖賢誠有道遷化歸何所理運本自然希君早回顧贈劉紹陳介程源至寶任天棄奪天厄反深舉世笑愚人孰撫卞和心自有燕石來碔砆不光輝塗朱覆以墨轉覺朱無色穢富恥貧士讒毁成其德賤交吹毫毛井井中私億聖賢求同理流俗計汚隆因笑夷叔狂甘死戴昏庸義有重山嶽性命毫髮中委身以成仁萬古蹈遐蹤答劉紹四首僕前以詩贈劉紹陳介程源紹獨不取詩之意因勉答二章今附于此僕復以四章答之大器貴深藏藴真匪求售三獻事可羞刖身竟何咎紛吾迫世網往者負深疚坎止斯見幾悔尤詔前受凄其盼夷叔今古道容謬千駟未足誇食薇詎攘詬所悲同轍鮒濡沫感深舊堅白不可緇含章託坤厚又跖蹻負浮榮孔顔致深厄福善理有違昊穹意難測羈艱昧前算處賤同逼側蒿目虞世情殷憂浩中積非無凌摩志日暮還斂翼在野蔚羅張誰能中鉤弋英賢昔轗軻貞遁介如石猶有鹿門期希君恆守默卞和事三獻孰恥顧一身舉世惑大寶刖足豈傷仁亹亹夸毗子英英負世珍求售嘻不逮隕身良有因富貴或擬倫節義私屈信大寶一失所因之斁彛倫矢哉甘戮辱迷誤遂知津所以誅心源負愧多古人其二君臣道已喪夷叔表中興亘古髙其人綱常所由徴宣尼聖之時激揚於濁清列聖各有方易軌不殊行異端絶潢港寥寥以謬稱至人驅衆疑析理存大經其三聖賢任天道致厄故恆深跖蹻鼓邪行汚昧已力任梟鳯非倫方福善禍終淫前籌信天啓茂德日居心固窮道未賤君子豈嬰忱其四美女事寒夫身為貧家妻百嵗同生死天常義無違貧家日淪替飢寒切膚肌美女舍之去自言幸見幾人情雖賤惡故無逼側為志士避世艱如何當見危劉紹宅刻竹旭日隕朝露孤芳挺修楨泠風沸天籟偃羽助金聲惟彼青雲士虛心事友朋冥棲奮逸想苦節道彌貞千秋勗雅操徴德以崇名表幹克端直繁實諒敷榮綿綿相照灼顧盼道所膺洗拂九霄上知時來鳯鳴畫菜為曹銘翁賦太牢尚甘肥至味淡以醇達士飲天和養頥貴葆真膏粱薄滋味不使口纍身不見啖氷蘗勵志以成仁畫圗逼爽脆老圃有餘春願一驅腥腐彌蘇肉食人題歸山卷子蔑俗薄功利束書歸舊山羊腸天坦夷比足世路艱蹇子越時網倦翼尚知還疲驢愧駿驥猶可代躋攀山闊煙霧稠如凌青冥間雲梯一萬丈舉手傍天關拂我三珠樹秋花正斑斑徒侣希世儔羣儕美令顔泠風挹仙氣內視有餘間返真吾廬下始慨昔非難樂善齋詩為周季持作哲人循天性棲息有餘安日居月云積達道本夷寬動止仰明訓幽憂無異干德心逸日休在已良足歡雲行布時雨乾健侔天觀蔚爾澤四周闓舒企宏端卷藏杳滅迹深窟或龍蟠用舍所攸宜及時則大般怡愈順我適矩度何疑難卓哉勗前修勉力誠未殫胡永年兄弟石莊八詠八首固陂九曲疏鑿道江海衍溢入陂渠溥澤均霖雨小施溉災畬神功被萬物退舍用還舒九淵法修觀南溟化遊魚玄感無小大飛鳶戾蒼虛碩德一流暢千載固陂如響石曽標混沌裂元氣萃華胤剛瓊泠風排四表金玉韻秋清拂此蔚藍色湛之太虛聲龍騰因挂影鳯翥或諧鳴山雖緣地秀地固假人靈濯濯紫荆株灑灑黃金莖升曦相照耀竒采煥交并君子介遐祉石年與天傾永興鍾梵鮑照在山澤幽居鄰湯休髙談超物表脫略事天遊常以金縷偶敷言寶華樓大地徹風輪若海纜虛舟越彼人我境九十一劫周鮑公遙領悟緘默晦所投宴坐薝蔔林冥冥思葉秋佛來魔亦去客往主不留智寶已具足色身寄蜉蝣永願棲大乘觀化登名流毋以一木杯凌河渡滄洲古印雲舂山水亦機括因之功利生真端任理路關鍵合天成動以勢使導靜為物批嬰自非玄象運孰挽天瓢傾吾宗世文印在在光儀刑含星出坱圠石氣秋威稜衍拔相主客奔衝實憑陵微波遙黛色絶谷應虛聲朝旭承碧霞雲錦眩空青披賞愜貞素喧紛融性靈山外非無響囂囂人力營湖墟嵐彩曙色靄六合空濛切朝光山人早集市如在紫翠鄉暘雨無愆期三農藉時康秋登既慰意耕絍亦有方咫尺接城府終年坐相望贏餘兩貿易匱乏各充將聞道長安市金門白玉堂我屋補薜蘿楚雲棲中梁聞道王侯第綺食錯珠漿我有平皋水清池薦嘉魴寒不厭縞素飢不絶餱糧生無豪貴夢安分乃天常獨羡南飛雁髙視蔚羅張流月虹橋飛虹跨瑶澗縹氣拂天起金波漾空潭碧落如秋水風行鏡花亂玉瀉菱光碎虛冏冀澄清神臨宛如對棗嶺樵腔纂纂橫林樹商聲起樵人南山日在眼白石調悲辛絲管雜紛韻荒淫信殊倫參差激吹萬流響發天真灌木嘯烈秋萬籟傷形神寥寥徽音異希古踵清塵倘逢堯舜禪此曲豈重陳雙溪磐石吕望得賔師嚴光避臣服共守磐石心俱把淇園竹釣竿何嫋嫋芳餌且肥鮮長絲非挽俗直道尚鈎賢石流何齒齒潛波緑雲起清濯漁父纓淨洗巢由耳達道志天下山樊知坎止隱顯古何心悠悠雙溪水艮岑菴詩堯以天下讓巢由之河濵迹隱道彌著求仁斯得仁龍驤迅逸翥蠖屈求其伸所貴委虛尚名卑實為賔至今江海間畫圗識潛淪黃子慨英誼正焉意忠勤衆見亦云非鼎鑊無全民寥寥太古情卓絶志不羣展卷清秋杪長歌當八垠題畫夷逸非朝市山水擬蓬壺金銀初識氣鯤鯨猶學魚緑徑通華館清闌傍石渠排林疑礙日濺瀑不成珠晦迹嘉肥遁壯節介貞居磻溪本坐石圯橋或遺書曳杖將何見候氣啓天圗種菊軒解綬去彭澤養疴向東籬團團清秋露湛我黃花枝擷英飲膏泉益志登期頥花木以人貴擅名隱逸宜倪君仁者夀愛物誠不疑矯矯懷古情抱此貞獨姿名花七十二苦口清心脾介夀邁前條世澤及物私偉矣勗繁祉千秋表貞期雪漁吕望干王輔嚴光髙友道共此嵗寒心同功不同操窮隂迫天暮華鄂亂飛皓不易餌物心得之彌草草吾聞釣賢者直取無曲抱異此斂藏時暴軀以佁好希賢果何尚事功匪人造出不枉途曲處既避名盜于理有可徴斯言儻綏勞題畫陶唐民熙熙帝則不識知惟此箕潁客天下邈如遺遺身在江海擊楫風雲隨漁鈎非餌賢直道取不疑薑尚干西伯范蠡薄君私絢已有中道嚴陵為得之豈必煦煦仁超然陟髙危何似異形迹枉道達先幾出處志不侔矢心毋自欺壯懷麗鸞鶴飄颻橫天霓寄言垂綸者髙風恆若斯雙溪佳士詩雄山峙飛壁環以雙溪流中有遁世士探竒迹冥搜山川愜素尚城闕希同儔緇塵涴素服白眼偶來遊玩景隱顯間放情八極周日暮睇故園回岡沿近丘塵纓思一濯跬步林泉幽豈曰曠流覽豁然清殷憂卷舒合天隨匪躬道不侔烏喙日已逺安事五湖舟楊國順先生畫像伊昔當明運矯矯人中龍卓犖志不羣青天貫長虹達人識時變身與道汚隆弓刀正旁午斂迹如旋蓬以我風雲氣蟄之掌握中歸休故山陽邈若遺世蹤坐致渭川漁言尋黃綺翁姬昌叶吉占久矣俟清風金谷園圗楊周卿畫列棟煥金碧鱗甍擬天居層樓何巍巍覆此萬斛珠伊晉厄陽九哲人遘危塗豪奢稱敵國氷解理無渝萬金增買死寸土不掩膚何必一榻安千椽為人娛楊君懲世者告誡以為圗送楊周卿歸故里雲卧愛丘壑冥棲此山隂因之紫霞想俯首故山岑故山楚東曲清池俯喬林忽忽桑梓夢如聆猿鶴音玄壺不縮地乃致山陽吟淡墨麗形肖飛神宛如臨圗以愜貞素詩以曠幽尋浩歌待明時當君諧夙心會稽夏衍宜陽八詠八首經畬堂太極判羲畫執中啓堯咨列聖垂教言典墳萬世師言以立人紀理用綱天維緒餘遺土苴文章觀設施簡册炳日星丘索範模規空言繪行事先哲豈吾欺力學迪前條寸晷猶可追三年曰成效蕪穢已伐治登堂仰聖訓勗此天陳辭碩果軒萬物遂時養實充生意敷君子復正道德為民所輿冠毁裳亦裂剝極理既舒乾健無間息翕然返厥初將非兆機括厚積恢逺模名軒識深義行矣盼良圖垂綸磯為嚴公逺作清風嚴陵瀨鑿鑿白石磯方乘我賔僚爵祿亦已微先民確直道貧賤不去之至今麟鳯姿髙光邈難羈西流晝達夜魚變學龍飛念彼垂綸人磐石屹不移坐觀成陳迹俯仰忽如遺寄言寥廓者淡蕩滄洲期大迂墩至言似濶略至理罙超特矯迹同汚曲巧諛為德賊古誼尚孤抗人情悅顔色誰云背時好彼棄此獨得丘垤傲睨物磊磈與世隔因之翹企情乃眷疏慵客紛妍恥抱拙擁腫疇能測苦節嘉遁頥千秋諒貞白麗澤池道德貴涵濡利濟兼天下養容功浸潤均波及物者猗惟抗志士守株甘在野同氣不孤鄰淬礪于時暇發蹤宜有素功用壯揮吒期運期迅符黔黎亟霑灑鳴琴丘熒熒枯桐枝絙以朱絲弦秦筝奪素淡雅韻久莫宣金徽滅光采試拂龍唇圓古來有貞操彈向薰風前一倡無再和諧聲徒自妍不辭今絶響恐墜昔所傳引領睇冥鴻南雲際髙天心心託泠風碧落不可援緬懷丘壑誼交石弄清泉長嘯謝華袞山林期永年容膝聖席不暇暖賢室掩榛荆錦繡終被體華居非養榮天地一罏冶品彚陶含靈山川布帷薄日月昭文明烈風扇枯條樞牖障頽傾衡茅蔽凌爍自足謝厦成居安一榻廣任道坐無營孰謂天下理毫芒違此庭林水旭日標海嶠林泉切朝紅堪輿竭萬象落我杯水中晨起御旦氣憑髙挹青空放浪稽古懷蔚為經天虹大塊合噫咽流波西北充撫運慨神化養直守屯蒙途路何嘻嘻玩芳安所同余意在塵外去來彼閬風隱居圖神堯有至德巢許遂孤髙揖以天下讓去之如委毛衆人何囂囂逸德彼終操至今山澤士矯節託蓬蒿頥遁固貞吉潛光事天遨耕釣我所安吾廬緬江皋相從有歸人五湖棹輕舠握手話穹壤延襟息塵勞樂天以永世千古藉薰陶示同難二首白鶴何嗷嗷遺侣羣胡雁飲亦共清泚飛亦振霄漢路逢王子晉矯手緱山畔一舉凌九皋再翔俯日觀仙物終騰邁九靈每淆亂垂聲謝同義毛質已殊判其二翩翩雲中雀嘖嘖麗重霄小物易髙鶱憑空睨鷹雕剛風播九有薄翮不崇朝上辭搏擊禍下值虞羅邀升髙志恆溢禍淫由自招持盈有介士林藪羡鷦鷯刑柄刑柄一頑獷撲教勵廉恥於情無可矜先王非得已大禹泣下車堯舜民心已海枯石亦爛候不逢其世先哲傷季時謀心人自愧枉枉直其直為敢劇如此不聞枉其直棄置於無地耳目忍及之而况躬臨涖何以言蚩蚩古道心如水清風亭詩為鄧彥誠賦道在心適安身間景逾受孤亭納虛冏六合屹曽阜衆人瞻泰宇我不恥華構俯視浮雲生斯須變蒼狗卓哉雲林彥龍卧亦蒙垢一返南陽廬韜光閟天牖端倪此終志百鍊當摩蹂杜德固有機申章藉坤厚送宋都事之河南省幕小邑失賢佐雄藩屬英才偉哉中原器功自咸寧來天道聿更化謀謨克幽諧惟難在贊理宋子鍾輿懷擴以一方澤屏翰敷春荄熙和叶嘉猷洗拂剃草萊禆化廣遐邇豈獨河南該行矣勉青年鵬摶凌九垓奉和劉二紹見寄秋懷之什二首四澤被重隂羣芳播蕃結潢汙濯霖潦江海逾通越朔風號外野來雁初悲切塵匣閟純鈎千秋玉花熱清霜逐流景常恐飄華髮靡靡萬古愁南天耿秋月釃君酒亦醉服君德彌潔猶有慰羈孤鍾鏞為豫發其二卧痾煩幖帙攬衣起弦琴慨彼古哲人危言豈傷今至德諒遐曠南薰嗟陸沈泠風拂朱絲朗月為知音霜露泫時再羈人將苦心平原落木下灝爽澄秋隂羽鎩孰興眸鷦鷯克幽尋莊夢囿成算杞憂非己任長嘯舒憤衷逍遙肆沖襟壺觴藉儔侣不醉復同斟煮石窩詩為道士陳虛中賦元氣運槖籥乾坤為鼎鐺開明陶萬類金石融光晶却老助脂髓還元得長生至今延外景禆道蒙常經龍虎相埏埴天和內交清回風洞九有保合一我靈朗朗混自然無為人自寧閴寥太虛象湛冏何泠泠方壺吞吐雲夢圗為劉二紹賦天地一俯仰有形具吾中驅之布海嶽納則包鴻蒙浩氣溢八垠浮寰融化工卷舒事在我至道豈汚隆偉造廓神設括囊非外容恢圗卑贊育沖抱懌屯蒙徹迹飲太和澄心一醇空茫茫剛風外槖籥以還終方壺雨後青山圗為劉二紹賦磊磈在胸中天瓢洗空翠祥風淨六合運廓大無外遐峙仰英芒貞剛礪竒瑰堪輿安覆燾日月任顯晦形肖幻天設混成稟神萃壺子仙者流迹我乾坤蛻陳懷簡劉二紹薄德纍虛名自反安直道踐艱知逆順冒恥成醜老撫膺有夙願不昧惟時悼日月信昭明羈違亦枯稿髙堂垂白髮弱女離襁褓誰能客彌年觸此嬰煩抱摧頽動履拙迂忤鍾天造貴富不可求泰然從吾好息庇四逾月沈痾迹如掃沐德薰教言掞文煥聲藻多君懋古節金玉堅相保努力振儒風宏綱布穹昊戴孝子詩綱常分內事彌重者君親家國有不幸炳焉忠孝人如何百世下德譽乃諄諄勵此梟獍徒庶幾薄俗敦遊百法寺懷香峪主者喬允澤澗峻流益急路險山始竒徒耽眼中趣豈覺步履危豁然逺平原始訝來徑微平生山水志道逺足力疲稍息百法林洗心澄江湄釋褐了無言懷賢如可期素聞薄簪組幸可謝塵羈林下間居意惟應靜者知魚藻圗為官得名賦南溟富天藻鼓翼運遊鯤一息掩芒忽搏擊浩八垠穹壤局其卑摩空儕鳯羣斥鷃與鷦鷯貽笑腐草根孰侔超物志恥彼洋洋人寄言髙世才千秋揖芳芬題米元暉萬里意為葛彥誠賦流目浩八極長江際青空遊鯤方運化震蕩顧盼中大塊何茫茫百脈本源同日月彈丸內經天西復東浮寰豈無垠一息以知窮笑指虛舟客披圗灑泠風為劉俊民鎮撫賦蘭室詩志士確貞操同心藹芳言靈均世已逺九畹秋霜繁託根君子庭聨芳燠朝暾氣物以類感薰蕕齊化原有德此有鄰天和煦春溫文修武亦備仁至道彌敦勗哉定王胄餘慶在賢門奕葉表千祀矢言並清芬答霍共辰見寄青空奮雕鶚快此搏擊能毛血灑江漢赭雲為之興鵬飛息南運飄爍無所憑往窒止亦艱剛風浩難乘希有鎩徑翮顧軀內若崩同類感愆尤鴻濛適相仍氛埃幸倐忽簸激尚泓澄終共翔寥廓清揚傷沸騰四時四首投迹泉石間怡情事虛曠和風藹庭宇弦琴發清響青陽暢萌達萬物日滋長膴此生物仁倫儕迹幽賞間居永年夀安阜遂時養山水有知音滄洲緬遐想其二炎天日益長我屋青山下松濤隂籟沸飛瀑交湍瀉掃徑延親友棋枰坐清野永晝無雜言機深敵彌寡塵勞願屏息心手乘間暇勝負意俱忘傍觀奚足訝其三金風蕩囂暑髙天散餘涼樓居愛清爽良友來何方牙籖榜羣帙肄習登時良至理何昭昭稽核窮干霜蔚為命世賢道統紹羲皇餘波禆聖化皥皥斯民康其四繁隂沍凄洌九野天一色伏檻睇逺山瑶華灑虛白至陽冥物化羣動根無極開端兆方來轘轅循軌則展圖契周子設象明羲畫太古畫如何鴻蒙非象識山隂興西野皓積雪故人清賞違扁舟泛明月聚首良可期浩有握手志而無覿面私情深豈憚逺情盡返不疑往復成吾趣何必待渠知晉人事脫略風致畫圗宜志士勗前修何言清曠為顧定之竹石圖為趙文諒賦緑竹生秋隂拳石通雲氣瀟灑畫圗中一片江南意穆如當九夏四座涼飇起寫者野王孫寶之宋公子方壺聳壑昂霄圗為海百川賦出門見竒石舉首日月蔽砥柱屹中天孤髙障元氣膏泉潏成澤伏蜃下窮底露夕散涼颸秋芳藹藂桂山樊容偃蹇浩素澄涯涘潛德貴頥貞達人知坎止次韻鄧子方真人述懷之作六首曠士謝塵樊鄙夫瞇時網卷舒分靜躁適意優得喪遺珠今何在千古較象罔膏火以明焚風泉假空響誰能廓靈府古道緬夷蕩其二遊鯤方息運斥鷃遂貽誚去取相是非抱熏自焚燎殊塗登正軌萬轍遵一妙至道契忘忘漆園有同調其三和氏不自惜乃寶希世珍舉世惑耳目疇能識仁人知言諒有以觀水必遡源東湖候諸葛明哲可評論其四流年撫稚老憑化觀始終珠玉矧自懷逍遙適微躬萬物不異我陶然藹吾中誠能造要眇未敢辭道窮其五振衣步空庭涼月耿窗户單居淡無營飲水味甘露壯心委時邁一志確純素有道居靜専何傷業遲暮其六止水見毫髮秋霜雙鬢侵欎然思古人愧獨非我心體受安定分歸全思大任終當勗遐祉千載擴沖襟元音遺響卷一
