body:
  text: 元音遺響卷二元胡布撰五言古詩周秀才楨入閩采詩大雅三百篇詩亡千載下蘇李泄其淳曹王綺其亞六朝相侈靡鏗遜諧音聲唐始鳴清新李杜乃恢宏下逮末世才浮華虧理質豔冶風月間鄙俚寡聲律鐘鏞久絶響瓦缶暢紛披雕琢掩神明舉世尚然非喧闐起好惡摸倣牽緒餘糟粕益縈纒駁雜昧専途君子悼世降詩廢理隨湮不有關禮化曷得較情真眷言觀世風無為擬纎郁尚録七哀辭因之四愁曲聖哲存鄭衛返古勵澆漓鼓刀叩角語不得獨棄之子行保明哲履視勿傷殘八閩多霧雨杯酒以加餐丈夫局空堂天下終環軌異俗有所尚尤宜陳厥始髙志古人行力求古人心行當萬里外洗耳治平音與劉紹論詩文作黃口至白髮鼎鼎鳴文章嘐嘐古之人濡沫粃與粳既無卓爾見難局升斗量披竊月露餘已如風雲翔翹首故踧踖稚辭聲老蒼識每下萬人足未踰一邦師學無從來反規以求方留難譏苦澀陳腐始馨香烈烈三百篇王風肇鴻龎五言起漢魏已泄大雅莊文字炳秦漢六代弊流唐對偶一相諧理趣因隨亡况事尖麗間委曲叶宫商言新意不續道失語徒狂朴素輕典刑巧薄髙飛揚稍無效顰恥安受時譽光我欲竟此曲此曲悲且長枉君陳矢辭端謁世儒行友竹張神童歸林之軒緑雲藹千畝緑玉灑寒梢苦節承孤幹虛心納故交神鳯酌清醴葳𬎼紫金苞珠實為其食瑤林為其巢朝陽何杲杲刷翮秋空早華采麗曽霄長鳴振穹昊浮雲如車蓋奄忽摧陽光中道惜羽儀回身歸九章託以千春秋冥棲最嘉祥梟獍亦有科雕鶚且飛揚磔彼父與母搏空啖肥香小鳥有同心鷦鷯一枝藏時哉逰郊藪永協瑞世康不逢堯舜禪共老丹山陽示同志張仲文學苦未達道時乖豈尤貧自矜事育恩敢辭萍梗身不逢鴻荒世仰希太古民薄宦一失意屠釣乃逡巡家國有深願大任非小臣投迹去兵戎東西南北人逺遊戒明訓念念倚門頻親歸良悅意窮山思隱淪殷勤菽水歡慈愛見天倫業田盡鷹犬所慮熾膏焚而我甘淡泊里市肆紛紜委吏無茍安擊柝久不晨何况浩然氣揮霍欲成雲志大時不偶情疏義更真白眼泥塗裏黃金安足云永願果同符早承堯舜君一夫無飢寒理化職全仁尚友魯連子長揖恥論勳留别本齋姐夫久客慣逺道臨岐憚感傷愴為百里别執手上河梁昔者浩勳庸弱齡志四方事君恨未立老母尚康強揮金閩楚地泣玉吳越邦南北千萬里長驅不裹糧嶽氣凌紫霄龍精閟隂芒王霸道異同弓刀非我長脫略簮笏纍輕舟泛滄浪掣鼇東海上濯足潁水陽豪傑掃六國川陸淨江湘招要故山鶴歸拜幽諼堂骨肉忽滿眼甥姪紛成行老母念幼子眼枯緑鬢霜子負家國憂雄圗蔚不彰顛危建苦節直道矢行藏豈敢後溫凊終身懷顯揚倚賴諸兄姊孝養竭天常各惟膺重寄忠孝篤彛綱塞風吹征棹足迹君子鄉姻親敷世好道理故相妨我姊忝齊眉我甥偉諸郎十年手足情勉飲各盡觴至愛有深期宣言著瑶章拳拳登嘉誼佩服安可忘釃酒睇遙空熏膏淬干將努力䇿迍賤敢渝日月光翹企鸞鳯儀千秋勗貞祥眀時事開濟同致寰宇康答黨萬至人非寡昧豈以纍傷生飢渴且不顧圭組安足榮惟昔被清時拳拳志儀刑休禎允克任濟世豈無情常恐後子民矢心戒驕盈乾旋有晷度徽猷有常程而我際艱符摧裂負初心長路何迢迢十步一屏營駑鈍非不前繁霜濡素莖矯情惠中達守墨故心冥植德冀封茂懼隕負荷名居然一培塿寧為岱嶽傾自分全其天夷曠所服膺萬物貴有適尼父惜繁纓杏田卷子韓公避名纍宋子毁積劵匪矯濟世情達生尚周變惟昔符元運決志乘化機孰謂惟蹇患獨善眷疇歸至德互不渝否達理宜為陳力追往哲肆飲聆上池哮虎無林居蕪穢深自治諒由方寸理春陽燠物私纍纍丹葩芳離離零雨滋沖霄怡逺性涵真瑩康期願席保民術以遂戴清夷奉寄邾郳仲昔從太霞君東入蓬萊山浩嘯俯寰宇風雲隨往還揮手招玉華凌虛步瑶壇粲粲六銖服歷歷九星冠被體蘭紉佩餌砂金作盤授我空洞章保服千嵗顔竦身隔弱水指顧邈追攀雲淡綵鸞逺月碧洞簫間悵望不可及凝神霄漢間題黎川鶴仙觀壁四敘相代謝萬世迭衰興此身非金石詎得免枯榮往念艱道途今歸復紆縈南榮有至戒東野况疲征跬步陟幽素尋古竭玄冥何言土木摧不辨犀象驚飛塵亂縞綵畫迹剝霓旌碑隂揭代久籖史見神靈仰聆雷霆聲倣佛鐘磬鳴仙凡成濩落遲子獨凄清役役百年內悵惘歎勞生逝川日已逺緑鬢尚含情對此滯久懷壯心空屏營而我千古意日月何當明終遂隆𢎞度一使戴休禎毋為局流景矯首謝方平長安道秣馬晨登道長安樹如薺非必松與柏藂深荆棘裏霧露襲衣裾嵐光惚雙眥泥深馬沒足頑石嚙屐齒夜永慘林猿月黑亂山鬼男兒負長劒慷慨事萬里莫邪雖栗烈出匣刃傷指跋馬東南望泰山髙可擬思我同心人銜杯淚如水君自亘長途企迹逺遊子中行多曲折汚險豈自止虎嘯獨驚風鳩鳴尚愁雨盈盈踸踔步嵗月不吾與願得凌穹壤披豁我心故鉛刀况可割鷦鵬終一翥壯心劇良圖奮迅欲飛騖反君馬黃良馬處內廏食充體滿盈肥驕反促氣緩步駑駘行六轡間金錯緑玉曼朱纓羣羈相照耀障泥錦織成矯飾有餘輝奔突力難勝極知非詭遇牧養過嗟稱吳坂險而峻天間豈復經危機所不蹈馳騁尚無能伯樂委時棄九方謬見徴終然具形儀才德假虛名汪洋縻天祿君恩素匪輕義當竭賤愚報效乏忠誠有知寧負恥顧影絶嘶聲造父猥哀憐備存竟何榮臠肉奉庖御庶以謝天刑奉寄劉都司紹詩并敘僕與子憲為世姻家曩俱客閩師不克所志既而參商南北者踰十年始豫留浙秀州州進士聞人樞上春官還得黃編修肅書知憲自京師出佐汝南王幕又數年皆以天道纍纍返鄉里始傳亦南還憲至浙而豫巳發棹矣抵鄉里留連信宿悲慟驚喜為之澘然者再四憲歸省墳墓復天倫相望卜逺而拳拳之懷不能輒廢非長詩又不能敘情斐然成章因便以寄伊昔負雄略義客王師壘決志歸一途預籌失得纍敗亡均自取好惡擅功罪在在勢相髙起非衣裳會利器已瓜裂外否由中潰孤憤委良謀全身保先退我時瘴癘使分迹南荒最子學魯仲連乘風蹈滄海區區縻浙食友信魚鱗萃逺得翰林書殷勤報同類子以直相忤去國佐中外汾陽知待士得才契魚水青蠅登市朝兀隉賢良輩周吕友人周壯興吕學可我同儕去留豈乖背夢寐想容輝停雲邈如對始子過西湖我適先歸佩應酹嶽王墳蓴羮斫鱸鱠及兹一握手驚喜成聊賴共保生還軀暫收家國淚死者何茫茫生者蓬根脆離别踰十年幾何天地內寰極閟神寶嘉遁嚴幽晦將使全天彛同塵養貞遂歸來舊雲壑第屋依松檜翾飛在清時德盛功逾邁相望泰山髙縈結黃河帶趙竹所挽詩伊昔寄閩壘處義同休戚大臣或齟齬中外懷震迫倉惶問親故孰是周反側翁母煦春和舉手蔽憂特自我使島夷獻嵗一再周銜命出蠻障折膂負國憂天道惡險盈人靈誕阻修遂使狂馳子纍纍反舊丘翁母敦古道踰情骨肉親非無骨肉親反我衢路人銜恩重至義感激發天真居我所居堂食不異盤飱孜孜相勉勞崇朝以至昏八月海查還始愴河上别翁母留王山我家客吳越十年薄宦情未老心先輟流歷曠南北浩有志苦節鶴髮倚髙堂逺遊戒先哲南歸語天彛母老父就土方涕蓼莪詩况聞翁母故艱難賢令子伯也守先墓煙霧萬山深不解逺行苦往願偕父歸仲忽哭父死何言離家日正翁萎棄時母墳添宿草新塜暈苔衣兄弟松楸裏淚血亂交頥負骨自閩嶠陟險歸故山故山秋草白修竹雨斑斑念我五情熱肝膽為辛酸崩悼撓胸次撫墳咽慨歎所嘉兵革地翁母保稀年二子力桑梓何憾悲終天咄我千古心忠孝未獲全因之激世理揮淚不能言贈别陳景夀還會稽景夀父思可與余為友任崇仁來攝金溪生世半行路暌違夙所經如何千里外復此慰人情念昔與而翁友誼如弟兄窮途負烈氣轗軻不易行一别四五年雲泥阻修程翁時被鶚薦歘起厠羣英飛蓋荆楚來鴻雁有遺聲崇仁禮義地文雅世推稱理化吳夫子百年光典刑粵從攝上幕去苛以廉明佩服登法言期月報政成我來僅百里炯此雙眼青殷勤成悲吒欵敘念平生往與翁别時翁壯我弱齡今歸喜聚首翁髮已星星諸昆忽老蒼玉立美璣瓊仲也眷桑梓嚴駕夙晨征霜雪山隂道禹穴見天清感彼逺遊人愴恍懷內驚五年一握手百嵗幾合并鼎鼎寰宇內日月屢虧盈當願勗偉才太丘好雲仍勞翁司民牧拜掃切憂營勤子省松楸親故問安寧兹行保明哲早及綵衣榮相勉無誕辭克全忠孝名贈地理曹希鳴昔我候雲氣力窮芒碭山因之察地脈龍虎相蔚盤玉陽玄星人白日駕紫鸞佩我豁落圗籍我鬱羅斑指地穴丹屋回風鍊大還飛光繞隂井百日造玄關斷自郭景純文成啓其端一悟山水靈葆真寄浮寰芒忽視下土誤翼橫天翰山河不足斂天池為之乾曹子羲皇人東來慰憂患捫胸粲星斗流目渾峯巒五嶽等培塿風行穹壤間顧陳列仙窟秀結金斑爛疊疊蒼龍枝習坎清紅環我欲遨八表凝神萃竒觀並子白鹿車朱輪明月團蓬萊好形勢三十六轘轅射的峙其南弱流為襟闌穴去黍珠境歷地五丈寬子能弄紫翠逍遙達泥丸何必張孚子驗法九宫安經荒原廢冢作白骨何颯颯霜露所摧拉狂風吹流塵日久成蹲沓烏鳶啄其腐狗彘充莖脆遺骸能幾何委棄皆查滓誰有百嵗身而多千嵗計劫劫營已私日苦不稱意昔人故如此今人且迷誤骨肉及黃泉遂謂得歸所自斗華山遷居鳯山之麓作欣欣臨池樹膏雨煥春華繁柯曰已滋盈條實丹葩北堂康食飲龎眉已雪皤妻孥雖鄙朴蠶織事不訛怡怡奉髙年至樂保天和柴門烏雀喜賔友逺來過語笑任真情忘形於詠歌逍遙適理性即道心靡他富貴豈不足貧賤未偏頗窮年得安逸過此欲如何竹窗詩為鄧仲恭賦天籟噫玄籥吹萬日交榮虛心灑瑶瀑一室涵空青我來窺明月因風激秋聲披襟北窗下慨彼千古情伊昔抗志士卷舒與心冥歘興仰徽猷獨善元化并豈必事華屋負纍我體形焉能撫紅紫點綴我幽貞履素造有常淡泊蒙訓經過此矯真性怡愈非所嬰湖隱詩為許仲仁賦范蠡薄句踐扁舟去五湖功成不枉道漂棄如土苴浩蕩涉煙水釣賢非餌魚風波逐身逺天壤與心俱咫尺八紘內飛龍翔九區揚眉一舉棹江海可長驅雲卷杳無迹英謀忽若愚至今滄江上不敢輕釣徒許子託髙義湖隈築衡廬懷賢慨塵想攬結期自舒欲問交古人事功所同殊歸休得效似澤世將焉如望不來登髙以望逺塵生謂子來飇風忽過耳憶念故難裁觀海見波濤噴薄雪山摧鯨鯢喧暫息萬艘安在哉朝日升榑桑夕月臨髙臺夢想覩顔色良時相見乖子豈無𢎞願獨與寸心諧蒼蒼不假緣俯結路何階各惟崇令德輕榮亟圗回烈劒尚同形千秋出塵埃德邁實天輔乾乾當自媒草堂詩為夏柏承賦帝堯有天下土階樹茅茨一人示質素八表𢎞雍熙所以希世士不忘在蓬藜富貴孰不欲非道莫致之豈必抗崇峙華采眩端倪豈必寶金玉鏤真干我私大觀鄙物化羣動紛嶷嶷猛虎室空谷鷦鷯安一枝雲卷不可窮天張迅玄機若人等巢許志局穹壤卑世無天下雄何此卧希夷東光北風何泠泠雞鳴聞鼓聲摳衣仰河漢不見月與星斂袂以危坐坐待東方明東方雲濛濛五鼓未及終雄雞一再唱寥天暝色同鴉飛門前樹黃葉隨風舞荆扉次第開山逺少人來山前看虎迹山後長莓苔行人霧裏出牛寒挽不回昏昏似夢覺隱隱見浮埃又無雨雪霰甘藏何處隈夜長不可度夜長不肯曙天明人共喜天明如夜裏庚金日大風不止偶志大塊鼓槖籥浮休中震凌輕揚重安靜羣動紛相仍曰余坐虛白目視耳忘聽一室洽春融淵光涵杳冥太和體健順無我媾清寧萬嵗非長生得一天下貞雨後即事好雨澤萬彚河渠引通流緑竹北窗下清隂被廣疇禾黍滿平野三農喜登秋以慰髙卧人長歌肆百憂問君當豐年百憂復何求吾聞成湯時至德及冥搜大旱纍七載羣黎暴怨尤况此季世民何德承天休端恐不克任方同沐徽猷愚夫恆多慮坎壈迂逺遊念君非達者戚戚杞人儔得酒且盡歡終年保優遊君看堯桀民俱作一土丘文武仁義君八百祚移周不見嬴氏虐理極得寬柔吾徒且加餐天孽故有由題烈婦張魏卷子夷叔入首陽三綱振天下道喪蔚中興橫流遏奔吒國家有不幸忠義輩出之髙光燭汗簡壯節友天維荆楚多世家忠臣求孝子遺烈及婦人從容見張魏城圍身兀隉城破天軒輊豈茍殉辱生不渝以義死至今古城曲獵獵隂風起惟此涵育民仁恩戴百祀蜂蠆始蜿蜒流毒相胥靡忠臣雄血食烈女光徽懿千載豈寥寥斯人紹貞軌醜儒位公侯隱忍為狐媚欲持魯連節遂短馮道氣何幸一婦人愧彼天下士泰山鐫我辭庶足夀萬紀贈唐伯雍瘍疕滿天下仁人獨留心針砭起四海侃侃慰知音藝祖挾竒能閲人洞微忱戾肩顯鼻者大言取孔任子實紹前業河圗披素襟縱橫非一途達道技彌深五運訛秩敘六時伐陽隂大方乖籥吹霜露已繁侵嚴寒至裂體酷暑亦融金子有蘇時藥代石舉玄針何幸起疲癃顛連詔于今堪輿一俯仰澤世宛如臨以我夙昔願期子遂幽尋梅竹雙清圗二士處幽谷邈焉遺世氛逍遙寄膺期雅植藹素芬有德此有鄰艷冶非所文而我敞逸節友之為三君虛心彌道義同氣交蒸熏時暘起衆芳負恥羅繁殷卓絶隕墜下豈伊弱卉羣力幹表穹壤介焉清白分根株既得所霜雪徒紜紜傲世知寡儔凡材尚希聞罹難乙卯十一月初十日天地亦有否賢人乃韜光避影趨日中毫髮彌昭彰蹇豫克重荷末德懼乖張大厦不可支潛幽保貞藏負恥五百士寧親在髙堂頽然坐窮山放虎實自防朽樗甘委質自足永頥康孰謂纍薄交譽言為德殃慈親亦投杼疑失豈尤償天孽猶可違憂虞道其常明夷利箕子羑里息姬王賢聖久寂寞愚蒙或同方至公涵冥昧惟善降百祥矢心不枉道彼短任吾長經綸若時雍凡百慎括囊春寒晨霞艷東旭中道翳陽光隂澤不下周昏霾為雪霜嘉樹秀敷植條柯被曽岡寒風振林薄野色欎青蒼彼美君子材淬礪質彌剛嚴威弱操下峭蒨亦蕃昌常恐愆融和養蒙抑屯芒如何經緯人與道互乖傷至理自心得致平宜有方浮雲期一決萬彚仰天章贈别胡石莊之廉州管勾復職一别周一紀千春幾承顔丈夫雖無淚臨感意彌艱我里碩宗葉煌煌粲璵璠及時構多事迹逺異憂患君枉文江幕薄祿守微官四民漸德澤田野有餘歡我時縻秀水川陸且間關豈不盼鄉閭疇能辭路難修途廣萬里趙璧喜歸全各負金石志矢心堅嵗寒遐荒課海利董役在得賢嘉旋美上日侃侃撫諸蠻卉服法冠冕王風譯綸言來朝恪遜節入室問親安復此懿交會增情欎以煩執手睇征鴻黃雲靄秋山愧無圗南翮翼彼橫天翰願託泠然風吹情穹壤間君當霄漢上早慰綵衣還白雲篇昔在鳯麟洲南陟射的山戀子五百人舉手閶闔關俯視四海流豈勝杯酌間天地小培塿九州為彈丸帝者握赤符驂騑雜龍鸞日月經天周呼吸一息完白雲流元氣下隘六合寬神晶隨變感清虛忽彌漫用之贊化育一洗蒼生安浪形吐川嶽冉冉不可干浮休有崩裂還精蟄宏端乃知至陽物舒卷罙昭貫太空終掃迹無倪以神觀送鄧行夫歸雲林蕩蕩青天上行雲揚素秋當舒澤亦洽倐卷迹不留志士介草茅深衷勗前修業成經濟具才展宰牧優撫緝自州邑由之達遐陬八荒惠衍溢九野漸薰蕕名遂不居功勇退如轉眸翩翩紫霞想掩袂凌滄洲故山雲林曲白馬環峯稠卓筆耿光發琵琶蒼玉流息以風雲氣眷兹山水幽期頥夀金玉閟迹延冥搜賣金宴宗族解綬營菟裘返掉今幾人冠裳來舊丘乃知南陽後德沃世益周椅桐邁貞節雲鶴窮天遊他日應相值塵湖山北頭送胡鈜鼎文歸松江賢愚夀天人宇宙同羈旅眇以方寸心軒軒視前古况我碩宗葉文聲被韶舞陶冶恪周賔春秋迪簪組疇昔繼蕃衍風枝植燕楚天道蓄晶芒昆吾閟幽土神光豈淪隔會合訝修阻十載一承顔百年幾胥晤紛紛過眼疾故誼罙敦敘得曠幾日歡愴為别離苦排雲發浩嘯華髮竦已竪鵬鳯孰可羈青空運摩翥竒齡等金玉仗德擫貞度五萬奇柱維終當女媧補過安慶城鯨鯢誅不盡天海為軒輊蕞爾大龍山橫瀾障元氣剛風扇六合白日斂氛翳不及魯陽戈金湯竟頽圯志士秉雄節殺身蹈仁義砥柱此既傾東南溺吞噬髙光固有在汗簡今何事何能當國難如君得萬士大厦茍可支維張天下計良圗委土苴時棄有餘淚行相樹草莽望門表英偉芊綿交户庭此日誰能剃守璞齋詩為閻如璋賦至寶處渾龎塊獨全天真玄藏閟晶焰抱雌韜至神用舍貴知幾持盈不踰分隱顯居吾天頤貞確常倫昔為耀世資今為晦櫝珍出負璠璵器歸如葛天民卷舒豈固必一志無緇磷所希仁者靜主夀等閻君題南極像為史彥章賦堯舜昔垂拱無為致休康四民日熙熙九域同嘉祥君仁莫不仁至德在遐荒膴膴遂養長頥貞永天常上善勗千齡八百逮人皇碩考表南極日月昭同光靜者有鮐背黃眉蟄龜房天地齊終始竒耆浩無疆錢氏𢎞麗慕丹葩掞星芒仁以居史君願言夀亨昌卞永清求母兵革二十年忠孝可屈指天道感至誠豈孤難能事東平卞孝子載毒失慈母哀哀陟屺辭喪亂不知所兩鄉十三載子念母憂苦天人理交孚至誼格敦敘皎如青天表日月復可覩彛倫久罙全悲喜殆旁午粵更壬辰變烽燹均率土骨肉異風枝周南忽行路繼黃惟祖曹汗簡竊有取將使居子臣天下知君父多君踵往哲俯仰無愧怍金石夀吾辭髙光邁前古送袁在中遊龍虎山漢祖去青城稅劒宜陽市畫地立丹罏兩山龍虎備琵琶導卓筆白馬雲林峙環拱百折山沿洄曼枝水人間宏大教天上膺隆位祖武繼清寧玄風越千祀至言豁聾瞽世澤敷皇治上德所服膺稽古求同理探竒核幽閟粵自萬里至大道本無為寰區保康濟袁子富文藻談禪契深旨忽企白雲遊反身求黍米拳拳謁名師豈敢強聰慧吾甥神明胄夙格天仙嗣萬法特一原捷蹊掃涯涘羣英列侍衛笑吒風雪起金玉俯身中教言方及耳因知猶龍化析誕和二氣妙悟在此行混融旌道紀回首兩眸子瞭瞭燭品彚握手三谷間逍遙人間世倪雲林雲崖圗賦鐵圍標古石龍象萃淵環噓呵翳大塊暗靄亘飛巒六合擁浮漚乾坤微彈丸香風匝淨土清泰撫冥翰顧盼四無垠竦身空花間摩尼忽在眼覿面表竒觀要眇纜虛舟同塵接回瀾握手成三笑幻泡浩漫漫楊將軍望雲圗緑竹懋貞幹駢羅此幽扃南山客户牖望眼窮秋冥冉冉白雲下嚴親舍髙庭王事豈不遑無因候康寧宜春眇何許雲樹隔關陘撫子愧事親心摧臂無憑四知寶家訓武勳期汗青輸忠道所在克孝德惟馨千秋斯二者所願由天經東丹瘦馬圗伊昔在天間材髙四十萬曽隨穆天子弄影瑶池岸一食盡石粟驍騰入神觀知己九方歅推稱價無算穆皇狩不返羣牧少芻豢所食弗盡材﨑嶇䇿吳坂田方仁惠養伯樂浩才歎顔色愧駑駘精神殆無間攻駒尚少齒劣蹇矜珠汗自足侣鴛鸞何堪棄衰慢暮途蓄壯志千里無留難不雜蹄嚙材希君别真贋題十牛六牧圗生生育物類人道歸全仁撫養在時須飢牧渴飲津天皇十二頭淡泊化自淳代亡用其教利物不及身先哲歎才難司牧貴得人于以託耒耜食天子萬民十食才一牧五子意已勤得人一已足非才􅊣彌殷所害良匪輕失力乖常倫季世獨貴我及物愛益貧堯禹道冥昧人獸無全羣孰為憂撫養此志久埃塵石爛夜漫漫長歌竟誰陳猶恐怒特祠武都客妖氛毋使亂義苗展圗鼻酸辛贈地理鏡山和尚乾坤幻罏冶川嶽序穹卑惟人濯厥靈中立奠二儀是身稟元化賦受天弗違孰謂眇此軀存亡有攸歸曰彼土親膚何能愜寸私遺體實蒙被安養勗自來景純得泉脈孚子法坤維回互顧眄間九宫析幽微鏡山宏佛學早契司馬機轘轅等虛泡培塿質成規驗法既已神趨向靡有遺內明常湛湛外視亦夔夔竅妙發餘事玄感坐可期猗歟孝友士青眼必見知去去聿相值至言探矢辭贈陳文用製筆蒼頡始制字人文觀化成微彼蒙將軍疇能知象形以兹示天下紀載宣文明偉矣帝王道簡編如日星後來貴疾速分𨽻亦兼并鍾蔡數公輩躬事擇製精繼以昆刀利錐石如發硎太丘好孫子稽古理罙徴用舍得心法功多紬繹能毫芒淳益就端直順相承置之夫子庭傳道粲六經冉冉海內士聿瞻斯文興毋為居史職咄咄是非情范慈母行義詩蔡子早失恃范姨鞠育慈大兵後凶荒嬰弱保年飢父子聚浹旬未竟終天悲艱難德姨氏誨養同已兒曰克自樹立姨氏復長離血泣服齊衰終身痛無違薄祿不逮養拳拳膺孝思猗歟孝子心冥冥果有知寸草誠可達號天挽春暉我歌孝慈行令典敦民彛何將軍針灸情欲病天下眇軀觸寒涼隨感以致乖四民為內傷仁人獨留意利濟各有方顒顒何將軍偉矣昭聞望鋭金髙山玉氣至效腧藏正行得逆順迎隨意和良臨深易沃水循掘去衝妨始一數終九五三别微芒信若風吹雲明明覩青蒼黔黎順正氣夀夭安天常乃知攻伐仁掃逆開蕪荒願擴及物志寰區歌太康徐堅醫師詩四敘異寒溫形體為大患於情易感觸熾欲煩不散炎帝品百草躬嘗工製煅軒岐事砭法療理推秦緩內外始分經越人資果斷後來太素出覘覿預昭煥世微思邈明經絡曷通貫嘗聞上池水一飲炯神觀不有起我人疲癃殆過半世家東海子儒業勵精悍眷此及物私靈樞肆披玩天人洞至理指落無留難恥猶賢宋清韓康避名誕生生寰宇內瘍疣相揉爛久待蘇民瘼顛連日滋蔓尚資調護手和暢洽吹萬拭目仁夀鄉熙熙保遐算清虛朗上人詩天道貴得一人靈常昧初中和適體用知及仁守諸誠者天之道誠之人所踰體仁合天道一本統萬殊惟精故能一惟一奠中居方寸既盎然天光乃舒徐上人西方業捷岐歸正途匪曰學同源誠身為已圗皇皇炯四達神明徹幽都盛德日輝光澤媚深藏珠願言法瞻顧圓方窺楷模空虛可梯接式用表根株送朱彥平之廣東巡檢修齊固有法治平亦多方幼學長而仕用行舍則藏朱君富儒術抱道蟄時康烈氣干斗樞龍精發隂芒達人事兼濟德溥用彌昌于以擴休風宏仁被遐荒昔賢驅暴鰐令聞蔚昭彰島夷始有學五典肅彛綱大道在人𢎞前修允相望畢副賢哲事錦衣歸故鄉湛碧軒詩為朱彥平賦飛閣闞澄潭清心俯泓玉涼飈灑然至璧月弄寒緑沛國有逸士端居偶貞獨坎止勗靜便足音寄空谷以兹鑒靈府懲忿先窒欲盛德洽淵泉涵濡遏流洑浮休賦羣有一定注塵目澤物在時春為霖為霡霂弛張功用際有道禆化育活水出清源考亭繼芳躅耆山庵詩為太青子賦大患為有身居仁緬安宅外垣備城郭鄞鄂司內息爰處靜以翕其營動而直三物合一無神機目為則衆隂辟消爍正陽晃虛域春澤俱盎然解氷何液液反驗弱為柄清明洞無極外象安幻成伏藏秉貞白前瞻巖穴仙後踞虎龍翼即此運化樞松泉丁服食玄基已參序審諦自無惑夙共録天圗今當同一得南山秋灝軒為張孟虞作茅堂倚千仞灝爽齊嶔崟以彼攬結懷企豫寥廓心青天可對面下視浮雲隂萬物眇毫芒蜉蝣何所任吾觀八紘化氣岸排淺深所賦有定形短長迹侵尋達人均物我至道匪升沈緬邈成三髙相忘四沖襟亨期髙世志清賞丘中琴徙倚泠風表希聲諧大音題方壺畫為張成子賦沄沄湛溪水漠漠空山雲芳樹豈不華茅廬挹清芬偉歟抗志士傲岸古所聞眇體局虛堂髙懷凌世氛青天有明月匡坐對夜分自謂同雅操耿光淡無文悠然天地外脫略思不羣豈顧山中趣耽幽逺紛紜泠風鼓竽籟長嘯藹蘭熏引領莽空闊飄颻何所云汪道原醫師詩眇身託宇宙大海一塵微何况四序殊感觸易乖違口體致情欲中腸氷炭移於時失所養形氣寖已羸炎聖子庶類品草療瘡痍軒岐事針砭素女理窮辭深索炳倉景晉謐見發揮逆知隋太素遷置祝由機孰謂侔越人世稱盧扁師王和診有訣完素病原疽思邈達經絡切膚他厲竒俱挾仁濟術蔚開來世規代資調護手枯弱尚充而汪氏勵古學儒冠隱南陲利物蓄素心拳拳思保釐長桑授要妙攜手飲上池泛覽列聖言羣賢決幽疑洞然徹五內逺邇起刀圭令德日益崇躋民夀亨期所願宏此道元元浩仁施四民遂生植天下無殿屎大哉仁者惠不獨中顧私夀祉有自來相期洽雍熙奉寄表兄劉二紹杪秋病世故息冗君子庭飲食飫豐潔教言承訓經結軫共清遊倡訓屢相仍憑髙舒磊砢浩嘯睨八溟各有凌厲志南雲隔寥青斂翼事卑棲守株坐柴扃多君擫儲偫吟遣混濁涇豈曰曠天才浪懷陶性靈暌違感夙昔沖抱不遑寧因以寫憂惔申章託鴻冥奉寄王轍文通江漢一為别山川阻音徽雖乘閩楚流大海終同歸曩昔露肝膽長天秋月輝西風入兩鬢浩素耿中逵子實袖經濟宏才掞文闈眼空睨八表烈氣干虹霓而我似鷦鷯巢深甘息機風雲成夢幻逸思邁天飛金石確久要竒齡祝亨期垂天各有翮九萬尚何辭柏雪齋詩為南昌王化道興賦柏緑灑幽户寒隂薄晴暉亭亭鶴氅人坐挹玉屑霏君子勵貞撡喬柯金石姿匪徒傲霜雪實足障炎威食苦養頥德泠泠沁詩脾深衷神禹契烈氣孔明祠所願駐長日天香下清颸遊心觀大易端坐在書帷東湖草堂為吕知縣賦吕侯藴雅量直與東湖平朗朗甓社珠流光射曽城昔為民社寄吹萬秀枯莖盱水韻玉琴大邦戴休禎達人鄙軒冕雲卷去無停誅茅淮南岸列帙聖賢經我里剩條桑我田思力耕斂此濟時略散為山水情至今為治者溢耳懷儀刑猗誰起安石噓灑為蒼生南州髙士圗為西湖徐髙風題炎季厄閹竪烈士希令終明哲思保身若人曠遐蹤薑袁相擬望申茅方厚崇黨錮亦周旋君門榜目空東湖一諸葛偉氣表麟龍陳榻尚辭辟瓊門無貴通道行扇豫章畫圗旌德容遐想人如玉月明皎雙瞳西山挹灝爽千古凜髙風已矣磨鏡客取信灌園翁施勗仲勉赴會試幼學壯則行由家達邦國君親分內事忠孝丈夫職施子起庠序窮經偉才識庭訓賢父兄同門友三益棘闈魁大郡天對徴良䇿薄發貴從容仕優學彌積上無負萬乘下不負學力行矣化此民以身先典則摩天思一展黽勉崇令德忠孝期兩全永言樹嘉績凃欽文將赴會試積學亦有基設施驗行事過庭敦孝友立國建忠義日用舉無遺力行道斯致黎川秀凃子懇懇學為巳黌宫擢英彥誠慤愜輿議西垣既領薦北上達軒陛廊廟嘉良材早丁瑚璉器仕優毋忘學致澤當先計利濟不居功堂堂丈夫氣忠誠子所蓄奮迅及時至拭目俟雍熙勉旃念儒貴黃遜以㦛赴會試潁川富德澤遺胤賢孫枝皇皇大成宫之子才瑰竒蚤負卓犖氣讀書勵衷私有得斯積中笑談擢秋闈大臨展素藴長䇿必夔夔試涉經濟略宏仁浩敷施以彼孝敬誠擴為忠直資由家以及國既仕學無違九萬迅逸程修翎煥雲涯贈言匪誇誕賢哲勉深期陳權子才赴會試燁燁泮宫彥太丘好雲仍一經躋閫奧百氏資技能頴古翰墨精筆端山水情凌雲探月窟分得桂枝榮師友既交譽慈親慰家聲春闈覲天光校藝當大廷子實萬人敵蟠胸富竒兵武庫森衛翼捷書破連城持以奉明主屈人非戰征柄用任匪輕仕優學益增所願禆聖化尊主庇羣靈儒術在力行勉全忠孝名奉寄姚東之同氣結同心含光異流俗白首愜素懷子病猶我辱丈夫區宇志道枉非戚促彼取吾棄捐紛華恥貞獨青松翼髙阜風颶激喧觸豈不蕩枝梧根深植彌沃長安信可樂西笑尚極目餘子竟嘻嘻阮生何慟哭採薇道如砥往矢無返曲將子懋永年髙光冀相燭中和堂詩為施有慶賦大本立彌堅達道行益廣性德體端居情正用孚暢吾觀天人際失常病滋長位育致康泰時乖亦安養止水鑒明鏡靜貞動交盎充塞既無間天地我同象施君謹微獨仁惠斯指掌澤濟在元元家國以身倣極功由學力能事追聖往懋爾賢子孫繼承副深仰南皋草堂詩為李子沖賦午位緬平陸草堂構崇深琅玕生清風雲石冥晝隂徴士鄴侯裔牙籖榜書林出試會計勞浩然返陽岑逍遙二三子被褐懷璆琳開口説道義摛辭吐英音時來共髙敞夷散供幽尋龍門昔榮擬登陟久所欽况以表虛堂萬理具一心清明探逸操豁達流沖襟勿謂無知己丘中有鳴琴清白堂詩為李子沖賦唯清白溫公詩云所存舊業君子勗內守瑩中涅不緇長物非我娛擴焉沖素期惟彼抱道者靜専澄內私乃心淡無外歷世確不違成紀美華胤扁堂遵祖規昭昭示明德于以傳孫枝穢富艷里閭蕣榮暮已衰遺安斯得計代久恆光輝大賢資舊業司馬正葩詩授受明訓存堂顔為世師南山耕牧為厚居丘尹瞻賦時雨溉甫田秋登慰成望川原交蔥蒨孳畜方茁壯道逢斧斤客弛擔坐林莽去去歷村墟暮歸朝共往河南有佳士抗俗契髙尚災畬伐蕪穢生物遂時養先廬傍泉石畫史列函丈豈不懷達兼誰能委幽曠南山久覿面傲岸並穹壤浩然眄軒豁物我氣交暢矢言愜貞操比德副崇仰于以懋修齡千秋表遐賞天淵詩為南昌劉允登賦廣闊遍穹昊靜深湛泉源四德儼有臨時發皆當然劉子味費隱天機察魚鳶水流物生植微顯道體全理寓有形發道由無形傳既無性外物統體歸一元利以見大德及時安所便聖作萬物覩空洞用交宣至哉惟堯舜盛德宜配天行行心乃心不忝亦不愆川流斯浹洽敦化識大原所願希聖人坦途軌名言方洲詩為南昌李士宗賦伯休淪市藥東方狎金門大隱當墨居丘樊焉足論子牟身江湖目擊魏闕存奈何隴西士青紫與世捐豈必蟄陵藪矯迹事孤騫方洲渺心素蓬島無異源澄神湛方寸蟻壤車馬喧一室遂幽間囂囂外塵煩多君抗傑特闤闠斯林園顔生亦鑿壞段子空踰垣何如睨天壤勗此道義尊寄謝隱淪客千秋躅髙轅縠溪漁者為應希勝賦泛泛縠溪水清風揚素波悠悠垂綸客擊楫起漁歌昔懷仁義釣真道取不頗天壤契間情徴書到江河小試出納勞德言美瑶瑳行當廓步武素緼發熙和致澤諒匪難天人理無訛湖江心魏闕有道矢靡他休璉贍偉才維時克負荷縠流清益徹明進必盈科希古業磻溪盛名宜不磨雲松巢詩為朱仲毅賦雲巢話髙松逸興邁天壤浩有太古懷放神青霄上調仙負才氣雅操何倜儻髙視廓八紘遙情寄遐想三吳有偉士沛國承聞望文掾蟄冷氊幽貞契林莽泠泠丘中琴餘響流絳帳湖江心魏闕脫略緬夷曠吏隱斯可兼永言迹髙尚溪山曉行圗拂曙戒嚴程丘樊涉零露秋清快駑蹇林薄淡延佇松隂帶川壑石壁出庭户拂我衣上塵還山氣容與昔年浩功用壯志業遲暮知非返舊藂長嘯舒衷素填胸消磊塊適意忘簪組清泉忽在望故道未榛莽訪我樵牧徒琴樽敘儔侣行雲際空闊舒卷忘形趣永願結同心期頥越千古題御風子卷為倪孟沖賦神忘與虛合輕舉超化機朗朗一息周憑陵軼希微八埏隘灝爽髙擴遵坦夷何所待飈輪淵潛泳天飛倪子抗世士黃冠雅葳蕤玄言味禦寇舉化蒙莊師剛大斯內充清明宇端倪至人至忘忘往息淡無為願從廣漠野共迹逍遙期無朕不可形泠然與同歸次韻鄧子方真人見寄關門候紫氣令尹識聖人不有沮溺徒仲由豈知津奈何希世士託迹清渭濵期運不可符淵潛藉同仁猶龍隱柱史玄理以言陳木舌金口宣道尊德無鄰鳯麟世寂寞梟獍捷若神揖讓化莫覩巢由竟誰賔南陽有古老談笑四海春大雅何寥寥斯人發天真悲歌萬籟沸浩嘯凌蒼旻貽我太古音淡然味清醇嘉言匪易貺欵敘及芳辰所期耀世資韞櫝為家珍逸志倘可遂何煩當世嗔松檜軒詩為吳子澄賦秦松封大夫孔檜植魯廟託根雖不同材質豈殊調延陵有雅致構宇顔二妙巢雲兩白鶴唳月激清嘯萬籟號天風行雲散空杪吾心方宇泰氣岸並秋杳能共守端倪千齡閟晶耀題方壺所畫山川出雲圗為余昱方賦川嶽萃靈氣風雲相吐吞搴舒彌六合卷退歸無垠大宇何昭昭虛中炳離文雨暘曰時若蒸搏生氤氲歘起亘坱圠崩騰乘厚坤用舍不稽方淡然天地春壺子握機兆達觀契天真一揮九雲夢吐納安足云此道付知者昱方為後昆有才屬雅望玄理窮轘轅勗爾好心手幻成璀璨繁毫端儼造設舉動紛騰鶱要眇納元包浮休無窮門太虛非象識一畫亦已煩擴此神化周傳心竟何言相期軼埃壒湛冏邈淵源湛碧軒詩為張宇清賦秋水靜襟度淵澄冏靈臺神明資挺生屬望青城來吾家魏陽元宅相譽雲雷灝爽豁眉宇虛懷絶纎埃眷此活水源仁端貴封培箕裘道德學位育在心荄綵服被春華天光豔徘徊髙軒穆憩止瑶笈泠風開所願介遐祉玄功亘昭回千齡挹仙氣仁澤廣梯階讀武成王傳子牙獵渭水叶夢為帝師望重名益崇太公俟子來殷授太阿柄興王闡鴻基一怒天下安熊羆實佐之如何上古書誓命無一辭聖道薄武功用變當天時窮兵非得已凶術尚誰咨黃帝革不享揚威樹旄旗堯民服四罪干戈寖已隳孔聖鄙軍旅尚力德已衰修德保宗社教民戰無違熙熙安耕鑿此道寧可期種玉軒為藍伯玉賦種玉亦有地藍田育竒材樹德此有基仁端在深培惟彼丹霞士潛幽迹蒿萊溫溫貴涵濡清潤澄纖埃聖功澤蒙養勗祉崇方來藴貞暢萌達煥發膴皇荄陽葩內彌充德溥功亦倍願言閟光晶天牖廊四開勿效和氏仁矜矜泣自媒松石軒髙僧邁雅操同德勵貞剛勗此嵗寒質千秋玩英芒猗惟靜者意潛伏表龍藏舒卷一何心虛空齊景光清軒湛梵唄流水聲琅琅翠濤翻晝隂蒼玉生夏涼宴坐太古前息心稽無方頴師發金徽贊公焚妙香會約鮑明逺同吟蘭若房玄隱子卷柯山柴逸士守黑窮易學簪笏非所榮冥棲向林薄天人格至理汗漫翔寥廓漚泡俯仰間前期有成約我攜支機石君平不可作欲問璞玉貞崑崙竟誰託至人候旦氣覘覿悟風角區區何足云有道葆芒萼相期攬八極九萬息揮霍從此閟天樞轘轅貫冥漠南谷丹房詩為江仲謙賦天地幻爐鞴陽隂交混融惟復建始萌兆基在中宫鄞鄂表黃輿凝神備乾功虛無合元化化感體玄同江君宅午谷習靜懌屯蒙泛水汲玉泉假火樵蒼松中文首羣武溫養德彌充闓舒確至寶大道順以鴻內功證天圗外藥起疲癃會約列禦寇八紘御泠風雲壑詩為朱彥隆賦魏闕饒宦情江湖託幽趣為國報效心懷鄉桑梓故昔年卧大壑舒卷浩容與翕忽從飛龍青空運鶱翥濟時有宏願用在及物溥未展蘇枯志終畜為霖具秋山碧玉澗回首舊棲處古木翳芳隂清風繞庭户丈夫事忠孝家國道並舉遲爾功澤周歸來愜貞素送黃用經赴選達士訊機兆仕止諒惟時拳拳經濟心兼善乃宏施潁川稱治最遺烈懋孫枝宣教蟄黌宫多士蔚來師摛藻麗霄漢金苞瞻鳯儀歘起厠羣英辟書光故知大道何堂堂文風擫綱維眷言竭忠義努力致雍熙煮雪軒詩六合斂隂翳鴻濛睇瑶華空齋坐觀白湛湛玉無瑕石鼎鍊陽精百沸白乳花俯昂漱璚液意氣凌紫霞浩有物外情厭耳區中譁泠風灑秋杪五內粲天葩至人飲太和至味淡無涯舉手鶴上仙相從太清家候樵軒詩日夕牛羊下負薪人未歸餘芳留杖䇿悵惘倚荆扉彼美中林士空山歌式微卷舒歸有道玄化體初幾朗朗八埏內間勞相是非至人寓延覽流景意無遺我志勗靜便山樊夀期頥翕焉安沖素浪迹逺馽羈永願嵗功成徯君君不違送施伯撝赴選聖學儼倫序修齊先治平積之充則仕忠孝為常經苦節確固窮説從得安行曰惟吉有功變易斯可徴周道直如矢台階羅雋英及時相奮勵逸翮控修程名義古所敦坦夷君子貞髙堂綵衣望勉力竭忠誠奉和劉二紹見寄詠懷十首吹萬泄元包混沌以竅死端行遂不偶當理生仁義衆口苦難調任真淡無昧大觀祛物役仁至歸吾事泰宇何皇皇坦途紹前軌其二三盜各得宜大鈞播羣有元兀逐利欲攘竊生腋肘至哉無為化不欲賞不取誰能盜清寧不仁物芻狗其三湛露晞朝陽隆寒倐凄洌煢煢逺行子企志邁前哲力疲東野馬逐日心彌切時往道阻修行難不可輟食梅納酸楚抱素徒哽咽志士不忘勞惛怓浩中結其四萬化一原出天人理交孚中和由已致天下為亨衢古聖邈已逺名言徴簡書先賢誰繼踵太極蔚成圗後際良不外前瞻亦無餘斯言茍有合何陋九夷居其五圓方一培塿萬有衡氣機原始以要終達觀守端倪生生質纖巨賦受體穹卑匪汚合跖蹻匪清屬夷齊物理有自然昭昭淡無為空林坐逸士終日恆不違欲語無極言因之決羣疑其六燕臺欎穹望爽氣奠南服慷慨功名場百年鳥過目蜚鴻紛滿野畔援何局促忽忽成殿屎譽髦悲異曲至人齊機括坎止寄榮辱天外有竒懷抱雌勗貞獨其七梁棟適大用斧斤嗟夭傷陳犧被文繡終以致烹鬺蝠鼠逺豆籩薪樗爨無光有才非所貴廢棄保天常黃犬以獵亡商顔是非鄉相與合涇渭無為清濁妨其八一理誕元化洪纎不偏乖觀天見五賊俯仰定三才撓我既不濁澄清復何階輪飛蹈水火神觀聿昭回臣兆順令行天君炳虛臺勉焉誠之實際此燭心荄其九姦軌出多岐靡然赴聲勢權門徼功利大道且榛穢魏瓠稱廣容街術工妍麗愚公太行計神力竭精衛豈若遺囂囂巢居抗髙誼式廓返一真羲皇妙心契其十二氣妙陶冶定形各昭融反常為變易閉隔久彌通麟鳯稱不祥虎狼暴威雄梟獍磔父母鷙翔殄元凶以我鼓善行孰云妨德風勝人在天定萬古理攸同次韻孫作大雅卧疴三首千嵗如一日達生諒非難寸心交衆欲水火乘空間昔者視耆耄深淵睇髙山侵尋白髭髮在我明鏡間自非金石姿何能駐紅顔生化迭萬世理運有必然神仙道云在經濟事已闌達人悟大觀疣贅不足歎其二生死道不昧還元法無為非必乘羽翰希仙學佺期彭顔私夀夭歸盡均所之厚薄假器來凝銷理終齊陽和既赫烈零露泫以凄不藉凜洌功萬萌曷葳蕤時芳富顔色搖落忽在兹蒙叟委順言阮生語徒悲何傷及齒髮歷世心更危所賴剛大充清明克扶衰明窗塵寂寂比意死灰知疇使外造化而貽達人嗤其三勞勞假一息既息澄百勞泰定宇天和晶熒匣中刀守雌伏利器用炯適自熬調元沖淡久養直彚置牢軒后與虛合乘龍道尊髙愚蒙膠情欲于理反遁逃晉賢尚清虛至道眇一毫陶公契武略惠逺施文韜挹翠軒為雪庭立上人賦丈室面簫峯秋隂被層玉禪餘拂几席餘潤生衆緑立公釋庭彥世諦豁心曲業白不二門幽尋契巖谷長松沸天籟髙石寫瑶瀑一默湛衆喧跏趺寄貞獨飽聞臻上乘領悟知止足願以甘露涼下方灑炎毒弱嵗二首弱嵗别鄉曲棲身戎馬間路難畏客子心逺窮河山浩有帝王道宏仁拯頺殘圓方乖枘鑿德惡各持端回顧弛妄勞採芝託商顔葆光誠自得仁澤已彌艱又弱嵗負烈氣澄清志天下中途倦羈艱未老心已化追求昔所藴梗塞中自吒世故莽蒼涼乖違奚足訝安知貧賤士於道未云寡豁爾忘達觀前非覺長夜浮休寄囊括露泡迹野馬靜者自虛明悠悠樂間暇怡敬堂詩太伯耿髙光義以天下讓遺風及奕世千古相尊尚仁邑系名族敬愛遂親養昆弟樂友于髙堂翕時享一從事弓劒彛倫久疏講何幸見延陵文林蔚華奬忠臣求孝子雍穆洽鄉黨拭目觀化成青雲緬遐想楚地春光雄楚跨萬里四民燠熙春司牧既得才化風被清淳堯舜儼端冕視歸天下仁豈徒一藩屏八表煦晏溫推誠致位育豁達萬化源所願宏此道前修勗髙鶱豫當晲穹壤太古希天民暮雲春樹圗君子敦友道五常為並修輔仁貴益已三損戒亦周同心必同德氣感以類求伐木既興懷鹿鳴思獻酬暌違秖夢寐落月屋梁秋雲樹豈不遙馳情悵遐陬何言江渭隔沈欎日悠悠合并諒不難雲聚信有由千祀豐城劒神光貫斗牛題郭熙畫毫墨淡幽趣隱淪藹髙情見山將杖䇿臨水思濯纓彚置粲機巧穹卑幻天成煙霞迂道里車馬偶經行願拉李意期相攜馬明生泠風邀八表流目憩五城世梗何茫茫氛埃非所營斂之千古意長嘯激秋清石鼎聨句圗彌明擅狡獪吐氣壓侯劉證以昌黎作羣然起喧啾含機諒有在營度意難酬以夢語癡人班班寤寐求姓名疑似際得匪異人儔自此有鄒欣空同為道流將非迹竒詭式用廣冥搜送嚴博文應辟介士勗前修達兼事宏濟歘興登昌運盤錯見利器昭昭富春叟隱德胤遙裔懷才安一邦抱道不偶世嘉苖信挺拔奮發殆天啓經綸君子業忠孝丈夫事勿以一身謀弛彼天下利蒼蒼惟輔德仁澤可力致贈言古所敦踐履願深慰善山徐氏交柯圗詩厚德比封植髙柯驗交孚仁至澤亦流休祥徴冥符素聞東海士偃蹇在林居天壤寄髙情乃心道為娛為善既有積衷誠宜誕敷以之生物遂浹洽貫根株王槐衍後慶髙門多令譽宜爾繼承賢宏仁表無踰清芬綿奕葉世德藹方腴所願體祖懷林林詔新圗潘仲擴充嵗貢安仁美丰度奕世韜文芒諸孫勗偉才庠序振珮璜大易稽大人遺編核千霜推能䇿天府致用承休光懋擴爾孝友蔚為世忠良仁居天下利毋以一已妨有道事兼濟休禎藉時康聖言斯服膺黽俯昭聞望躋寧樓詩為黃文彥賦翼彼君子居穹窗跋𢎞敞登升儼聽事休息遂安養廉隅衛嚴正尊大副髙爽緗帙富牙籤竒搜愜玄賞琴樽斯暢洽道義日宣朗如此竟長年熙和達春盎非時麟不祥潛德龍用壯豈但美攸芋髙光蔚瞻仰同虛傅髙士詩一身同太虛萬有齊物我至士執天行毫芒迹無涴傅君玄圃客龍虎潛幽邏鳬舄忽經天璚筵登右個歸來契無始偃蹇空林卧達生豁聾瞽流景浮雲過化化體物先無聲足諧和子如補竅鑿混沌元安妥八表灑泠風虛舟縱冥柂送倪伯簡應辟羣材登昌運楠梓各有長廣厦鳩衆工千金掄棟梁倪子守詩禮過庭敦義方歘起應明辟賢聲藹班行孝友擴素著忠貞懋時彰豈無精悍才優贍屬老蒼浩有禆至化顯榮慰髙堂亨衢迹九萬遲子佩琳琅崔斯行應辟偉士博陵彥掞才煥天葩山樊不可留鶚薦登皇家奎璧粲東府亨衢際雲霞長行幼所學展翮扶搖賖孝敬素所聞忠誠耿光華班班翊泰運佩玉何交加柄用盡儒門雍熙被幽遐聖言遵往哲佩服既登嘉洗耳韶濩音因之韻無涯三友圗為徐紹頴作徂徠樹貞幹淇澳養虛心友彼羅浮仙清妍塵不侵三子在林藪逍遙結繁隂嵗寒勗幽芳濡澤遂髙深灼灼桃李花傾姿媚中林非無嬌艷質零露忽沾襟豈與懋永年盤根固南金式瞻毫素意拂石坐弦琴雙清棲詩為袁用賦天人皆得一萬物凌囂煩內外致不殊虛明徹淵源袁子美氷玉乃心洽春溫孤髙抗塵俗崇搆何軒軒內以冏吾中外而接光妍至人齊物我道合氣交宣位育致不難聖功無間然所希貞白業世德懋髙年吳季孺家有六槐徴詩泰伯廉讓風髙光亘千古遐哉遺緒賢儼恪踵前武峩峩縠辨下文采豁眉宇華構夾六槐書聲被林莽託根澤先世驗德自王祜雲屯當九夏結翠振能舞面彼公位尊舍市如舊舉逢迎尚誾侃揖讓禮斯覩黽俯迪前修餘光照圭組戚戚篇戚戚復戚戚中心以憂惕問君竟何為端坐苦崩迫昔在鴻荒世區宇戴清淳代降偽滋多舉世遂失真象筯不足巧玉杯器其常蚩蚩為囂囂混元隨湮亡我有無為治清已式天下四時運日月寒暑相代謝抗志希往古有生矜季世遂貴一我真細民不外事彬彬秩餘禮私淑崇聖道聰明生姦慝教令使無好代遺空言治返故純益亂至人法天運授德泯修短仲尼欲無言莊周遊逍遙大道丕物化卦理丕物要沈憂非艱時艱人為陳此緘心亦遺誰折衷柱下史元音遺響卷二
