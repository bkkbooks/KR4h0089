body:
  text: 元音遺響巻十元劉紹撰秋懷十七首竟嵗寡歡緒時閒俯東軒秋風意蕭瑟愛此寒榮妍曄曄浥朝露芳馨比荃蘭飡英豈無志值此冰霜堅忽與念榮悴俛焉黙無言其二忽忽犬宇内殷憂日如麻十九不稱情有懐浩無涯節至風物美孤芳澹清華輝林㪚愁悰起舞西日斜生死一夜旦大耋奚庸嗟其三萬物付定命詎云憂賤貧舉觴問青天孰若陶吾真夷叔餓首陽千載寂不聞終古今歸盡念之獨傷神其四緬俗結紆軫易初吾弗為臨流采香薄日與佳人期舉世厭芳草薫蕕以同施撫襟悵余懐䇿駕臨海涯聞有魯連子千金棄如遺髙情倘可起攜手斯與歸其五少年厲猛志振翮慕髙翥奄忽歳月徂壯心無復豫力綿氣就耗撫事日増慮枕險莫安寐憂虞懼前路凄其念華髮僶俛惜馳騖猶有丘首思從誰嘆遲暮其六大化日旋運羲娥去悠悠俛仰宇宙間身命誰能留迷復眚在已不耕寧有秋雞鳴起為善思與大徳儔朝露竟㡬何悵然日増憂其七夙抱尚林壑浮榮非素謀一命已七載伐檀誠自羞晨出北郭門浩然思清秋黄虞翳榛莽落日馳耕丘惟餘故鄉念慷慨興悲謳其八攜手上濠梁慨然憶莊周魚我不復辨達生亦悠悠但見飛鳥翔荒煙映寒流烏鳶啄腥腐鸞鳯聲自由感此涕無已咄哉嘆行休其九萬象日昭著三光自無私古今何寥寥人道常相夷為善未有應為惡殆不疑昏昏昧靈臺慘慘誠可悲黙爾重吾感天定人焉違其十全理日茫昧人情溺其私達生茍不然在世復㡬時秋釀比隣熟寒華滿東籬稱意且謀醉綠鬢終成絲其十一夜中起長嘆仰視明月輝驚雀栖不定吾生亦何依彈劒拂秋蓮含悽步前墀秋霜草華落嵗月詎我稽感往事難復念来情亦悲無將契𤣥理委順斯不疑其十二擥涕以佇擬邈然懐太初洪荒不可模樸散今何如智詐日成偽荆榛塞莊衢羣邪沸湯火嗜慾戕乃軀語徳去以逺諐中匪良圖雲咸世無奏孰洗哇淫汙其十三隂陽鼓靈籥日月如轉丸窅窅神化運誰能測其端春暘美萬物秋露凄以寒乗時變榮悴天道終何言其十四髙步視六合河山邈悠悠浮雲西北来慘淡増我憂世乏稷卨儔皇皇將焉求乾坤妙閶闔元氣浩不收經綸信有待明哲奚淹留自非遺世士何能守斯丘其十五藝蘭十餘畝種蕙連崇岡荷鉏理荒穢恒恐摧幽芳穆穆膏露滋飄飄靈風翔俟我將采刈佩服期不忘其十六晨興步前除欎彼佳樹林上有好鳥鳴索羣揚哀音興言念我友髙誼明斷金如何久離别不得同夙心投袂出東郊浩歌盼西岑悽悽廣陵散惻惻梁父吟丈夫貴壯健毋俾徒荒淫其十七磷磷澗中石蕭蕭松上雨美人采三秀嵗晏孰華予凄其念逺道薄暮澹延佇秋風愴我懐澄雲日凝宇泠然參差發悵望大江浦帝子不我期中情竟何與所嗟頃筐意周道渺何許遺玦謾馳思沈憂忍終古雜詩十首示宰獻夜中見明月臨牖御清輝涼飊忽以起草樹聲自悲怫欎暫延佇援琴不能揮繁愁尚何訴但覺雙淚垂囘身入空房零露沾我衣離鴻亦何苦塌翼寒相依其二朝出北郭門暮登西郭山不見采薇人倚松但何言涼風振林薄密雲翳岡巒凄凄鶗鴂鳴心事如波瀾舉世不尚異酺糟豈非難諒持獨醒理尚友三閭賢其三洛陽昔云盛豪貴聨華裾甲第冠京邑田園極膏腴出則富車馬入將倚金輿臺輿被錦繡聲價凌三衢一朝大運摧荆棘銅駞居烜赫不復見榮枯同翳如其四飛飛南来鳥薄暮無宿棲銜哀迅中野午夜聲轉悲壯志困冰雪蕭條羽毛摧乾坤豈不廣周道今無歸枳棘富羅網泰山益巍巍托身忍云失失路誠不辭其五日暮懐所思涉江采芳澤飄飄蘭蕙花春氣滿南國如何同心人言笑千里隔采之不成遺中道寘愉懌凄風忽悲鳴鶗鴂聲惻惻恒恐芳意摧榮華不常得其六西城髙崔嵬華閣翼雲起闌干倚霄漢户牖納霞綺彼姝者誰子抱瑟中自理一彈振林木再響韻流水凄清囘宫商觀者餘涕泗誰能為賞音世乏鍾期子其七驅車北邙道墓門欎纍纍嘆彼泉下人㝠㝠即長途松蘿蔓荆棘狐兔凌丘隅千載不復生榮名竟何如人生信如寄日月寧居諸及時當惕厲毋俾同丘墟其八少小事遊侠西遊咸陽中金張不躡跡趙李何能從走馬逸絶景挽弧墜飛鴻心知不稱意尚友来山東黄塵忽以起白日驚鴻濛壯意竟何遂浮生成轉蓬猶餘固窮節不愧千夫雄其九朔風雨寒雪庭户颯以凄佳人閨中處日夕愁孤幃良人客燕趙嵗月久不歸榮華恐難恃會合知何期思惟極長夜夢想若見之如何千秋懽夢覺忽爾違何能同飛鸞去住偕君飛引領意難釋沈思涕沾衣鳴雞夜將旦惻惻誰能知其十房星耀西極天馬産渥洼龍媒世難得被策来中華伏櫪器未展忽云軛鹽車峨峨西蜀山九折道里賒日晏勢頽迫束芻不云加棄擲道南谷長鳴若咨嗟誰能卒恵養猶可凌風沙存誠齋潛鱗泳淵深游翼摩髙蒼積實塞天地流行極昭明寥寥太初人一氣涵混茫成性善自持藴真保其臧子觀思無邪靈府何煌煌碧津湛華月太宇昭天光我願沐咸池乗雲憩扶桑逍遥卧松雪暨爾歌瑶章送開學臣還河南解綬違辟雍揚舲赴京洛長雲驚嵗晏别我愧離索興懐靡夷届餞宴悲執爵鴥彼盼飛翰髙馳已寥廓嵩丘古竒勝瑶華翳叢薄空谷歸白駒從誰賦場藿紛吾梏形縶宿抱詎如昨悵望紫芝歌投情寄猿鶴題豐城送别圖為張叔通賦秋暘散林木霽景生繁隂華蕋被汀岸輕雲冠遥岑眷戀客遊子登艫屬江潯張筵俯洪流别鵠凄朱琴賔飲豈不盡舉觴思煩襟廣厦構梁棟多才美南金翰飛仰青㝠九萬徴在今歡好良有極来鴻睇遺音送王潤之官陕西逺宦入秦闗雞鳴肅征袂咸陽秋莽蒼古水咽清渭登臨盼形勝立馬慨興廢落日照終南行人在空翠凄涼鄉國念慘淡遊子意孰和莊舄吟遐思眇天外繄余契金石惜别勞夢寐何所更持情臨分乏瓊珮送王貞念之官泉南大厦攬羣材明庭集時彦皇恩暨東海宰牧恵遐縣鵷鸞異棲棘刀尺舊裁練游刄恢有餘審機中無眩卓魯世所希龔黄眼中見紛吾契傾盖喜子勤覿面接愛畏暌離凝情遲祖餞江楓丹落日野菊黄逺甸孤帆天末杳驚雁雲中斷佇立思蒼茫臨風寄孤嘆鍾山曉晴圖為尚書生陳宗進賦靈崖多幽姿朝日射翠微丹黄冒其顛絳氣蔚以彌璨璨梵王宫朱甍儼崔嵬雲光發天藻綴户紛陸離遐瞰極鴻濛元和囿天倪瓊英灼三秀玉樹交春荑我願酌石髓駕言候安期天門正鳴鳯菶菶梧桐萋華峯晴翠圖為牟銘賦素抱白雲志未諳林壑居闗山緬河華夙昔悲馳驅奔峭入天府斷崖當空虚青㝠倚臺髙仙掌開芙蕖及此勞夢寐憑軒疑畫圖林巒翳青蒼赤氣紛扶疎彷彿玉女祠霓旌曳雲衢鳬舄如可借終期陟蓬壺送錢仲宜入陜仗劒事西遊雞鳴度函谷黄河駭奔浪三華時在目雲霞爛仙掌旭日照髙陸停䇿望咸陽平蕪際天緑悲涼過秦賦惆悵清渭曲百二壯山河興亡成轉燭我歌歎行邁秋氣紛落木遺玦寄遥思懐人美如玉鎦季鵬山水圖杳杳叢桂咏悠悠紫芝歌青山豈不美嵗月良蹉跎寂寞異城曲蕭條負㣲痾迴巒倚空青崿嶂中嵯峨飛霧洒遥雨層林翳岩阿側見滌煩抱願言與經過牽迫緬脩途濯英想流波佳人邈何許遲暮思如何終期侣麋鹿獨往依雲蘿題陳思禮如在堂大孝慕父母百年即崇晨黄泉邈難及欎欎何能伸惕想結沈憤呼天路無因升堂儼戚容帷箔悲流塵罔極恩難報忍云死吾親肅肅見羮墻欬音日如聞菽水尚得奉肝腸以酸辛躑躅弗遑舍靈思怳繽紛永念膝下歡事亡終我身皇甫志道雙桂軒嘉樹日競爽月華散秋林天香下層雲圓影結繁隂延佇中林士徘徊尚友心虚堂耿中夕晤對成沈吟自聞燕山謡或契郄氏忱雨露日夜滋芳馨嵗年深希聲雖寡和終竟有知音山人賦招隠行且投吾簪送危於幰教授安慶皎皎明月珠熒熒珊瑚樹承恩出畿甸典教任文署長波駕征楫鮮袂望江路煙景際平蕪空濛見楚雨緬懐舒古城夙昔守王度遺烈儼威容孤忠共誰賦𤣥成家業舊振鐸𢎞化澍相望極我思三山水雲暮送李端甫歸覃懐典教出中州趨庭憶河縣長波瀉天塹掛席過淮甸游雲澹飛雨碧樹欎葱蒨豈不煩爾思臨衢極深盼繁華貴知止道養沐殊眷日暮念遊方升堂慰情戀論交我無晚結分誠婉孌悵望王屋雲懐人夢中見送李致周之廣西選秀詣公車承恩任民寄要章聿南騖穀旦傷解袂都門供帳設水驛郵籖備繁吹過行雲驚飊速行斾蒼梧眇遐嶂巨浸極荒裔孰起虞舜思聨綿九嶷翠隨陽笑南雁局促轅下志同是肝肺存滄溟深别意思故齋至道日炳煥靈臺本無私昭昭君子堂棣萼時相輝粤此尚持一居恒敢忘思靜息冀有養動察無自欺藴真含元和微瑩存天彜觴豆日接愛肅雍應塤箎豈不念逸豫於焉勉夔夔般樂有聖訓緝熙法前規永言相爾室式用陳抑詩藥石齋美譽成疢疾嘉言信良規齋居藉藥石古訓安敢違俯仰則先哲脩名保恒彜知非念行邁聞過慎所思善惡紛在鑒閑邪貴知幾緬彼邪佞子攖心喪天倪讒諛一投隙令徳從磷緇屋漏尚不愧箴言求抑詩通山有嘉澤允矣君子思𤣥黙齋解知居化先葆真遊物表嗒然吾喪我道在匪昏窅緬觀四時運萬象紛以兆天體竟何言神行日星皎偉兹順性命靈府謝棼擾斂華杜徳機㝠蹤却虚矯羌吾導壹氣囊括中窈窕極覽鄰泰初無聲契幽眇尚欲保靜専因之寄𤣥要題蘭石缺擬古十首竅鑿混沌死人情迷至公忠信有不偶端行見途窮嘅爾七尺軀便娟難取容宿秉耿介節邪毗紛異同大庭何遼哉磊塊煩心胸其二天地盜萬物萬物更盜之匪盜不成功東陵亦無時所以巢居子軒裳不能羈髙度跨世外澹然守無為桎梏有形内但為此人嗤其三萬物本乎心天人理無違中和致位育舉此臻雍熙遥遥三五人去我胡倐而巧偽滋變幻秉時蹈危機卓矣我尼父喟然欲居夷其四清商變炎候霜露凄庭蕪嵗晏行且至微情莫能攄獨坐念逺道雞鳴夜將徂浮雲莽空荒遊子誰與居引領睇闗塞寸心豈云疎其五大鈞運神氣萬彚各有形弱肉竟強食曷如無厥生吾觀虎狼徒牙爪紛縱横麟鳯世乃稀孰云保休貞惻爾憶善類終悲梟獍行其六落落大宇内古今浩無窮人夀竟㡬何孰能觀厥終萬變日紛更羣行遂汚隆夷叔乃饑死佞壬恒取容我願吸瑶翠後天老崆峒一觀善惡定康哉返淳風其七疇昔登燕臺南望緬江介黄雲塞中區秋氣薄恒岱所悲霜露迫眷此歳華改落葉日夜飛離獸翩翩邁欎欎孰得言愁思渺天外其八楩梓居鄧林崢嶸山谷間中道夭斧斤多才實為患秦斯悲東門園綺走商顔綵繡非不美為犧誠所憚惟彼樗櫟夀浮雲良可嘆其九大道日昭昭物情無所遁圓方奠髙下布指知尺寸天經孰能昧撓我澄源溷心出妖孽生焦灼自成困廓爾保靈臺兼山吾止艮其十勢詐溺流俗翕張相雌雄棧棧荆棘場廣術難我容傲志孰藪澤巢林仰髙風遺榮保精誠憑化觀始終坤用了不秘氣機妙相從守此豈云亢寧悲吾道窮易水渡朝發良鄉城驅車經易水沙鳴風飛揚日晏雲四起登臨弔荆卿惻愴悼前軌尚想擊筑情捐軀報知已畏天小事大為國資道揆曷展匹夫雄居焉圖寸七燕丹事不成秦帝當世恥至今河流聲鳴憤猶未已我行慕英俠悲嘯哭山鬼死者不可生嗟哉田光子涿州抱介恥儇媚離尤滋慨慷扣閽道無由惻惻辭帝鄉寒冬百卉腓驅馬踐嚴霜晨過涿鹿城驚飈恍沙場息徒用税駕遐眺臨空荒羣山從西来千里横青蒼倚劒事悲咤令人憶軒皇蚩尤今則亡戰伐何茫茫落日笳皷發連營旌斾揚吾行竟何之流止嗟殊方樓桑地故宅近廟落景被層阿崇朝悵行邁停驂得遺廟瞻仰時再拜中堂神物憑古壁蟲蘚壊龍袞尚依然英風緬如在因思炎祚微四海嘆横潰斯地産斯人含𢎞際光大凄其志興復飛羽才敵愾天命茍不違曹瞞豈其對我来千載後感激魚水會喬林動靈飊隂洞秘𤣥怪尚想樓桑存童童狀車盖時危兵革浩往蹇昧前戒英傑孰可期陳詞致深酹真定城客行抵燕南獨夜車軋軋斜月耿流光繁星動天末逶迤出深壁彷彿見城闕擊柝接耳聞哀笳向晨發維時重圍解二鎮兵禍結吞噬狥乃私邊隅忍流血防虞此何謂國恥殊未雪感此意惘然悲歌激林樾滹沱河夙駕違鎮都客行有前期蓬飛歳將晏恨恨臨髙岐長河動我前夾岸流水澌需次向晨渡馬鳴遊子悲天寒野無人世梗道路疑豈無故鄉懐辛苦曷得辭貧賤本吾分險艱庸自持嗟哉雲臺勲千載今得知邯鄲訪古慕英俠壯遊過邯鄲連山飛翠来馬首如揚瀾貫酒呼美人浩歌弔平原天空響雲濤野闊凌孤翰憶昔致多士蛾眉去無難賔筵燦珠璣簫鼓清夜闌報効豈無人鶱翻濟時艱蹇我匪脱頴懐賢邈難扳干戈浩縱横長路方漫漫感激詎有已登車摧肺肝磁州市髙原黯平蕪霜重日色死客懐増悲辛行邁日靡靡汾陽跨邢衛雞犬接閭里隱賑富人煙漁鹽喜成市岐亭向朝泊接淅事薪水貫酒慰我徒停驂縱遐視側聞西州事唇齒莫相倚列㦸滿潼闗并吞詎能已同陳仲宣臨漳眺三臺感賦暮雨灑平陸渾漳飛急流停車訪遺趾蕭瑟餘煙丘憶昔炎運否黄星射中州䖍劉矯天威叱咤風雷愁構此睨霄漢憑軒攬壯猷蜀棧小諸葛三江卑仲謀歌鍾綺筵開冠盖紛夷猶詭計棄土苴姦圖照千秋誰憐狐媚情總遺石氏羞老我詠梁甫臨河思綢繆緬懐分香悲敢與西伯儔鬼魅嘯林慮西陵風木颼干戈愴物色行役吾増憂羑里祠陳跡使人感天秋一登臨髙堂肅遺像孰識千古心伊昔植昏暴披猖肆邪淫宫鄰縱金虎大聖逢幽禁縲絏豈我罪天行敢無欽鞠躬待王誅苦節明斷金遐想狴犴艱圜扉欎森沈天昏慘無人殺氣吹㝠隂怨慕日罪已明夷以沈吟至今臣道難帝命惟棐忱明祀仰萬古我行適幽尋蘋蘩愧無奠肅拜偕朋簪白日照殷甸霜風疑遥岑髙歌昌黎詞感嘅徴在今鄴下述懐殘壘宿歸雲鴉鳴滿長洲驚風日夕起倒捲漳河流借問客遊子蓬飛㡬時休沙塵暗長淮風雨迷舊丘獻業不得意征車曽少留此邦古名都控帶綿西州井竈列萬家甲兵當戎蒐以守足固禦以功伐先謀在昔雄武人憑城逞英猷蟻封曹瞞冡塵滅髙懽樓陳迹竟已矣登臨眇予愁側聞轅門開將令嚴如秋斬牲誓貔虎建斾揮蚩尤三明集幕下一羽開遐陬獻馘諒有冀寢兵可前籌而我尚落魄龍鳴動吳鈎功名倘有遂買棹隨輕鷗曹瞞疑冡懐古意激昂河山去逶迤曹瞞世已矣遺冡何纍纍大陸晝晦晏驚飈蕩殷圻我行倦中野登望興遐思國步屬艱難委身濟傾危丈夫功業立忠孝銘常彜漢賊不兩立雄姦當世知遺骸委黄壤千載孰忍欺我欲假六丁伐兹使平夷一洗狐媚恥無將行路疑殷大師比干墓下層城帶河流坑坎延邐迤城門一凝望突兀孤墳峙故老向我言曽聞比干死商辛昔昏戾社稷見傾圯直諫有斯人龍逄事堪擬想當批逆鱗誠惻吐臧否改過冀君情捐生非為已先王我同出去此吾焉止顛覆忍見之含悽向泉裏我来屬多難感激在千禩靖獻人自謀忠仁孰能企摩挲仲尼書朗詠道傍誄𤣥隂黯中陵莽蒼寒吹起他日牧野師誰憐商鼎徙孟津飲馬臨盟津濟河俟横舟天空浪濤急嵗晏風雲愁懐古睇平皋神州浩悠悠憶昔誓白旄師征遏䖍劉軒裳不期来飛斾迷層丘伐暴奉天吏来蘇慰民憂至今川嶽輝尚識鷹揚秋桓武頌日逺興亡嘅殷周干戈未偃息洶洶悲洪流清化鎮驅馬出衛郊羈離嘆流冗窮冬天雨雪所歴涉深恐兹晨過名鎮井屋河山拱天外見戍樓雲旗晝飛動江淮事綿邈闗陜勢奔洶大厦孰得扶時艱百千孔棲幽緬龍卧上乗驚鶴寵行矣拂青萍悲風鼓餘勇福昌寨在宜陽西崤澠通宜陽中條勢聨絡嶄巖福昌寨岡阜相倚薄上平衍千畝下瞰延清洛喪亂設重闗哀笳間鳴柝我行愧青嵗憑覽感今昨秋色滿南雲寒聲殷寥廓蒼茫嵩潁思寂寞采芝約孰與濟時艱含凄嘆淹泊河南露寳寨近嵩州鳴皋地搏壁上層峰乗雲躡天闗風濤鼓羣有九野何漫漫二氣無端倪隂陽自循環河山拱中區萬古情不刋而我一粟微覽之意茫然天地則瘡痍風塵暗荆蠻連山黯巫衡殺氣迴飛翰感往豈不慼悲来愴朱顔白馬峯在河南西名山奠中區突兀倚天半振衣登雲梯奮志凌汗漫攀蘿出絶頂髙步跨飛翰元氣畫淋漓羲娥遞昏旦凝然嵩華敵遐眺越江漢聨絡走龍蛇南行勢無斷吾思平泉逸况乃值紛亂黄鵠招不来憑崖發深嘆宜陽洛南山二十里至楚家莊洛南多青山走勢連二室幽林石巃嵸谷轉峯􅔍欎我行觸奔突登頓迷徑術沍溜發岩光寒隂籠白日况聞避地人陶復相比密喪亂各因依偷生餘臲卼兵戎幾時已撫事傷孱質山空魍魎號石裂蛇蟒出豈復慰曩懐行行悵如失屺思軒甫晬失所恃終天抱餘悲羈艱屬行役感物寧不思晨發踐嚴霜迢迢陟崔嵬鄉閭眇闗河無母吾焉歸憶昔在襁褓劬勞念慈闈成人靡由視下土應含悽眷此意難釋兒生亦何為聿瞻風木號白日無停枝血淚骨中出夜臺杳難期側聞著存訓企彼詩中詞名室示旅瑣敢云忘恩慈揚顯尚有志懐我重民彜來徳堂樹棟非一尋築臺非一尺綿綿詠𤓰瓞長發由厚積偉兹誇名宗衍慶表先徳奕葉方著華所因誠自昔基深業從大淵浚流以益何善不流光家聲宜赫奕矧伊奉嘗蒸華構先塋側黙佑克有馮名堂敢忘澤析薪貴負荷敷播冀成穡来者尚滔滔雲仍幸無斁晚翠堂斂跡抱幽貞仰喬托髙木遥軒挹飛爽壯節時自朂菀兹虬龍姿盤踞出空谷落落千丈隂氷霜散繁綠孤雲自棲泊野鶴與吟宿不逐桃李顔飄颻古城曲多君守中素砥行跨流俗堅白恥磷緇髙風企孤竹秋濤響天末華月照蘿屋亦欲振余衣相從斸黄獨送李鉉應辟勸駕起英賢首途肅征斾都門冠盖盛穀旦惬良會繁箏愴離曲清吹動浮靄飛雨濠上来淮隂殷蕭籟我歌思寥廓子舞情慷慨九萬竚南圖蜚英振文代守節巻壹志礪誠操嵗寒心不移歸酅企前軌粤有先民彜憶昔結嬿婉百年以為期貞剛皦秋陽造次日靡違慨君溘先露妾生亦何依撫棺罄悲號同穴分所宜君母儼在堂君兒且孤遺妾死自不重含哀奉親慈爾来三十年終養義弗虧兒長克成立銀章映中闈足以慰所天黄泉豈無知板蕩感周道柏舟風已微申章愧麟筆于以敦澆漓落雲軒華頂拂秋影陽林澹初暉山雲落層軒爽氣吹岩扉黙爾契心賞横琴當翠微飛蘿結松暝雨色涵清池信美子雲宅載醪將問竒雲蘿山房䆗窱㑹幽谷夤緣度迴谿長蘿分杳㝠雲氣恒霏霏眷此賦場藿心和無町畦羡爾事耕鋤斂志時息機翠靄拂巖户開軒延夕暉鶴鳴聞九皋暝色生遥圻洗酌適吾適懐人奏金徽商顔豈獨逺矯首歌紫芝養浩軒正氣塞吾體粤余抱剛貞所保詎不全欿然疑懼并卓爾配道義私忘中自生精𠂻孰可撓以直曷不勝嘅彼鑿厥智羣邪日交萌撫已一有怍清明豈流行善養著軻訓反身亦由誠無將事業棄百體諧天經紀善活水軒雲構倚中谷檻泉溢清池澄源日漼只汩汩恒如斯相彼著道體鳶魚同躍飛往者或以息来者寧若兹所以君子人于焉契天機勵精尚不已進徳維緝熙潢潦嘅無本純誠匪容私猗歟川上嘆行健功難虧紀善志古齋渾沌日以鑿無懐世湮淪鴻飛去我久孰復還龎淳我志慕𤣥古泰初以為鄰居恒中守樸服食遵先民一徳中自樂天行順彜倫慨彼益流偽雕文昧天真薫蒸灼原燎淫蠱疲形神道喪邈難續伊懐誰與伸卓爾體冲素㝠機謝人羣耕餘韻土鼓于以歌熙春寄金徳進助教杪嵗去京國窮冬忽焉臨喬林替繁䕃虚硤餘哀音肅肅鴻雁度遥遥霜霰侵撫襟諒成嘅揆往寧繼今良友阻脩道索居思難任長淮捲飛濤白日時載隂婉嬿冀有托孰為諧夙心式瞻庶不鄙炯誡期来箴送黄伯益應辟即聘與計偕鶱翻屬昌期祥麟久在野靈鳯来何遲蔚此九苞羽神光分陸離覽輝應鳴韶千載誠一時煌煌紫宸宫虎衛森彤墀龍衮日當宁懐賢如渇饑君才師賈生磊落胷中竒夜半即前席跪敷當有禆秋雨霽廣漢征車日南馳彈冠集英游獻酌臨淮湄朋好固繾綣簡書亦難稽雲程會九萬鵾化看天池尚友齋古道日遼闊神交千載心齋居肅遐尚六籍窮追尋賢聖儼生存名言式規箴寥寥景髙行進取期斷金勤厲我所則匪邪吾弗任徳機恒躍如釋度誠所欽耕野伊志大居仁顔樂深仰瞻冀踵武投分徴在今集陶句奉秋壁結髮念善事驅役無停息遲遲將囘步𤣥髮早已白嚴霜結野草落葉掩長陌顧瞻無匹儔素抱深可惜與子相遇来嵗月忽已積竒文共欣賞載醪袪所惑願就留君住樂與數晨夕一形佀有制正爾不能得常恐大化盡前途漸就窄且為陶一觴是咨無不塞贈王繼逺俶儻負竒氣夙聞英達風千金啻一羽髙視平原雄腰佩虎鞶囊劒華煙芙蓉推仁務拯溺急難哀途窮肝膽信所託恩成恥言功而我澹蕩人悲歌仰㝠鴻相逢古鍾離倒屣論心胷長淮㡬萬里瀉入滄溟東季布重然諾魯連邈遐蹤臨岐忍把袂别思凌飛蓬題畫二首碧嶂拂霜雪華堂俯清漪輕飈左右至婉孌芙蓉披隱几看歸鳥鳴絃當落暉無應志肥遯習靜中忘機又嘉木結繁䕃山房抱秋隂開門白雲入爽氣吹森沈惆悵飛羽夕清歌對孤岑誰歟賦招隱興發丘中琴江風山月亭華月上蘿壁江風澹疎櫺金波泛遥渚長夜秋泠泠蕭瑟瀛海思悲歌緬雲屏無彈五十弦恐有蛟龍聽次韻荅秋壁種蕙冀連岡採蘭思滿握冰霜歳云邁遲暮竟何托憶彼鳯與鸞乗時思飲啄重華世難見髙舉際㝠廓揆余胡栖栖孰與乗軒鶴素飡諒為恥飽食慚黍穱俛仰視古人托身寧不怍欎念結芳馨終悲隨燕雀題巢居介行志丘樊斂華日棲約茒堂甫容膝養素契貞樂松雲拂牕牖蘿薜結帷幄崖月照鳴琴天風振寥廓因懐大庭世渾沌時久鑿搆此即巢居淳風誰復作從流厭雕鏤恬思致𤣥爵惟彼一枝安蕭然甘淡薄題學圃大患為有身百年總云遊榮辱自外至謫居亦何尤朝旦致吾勤山園薙荒幽荷鋤豈不倦生理子兹謀時雨夜来過連筒引泉流葵根日已長庶用供晨羞食力良自苦安時固無求申言委天命敢嘆吾行休送官還鄉采采誇鳯毛振振賦麟趾鳴珂久梁苑典璽歴朱邸丰容霽秋月朗譽藹芳芷秀發看妙年鄒枚誠足擬一朝識盈虚道養尚知止援例告還山飄颻返桑梓淮雲澹清夏飛雨戒行李取别向親知浮雲棄如屣晨風駕飛鷁祖席湛清醴潮汐見相思因之懐浙水懐友古詩懐友枉銀鉤思親䖍手澤人倫各惟盡有子表先徳伊昔屬離居天涯意蕭索停雲慨千里洒翰寄芳墨繾綣結遐悰斯懐見膠漆誰云人事異歳月有存没書到感人亡悲吟徒愴惻所欣幸天祜文嗣餘世嫡相見付遺言哀哀淚横臆彜常古攸重鞠育恩罔極字字起親思時從見顔色珍蔵貴瑜瑾百嵗矢無斁薄俗尚可敦濡毫著民則秋壁以詩荅友人夙予尚交友雅志思徳馨孱愉謝煩鄙粤惟君子并投分五十載哲人嘅晨星念兹步前除不見蘭蕙青卓彼傲霜露嵗寒挹孤榮冲素諒有惬老懐誰為傾感之用投贈舉世無獨醒俛仰憶湘纍先猷孰為程飡英願同賦庶以慰竛竮嗟爾造化狭壑舟豈吾情無將陶公句菊為制頽齡送陳訓導丁内艱還閩泣血促晨駕北風襲麻衣捫心子何痛無母將焉歸愴怳歴淮漢徬徨出郊畿闗河渺萬里挹此終天悲憶昔志四方顯揚思有為瞻光豈不美乃爾成長離違養罪莫釋九泉杳難期興懐孰可寫魂魄寧靡知永感慕純孝難忘蓼莪詞惟因情事展聿有昭恒彜穆清堂嘉木繚周垣曲地䕃叢薄華堂澹初旭昭昭紛沃若鳴弦寫幽曠屬詠接芳酌風至穆以清髙興蕩喧濁因懐柴桑逺道在匪㝠漠感物時自欣千齡兹有託具慶堂椿榦菀寒翠萱葩豔朝暘東風澹微和白髮悦且康酌酒介眉夀斑衣映華堂南陔式用續繁祉宜未央申章餘孝思為爾増慨慷居易軒履坦順吾事素行率彜常艱貞矢弗替委命容匪臧嘅彼務㨗鬭靈臺昧天光邪淫日窘步荆棘迷康莊守分未喪義依仁謝讎殃安時諒無尤至理炳以章機械業所恥簞瓢樂難忘興文著居易養徳宜斯堂綠筠軒大隱向城偏開軒種修竹青雲覆炎夏蕭洒森翠玉天聲動靈籟雨色散芳沐始惬君子心髙閒繼前躅嗟嗟武公逺發興在淇澳貞操孰切磋堅持念幽獨秋清石闌爽華月簾隂綠安得和鳯吟從君鼓𤣥曲畸軒矩行守良彜瞻睇誇特異剛貞曷不偶俛仰亦何悸了觀大宇内得喪逐聲利在理已多違同流適増穢獨醒吾未厭直道焉不遂酬酢諒匪難侔天湛中慮丘軻嘗坎壈箕潁誠足企嘉遯嘆畸人漆園非傲吏繹求賦作聖屬睿思操行炳嚴訓心官有所主淺計吾敢狥昭兹方寸危善惡機亦隱寅念日有加脩為分跖舜繄其仰遺徳事至從審順理緒固淵微細尋虞悔吝夸毗誕厥志妄作遘瑕釁弗慮胡有成披猖隕先聞多君秉純儉思逺憂弗近於燦述繹章存誠期自奮送鍾州判任光州純湛溢龍光璵璠騰寳氣彚征拔茅茹賢俊紛在位鍾侯文江彦展采効才藝蜀棧著休聲優遷從内地美兹淮壖州碩畫諧佐治耕墾務存常應為振煩弊江風石林落山晚雲濤翠行矣莫辭勞貽蘭見交義賦得浙江送别大江蟠東區雲塹限吳越連檣互来往利涉由兩浙壯哉潮汐勢神怪日隳突萬鼓喧海門驚濤捲飛雪緬思䲭夷浮沈魄欎忠烈白馬躍中流時猶見旌節君歸且前渡落日蘭棹發弔古豈無懐悲歌向山月送舍人歸姑孰省墓遊宦久王宫田廬悵榛翳慈闈九原恨丘隴誰與治晨興欎南望雨泣傷掩袂謁告遂言還攀號展情事登途適長夏飛斾拂空翠冠盖擁都門遥遥攬征轡江澄采石月目斷青山寺缺揮毫寄離思送王生省兄囘閩愛至路方永别難辭重陳淮山引征棹越鳥隨歸人雨酌意繾綣風琴念殷勤無應二難恨去住餘悲辛題春江送别圖碧草滿江南雜花迎逺渚東風晚来急立馬向漁浦歌餘折楊亂别思黯清酤落日照蘭缺許題大隱處士卷足跡事深栖潛光謝瑕垢仰天曠髙志養素非不偶紛吾瞰流俗甘分依畎畝朝與麋鹿游循常未貽咎務光邈千里巢許斯尚友嵗晏不逢人清謌時擊缶孤風悵流邁峻節世希有述徳聿有懐青㝠仰崇阜惜隂軒績學企聖賢勉脩力難任飛光不我與逝者何駸駸念彼日孳孳俛焉競流隂朝餘搴芳蘭夕擥中洲岑春秋奄代序少壯豈重臨迫爾欎中腸操行明斷金東升眷初暘西景慮載沈常恐白髮至菁華難繼今惕勵著乾象希天聖猶欽興文惜居諸允矣勞我心哭陳助教滄江咽寒流白日黯精魄勁風摧危柯嘅念我心識憶昔奉末契論交託胷臆脩名用斧藻砥行藉䖍飭離居能㡬何豈謂子永隔沈綿嬰宿患千載尚窀穸遺形嗟莫紹隕涕傷毁璧知已今則亡吾生亦何益雲林讀書所層石屹青㝠懸藤施喬木嵐光雜雲氣迢遞起中谷若人志肥遯山崦宜卜築時聞縱經史展巻樂幽獨琴清月當几雨過泉潄玉鳴鶴忽以聞天風激林麓因懐武夷棹雪漲春濤綠安得抱遺篇從君結茒屋送光州鍾尚賢州判之京師展采佐名州攄中樹政績勤勞越三載報政上京國軺車駕言邁飛斾拂空碧鵬運緬天池三千從奮擊蹇余本鄉曲交好非夙昔傾盖論素懐羈艱託胸臆凉雲薄淮嶂悲管觴日夕無念居者思秋期重難覿四明嚴氏於先塋之側作堂祀其祖考名曰永思裔孫敘班良矩求題為賦此一氣接吾身人生本乎祖游魂嵗年逺丘壠翳榛莽以兹軫余念愾慕耿終古邈矣九原深昔容復何覩幸斯敞華構昭穆爰以敘時祀致我思蒸嘗奠清酤嗟嗟焄蒿意謦欬如在户誠至乃著存余懐孰云侮深基仰来徳祉錫昌厥緒永念極滄溟千齡繩祖武友梅軒哲人契嘉遯觀物怡我情薄俗嘅汚鄙眷焉慕幽貞咨爾異衆芳蕭條向巖坰氷霜不磨湼嵗晏恒敷榮尚友實我志素懐惟徳馨載瞻春陽臨百卉日以萌豈無桃李華輕薄未足稱投分與孤結申章副脩名思親圖碧嶂拂煙樹林園翳春暉東風吹白華念我来何遲憶昔去膝下不云長别離違懽踰嵗年慘慘焉不悲晨發陟層丘游雲邈天涯霑襟愴余懐好爵焉敢縻王事日靡盬歸心悵依依南陔庶可續永以存吾思送傅元宗歸金川應辟入天府辭榮歸故鄉髙年願加飡千里遥相望憶昔未識子知名自詞場獻珎羞卞和山谷猶含章暨此文運啓髙岡鳴鳯凰詔書下求賢作者鏗琳琅君才稱老成桃浪翻雄芒吐論繼董賈摛文麗班揚雲路闊萬里乗時冀翺翔屯難胡不虞抱痾耿中腸乃爾念丘首西還沐恩光子月北風厲長途浩氷霜買帆向明發逆浪開舟航匡阜轉彭蠡西山屹南昌旬月定到家梅花滿山莊木落崖谷裏行體形色康縱觀適閒情白髮當壺觴我有紫芝咏雲林思難忘耦耕豈無懐黙爾情自傷行邁有餘興春来煩寄將黄伯聲小立池上碧嶂過微雨殘陽在疎林蕭蕭池上風拂彼丘中琴萬物妙容與誰歟知我心醉後同伯聲有賦書竹上黙黙契真想悠悠息塵機青山如故人與我中林期歌皷𤣥籟作飄蕭白雲飛蒙莊稱達士千載今何之但得飲中趣毋勞嗟夕暉又廓落天地心蹉跎丘中賞古人不可見千載吾獨往嗟嗟鳶魚趣妙領非外奬醉裏黙無言沈思結𤣥想成知縣東洲隱居海甸峙雄姿長洲延迤邐神飈散初旭草樹紛靃靡若人企商皓斂華外聲利茒屋僅數椽安時思樂止閒情狎鷗鳥逺近澹煙水飛爽跂遥岑寒聲靜中起顧予束塵務咄咄嗟未已安得泛滄波浩歌林壑美風木亭子道貴終事百年欎沈憂羈孤自童丱罔極恩難酬晨起陟岵謌徬徨睇松丘攀號仰風枝白日無時休木性豈不靜寒聲故颼飀慨兹愴余懐血淚徒交流天乎獨我棄欲養親難留漠漠下土厚㝠㝠夜何求無將終古恨上與皋魚儔元音遺響巻十
