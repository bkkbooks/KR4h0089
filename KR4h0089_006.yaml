body:
  text: 元音遺響卷六元胡布撰七言律詩崇仁義渡水流南國渡皆同不似崇仁有古風渡口亭田思逺業官家父子濟川功蓬瀛脈絡三山合閩粵車書萬里通豈但口碑傳盛事恩波涵泳表無窮次韻崇仁鄧伯恭知縣見寄南陽聲譽早蜚揚模範恢恢企素王大邑鳴琴遺德化中天列宿爛文光雨添荻澗千林潤門倚春山萬彚張珍重新詩將逸操逺貽藂桂賦髙堂新霽後登城樓長江脈脈瀉隂雷八表雲銷萬馬來南挹軍峰天柱壯東臨閩嶠地維開典章遺物逃秦火草樹餘春長楚材何必新亭淚如雨孤臣孽子豈凡才學劒學劒無成效蠧魚空將然諾重璠璵一雙白璧酬知已萬兩黃金積古書雛鳯雅音希瑞世卧龍迂計失苑廬宋人才辨非無識燕石分明玉不如延平延平神物久淪亡玉匣鉛刀耿夜光自此東門無獵犬懸知去國有屠羊寰中日月驅流電海上風雲擁大荒向子素來諳曲調不勝聞笛感山陽題方壺雲崖圖為后山湯導師賦一片生綃萬里同髙堂相對似山中崖堪作柱支寰宇雲欲為霖布太空金碧光搖閩嶂日松杉聲韻虎溪風陶潛靜裏觀心法蓮漏何煩問逺公為史天然題方壺畫半幅冥濛灑閴寥小山藂桂便堪招嵐飛絶壁千峰曉日麗中天萬祲銷威鳯有巢饑啄竹祖龍無穴蟄通潮披圖老矣滄洲思擬學天然樂一瓢天馬圖為張希悅題駿骨稜稜火鬛分鐵連錢映五花文江南豈有真龍種冀北當空萬馬羣我昔天間瞻步武人今墨素識風雲披圖惆悵憐神物四海猶思汗血勳山中石林苑屋久相依半畝松隂護釣磯自有隴狐延上客不教山鳥怪儒衣清江南下星河近白日西流草樹微莫把柴關掩秋色恐妨孤鶴夜深歸即景霞綵星文綺疊層萬山金翠與憑陵川涵落月寒光早雲淨遙天旭日升北極九門通虎豹南圖一息起鯤鵬非關松菊招陶令本為蓴鱸返季鷹臨清樓詩樓在㑹稽吳越兩山間髙樓百尺俯澄灣落日憑虛縹眇間石壁倚風青鳥下鸞簫吹月玉龍還霸圖猶在英雄夢雲氣俄連吳越山何限興亡眼前事五湖煙水不相關怡雲閣詩為夏簿煥賦白雲城郭接苑簷寄迹何妨吏隱兼總向宅邊栽五栁還從畫裏覔陶潛舊編翠竹裁長笛新染紅牙刺短籖且共區區眼前事明時有道諒何淹偶書四月四日緑竹藂藂護暖沙清溪岸岸帶疏花東風故壘迷雙燕斜日方塘吠亂蛙天地無情悲物化江湖遺恨泣龍蛇壯懷未欲憑流景徙倚青霄淬鏌鋣送人從軍漠漠黃沙障曉氛離離紫塞立中軍三邉虎旅風雲氣七尺龍駒錦繡文齊國金貂加上將漢家銅柱表竒勳朝廷自獻平戎策苑土終當驗爵分去國去國軒軒眷治隆為農寂寂願年豐投金空學屠龍技拖玉深慙縛虎雄斷石土花誰試劒荒臺雲樹自歌風微軀恨不凌霄漢六合乾坤入望中次韻輔州尹長民得消息天使罹禍羣方凋瘵力無餘載毒登年古不如塞上新聞輕使節江南故老望征車許身豈有空攘袂螫手何能遂補苴望斷五雲瞻帝闕欎葱佳氣接青徐次韻張廣文奎得京師消息八荒分壤列諸侯十嵗侏儒擁道周玉壘秋雲浮霸氣金鉦夜月起邉愁自慚劇孟成虛譽恥為燕丹作浪游只合歸山袖龍劒吹簫醉卧木蘭舟釋悶千金裘弊黑貂寒萬里身嗟蜀道難鐵甲虎賁三窟外玉京龍闕五雲端可憐陋巷空彈鋏不見都門有掛冠贏得江湖雙白眼英雄只好暫時看銅瓶按古詩原誤編石床封翠琉璃冷苔花血漬鴛鴦頸回鸞交綺闒京綃疊字連環倒螭影瑶華碧井落夢房轆轤秋聲停夜梁婺娥雲纎亂青淚薤圍裂金絲斷繫老圃老圃葵花曉露稀北堂萱草映朝暉一年春事愁邉過三谷青山夢裏歸聞道楚關無信使中興漢業有光輝黑頭不愧梁江總已旁鷗波築釣磯萬松亭詩為獨孤子雲賦隂隂桑梓石塘斜梧竹林深隱者家素壁嵐光欺野色春江雲影散簷花萬松亭繞冲天鶴九曲池通貫月楂猶共老僧分半榻崑崙峯頂鍊丹砂曉起一并雨聲鄉夢殘越羅翡翠耐春寒遙知叔夜頻搔垢底事逢萌懶著冠千古雲龍心總碎十年塵土鏡羞看長風渺渺青冥闊惟待圖南臂羽翰吳城即事浮槎隱隱逐飛蓬一脈潮來萬水通暫止行雲將霧雨欲憑孤鴈駕天風千秋王氣麋臺冷百里邉聲雉堞空今古興亡固如此青山何似愧英雄自遺自遺銅墨倦飛翰但拂塵埃著舊冠過雨山為磨劒石排雲竹是掣鰲竿地窮大海三江盡天在方池一曲寬何限胸吞九雲夢舉頭紅日見長安淮隂侯墓下殘嬴鹿馬望夷宫亭長恩威起沛中肉食果能天下計布衣何得草間雄恢宏漢業孤墳在覆戴齊王尺土功回首五陵斜日逺行雲萬㸃亂秋空近聞二首銅駝金谷剪蒿萊文物衣冠塹劫灰天下魯連羞帝業江南馮道竭奴才九關蛇虎乘驅掃千古雲龍即㑹垓好向空山望牛斗天文垂曜景圖回又金臺寥落並燕山王氣纒綿虎豹關龍去鼎湖遺劒在鶴飛緱嶺載笙還興唐大位臨藩邸復漢雄才涉草間想見霓旌擁行在五雲紅日照天顔自從自從先帝視同仁四海謳歌萬嵗春豈謂衣冠輕創業不教蛇虎啖生民百年興復乘元氣一舉存亡在大臣夙昔賢才負雄略早披天日展經綸奉答空山處士胥叔丈何必顔壞鑿曠冥誰從蔣徑倚空青萬花潭水架溪屋九曲雲山環草亭大角流光搖璧月中天幕翠點瑶星枯桐剩有南薰曲彈向秋風獨鶴聽雪白龍鱗甲逐西流碎剪瑶華夜不收八面玉峯開素壁萬家銀樹倚璚樓天連弱水三千里人在梅花第一洲幾擬山中尋皓鶴又傳江上失浮鷗訪陳通守介不遇谷口獨尋陳漷洲紫荆門巷萬杉稠靈山杳接虎龍氣銀漢或同江海流塵匣夜寒剸象劒敗垣雲濕釣鰲鈎元龍亦枉山城駕誰卧乾坤百尺樓久隂萬山浮嵐生夕冥老樹撼雨龍鱗腥匝地雲煙連北粵滔天波浪出南溟夢回孤枕家何在花落殘燈酒乍醒一擬狂風掃隂氣明看旭日海門青陪江漢常允小鳯岡登眺麗日橫空淑景開凌風長嘯挹中台江如匹練排雲去山似羣龍擁翠來三月煙花低草樹一培城郭小樓臺王維更有江南思剩把新詩畫裏裁題把釣圖為嚴作義賦碧石嶙峋繞四周冥冥啼鳥數峯秋幾株古木干雲上六月寒泉徹海流狂客袖歸搏虎技修竿坐擁掣鰲鈎箕山本避唐堯讓笑指圖中問許由山城即事一道河流碧繞城纍纍雉堞表干旌殘民避虎當官道甲第圖麟列將營驟雨來時白日黑游雲斷處青天橫對此有懷如土梗不堪孤劒匣中鳴俠烈馬如匹練過吳門杯酒相逢貴片言藥經利已無論命汗血過霜不染痕一死何慚諾公子千金聊報飯王孫冰霜萬里交河道獨騎西來惱吐渾臨川吳道士清溪詩青瞳仙子延陵孫鍊丹羊角之東原華蓋山當磨劒石臨汝水合洗頭盆鞭龍或擊黃金勒馭鹿多憑紫氣軒黍珠去地只十丈第一峯頭尋九門緑竹緑竹秋花啄野禽鳯凰何處憩清隂東山戀客蒼生老南浦遺珠碧海深計拙豈無投鼠器力窮空有望鰲心青冥善養冲霄翮快覩剛風擊捷音無題湘江修竹淚斑斑惆悵重瞳去不還黃道星辰環北極蒼生霖雨在東山長江鴟革風波逺落日漁歌草澤閒天壤相逢無限恨強將軒豁破愁顔觀獵弧矢晶晶獵騎驍草中狐兔半魂銷饑鷹自足隨黃犬倦鶴何知訝皂鵰東里歸心晴嶂逺南天望眼楚雲遙平生擊搏無才力不敢彎弓向九霄冠山隱居為虞還淳賦聞道年來只閉關紅塵不涴緑蓑閒回光搗治周鄞鄂隱水金花遂退還靜裏風雲雙白鶴望中今古一青山冠山境與清都接㑹躡泠然指顧間古木幽篁圖為藍世康賦掣鰲已長連雲幹泛海將刳貫月楂培塿靜忘身世小湖江寬受洑流斜鮮雲拂曙迷青靄涼月分秋到白沙林下可能容杖履擬攜琴鶴過東家答劉惟學見寄半生鼻息吐虹霓袖握文光太乙藜江海十年歸震蕩弓刀千里事提攜無端忌器難投鼠有計開關恥學雞顧我匣中雄劒在感君詩思啓愚迷周柏夀隱居詩學律窮經事已訛鶱飛回首畏矰羅潛蛟入海風濤靜來鳯成巢竹實多爨下枯桐當雅操山中藂桂擬招歌移文不愧重來客千古髙情意若何楊將軍竹所詩將軍玉立萬琅玕九夏清風草閣寒裁管試吹來鳯操培根欲拂掣鼇竿南州文物交游盛北海樽罍氣宇寬頗怪草𤣥終日裏笑談帷幄四民安答楊恭叔見寄抱璞燕然計不諧傾財楚館事多乖連城白璧憑誰售百鎰黃金祇自懷蟲蠧文章淹壯志魚龍江海愧英材感君髙誼垂青眼磊磈心胸得少排題芝峯春曉圖翠微清梵曉琅琅靜裏鐘聲徹上方金粟樓臺通海氣紫芝雲樹發天香道林神駿誇騏驥康樂名山詠鳯凰聞道玉機虛講席西來意㫖印東堂廬山圖路入匡廬望紫霄雲開紅日射山椒喫茶先到東林寺送客不過虎溪橋斷岸水雷留宿艇近村煙火候歸樵畫圖老眼成陳迹拂拭蒼松欲掛瓢答吳志夫見寄海內衣冠頌德聲八閩文物舊知名巢由有道全髙節李杜多才集大成白璧連城方售價黃河千古待澄清蒲輪肯為蒼生起早使簫韶學鳯鳴王若水畫笋竹桃雀圖緑隂籬落引遊絲景物春融萬彚遲老翠拂天無並幹嬌紅照日有爭枝毫端㸃染成幽鳥浙右風流好畫師昨夜小軒披尺素東風淑氣藹簾帷次韻劉二紹見寄夢中之作二首鶴氅寬裁白夾袍泠風直擬太清遨揮戈駐景陽光合舉手捫天步武髙一氣化機號地籟八紘端倪析秋毫鳯麟洲渚今清淺箕踞何妨濯翠濤又緑玉星冠紫綺袍片雲孤鶴事天遨神仙子晉飛鳬逺湖海元龍卧榻髙方寸淵涵虛湛鏡斗牛囊括影吹毫自從識得先天學半夜中峯湧海濤鶴仙枯坐再用韻二首東平仙吏我同袍緑鬢歸休歎浪遨經世文章江漢闊閒居氣岸海天髙胸中萬卷餘孤憤身外千金杪一毫自信天池窮渤澥鯨鯢終古駕雲濤右奉柬又閩楚歸來脫戰袍列仙通籍友盧遨青天劒氣龍光老明月簫聲鶴背髙山水餘清分坐榻風雲遺夢散吟毫卯金肯借青藜杖共陟蓬壺看雪濤右自述又用韻二首奉答虎盤囊映赤霜袍獵獵霞裾稱逺遨星漢河源窮博望魚龍江海識琴髙崆峒老去詮龜策閬苑歸來翳鳯毫自向漆園逢傲吏耳根𤣥籥鼓風濤又夢裏雲霞覲赭袍飛煙冉冉紫京遨璚林碧玉三田暖仙掌黃金一柱髙化氣贅疣歸大幻剛風身世翼輕毫蘇枯不用天瓢滴挽取銀河瀉瀑濤送安上人住資聖入覲雪霽南天楚水新慈航北上泛通津呈橈已擬千人渡見影方傳一脈真猊座香雲開梵宇龍河花雨覲楓宸垂聲已慰藂林望資聖堂中萬劫春慧明二上人皆次鄙韻見贈二首僕復用韻成二首答之髙僧語默道機新每向迷塗示要津總羡惠能通末著那知迦葉得初真丹山鸞鳯依黃道玉殿簫韶奉紫宸直指倘蒙登野老玲瓏巖畔碧桃春右答慧上人照空又皎皎寥天璧月新流光大地燭迷津已堪息影觀漚泡不用當臺覔鏡真道上紗籠騰石馬眼中金屑瞇楓宸荆州此日神交意爛漫曇華劫外春右答明上人皎然璉上人主太平誠實願力金碧一新用韻美之兜率重開此土新黃金樓閣是通津仁周世諦含諸有體絶孤圓湛一真凡聖混融超法網君臣和合藹崇宸㑹看萬善菩提果五葉葳蕤大地春入理問所作先生以髙蹈有忤時政被謫羅網還堪致鳯凰亭亭飛影企朝陽南圖已分添希有西狩何勞獲不祥暗室撫心無少愧覆盆瞻隙有餘光青冥我有冲霄翮奮激清風灑八荒獄中元夕丙辰嵗思親淚盡血俱流綵服心違滯楚囚燈月不孤囹圄夜梟鸞何憾網羅憂楚家亡狖延林木殷子明夷顧匹儔不有司空發寃獄經天紫氣幾時收次韻饒晟秀才見贈二首壯嵗扁舟去五湖浮雲身世卷還舒空懷慷慨濟時䇿底用太平封禪書雲水閒情天宇闊乾坤髙榻世塵疏掣鼇留得長竿在縮手林泉學釣魚右自述又飽聞龍卧蟄江湖天壤閒雲與卷舒祖訓百年髙士傳韋編千古聖人書多君武庫詞鋒徑老我文魔世梗疏九萬亨衢當拭目風雲終化北溟魚右奉答次韻余樵谷見寄字南坡青年儒素耿孤蹤師表賢才服事恭四海言窮羞說劒千金技老困屠龍月來髙樹軒居靜春到空山草木濃同是隱淪知此意為君揮灑散憂悰右自述又羡子衡茒守定蹤神交道義意彌恭草深平野騎蒼鹿雲滿清溪放白龍大角英芒遙拱衛少微光焰拂髙濃自從披誦新詩後悵望南坡企逸悰右奉簡還山壯遊千里歎孤蓬中道知非返故藂浪有才名聞海內秖憑生計在山中清明一掬神仙氣然諾千金國士風不是久無仁及物卷舒心事與雲同黎川李反正有詩表兄劉紹為和章徴余次韻二首江海棲蓬十載餘故林歸興在幽居早聞綵服趨庭孝晚積牙籖插架書泉水清甘刳竹引莆田腴潤帶經鋤新詩剩有超然志陡覺心胸磊磈舒又知君生計有贏餘藹藹桑麻繞竹居林下交游還結伴山中種植已成書苔磯春水誰緄舫席帽秋風自荷鋤此意秖應同逸者寸心天壤缺次韻黃文彥見寄三首達兼恥在英雄後獨善身當道義尊敢藉文章鳴大雅勉為賢哲仰諸昆隱居𢎞景甘棲遁著論虞卿厭坐樊林下閒情天壤闊飛潛何羡北溟鯤其二經濟有時何憚晚文章於道未為尊皋夔王佐如心膂伊吕師臣儼弟昆黃石蟻封隨土壤素書魚蠧在山樊惟餘晉室清狂客漫有才華擬謝鯤其三相從泉石敢辭煩友誼從容德望尊寂寂委金稱管子琅琅鏘玉識元昆歌龍大澤君舒憤放虎窮山我息樊自信南圖運鶱翥風雲終古縱遊鯤次韻劉二紹見寄感興近體二首眇軀中立體無為入道由誠亦有涯常以恕心忘彼咎更于慎獨發吾私風雲化感仁兼濟靈雨亨貞澤溥施天爵克修歸有道名言昭晰豈吾欺又雲卧天行信有為昭昭立極渾無涯二儀孚洽元功溥萬有熙和化育私消息氣機乘理運縱橫象緯柄文施黃中濯濯期通直慎獨持端貴不欺徵君二首山林鐘鼎兩忘情推分天和足養榮胸宇同仁閒宰相文章有道富書生鵬摶一息周天運龍卧千江得月明試鼓無弦彭澤操自然鳴鶴九皋聲又投分林泉遺世情自膺天爵被身榮倫儕豈但齊三士氣岸何如魯兩生秋水襟期通汗漫春風庭户藹虛明不嫌太古天然調𤣥籥參差萬籟聲村居即事百折青山老樹村一川雲氣護柴門空濛矯矯垂天翼江海滔滔活水源蔬飯神清忘肉食茒堂心穩傲華軒英雄過眼迷荒土莫怪先生學灌園宜陽道中禾黍離離長野田風煙漠漠度平川樓臺萬户居無主租賦三農課有年鴟革沈浮將范蠡銀潢消息斷張騫荒村踸踔從迷徑還憶長安在日邉峩冠峩冠左袒白羊裘時向煙霞混道流勳業無情風過耳神仙有分雪盈頭飄飄身世雙龍劒蕩蕩乾坤一月鈎攜取枯桐彈别鶴碧波如練楚江秋鳯岡曉望曙色蒼茫四望昏榑桑雲錦眩朝暾一襟灝爽凌天宇萬里風濤息海門大化範圍包宇宙眇身中立柱乾坤平生經緯陽和力八表終當被晏溫感興二首元包混沌儼胚胎清濁才分化理開一氣曲成森萬有二儀中立具三才修齊道擬前賢並位育功由自已來如此聖人能事畢就中羲畫見深培又天位穹窿地勢低中間交媾育羣黎陶鈞汗漫乾坤洽吹萬參差物我齊四海涵濡杯勺水九州埏埴彈丸泥自從囊括成功用一氣循環表路蹊豫既為冲齊李先生賦南杲之詩威雨吳先生偕冲齊聨璧而至方喜二妙過我適有事城府茶話匆匆及二君子訪彥堂黃先生書樓彥堂與豫有衛國之約俱不果延欵相視悵惘且期重來口占近體以謝并確前盟柬三君子雀啄空庭梧樹涼衣冠聨璧過林塘愧無魯酒延清話謾有新詩賦草堂雄劒夙聞成許諾缺輝光汪汪叔度鄰居好道義交從數不妨再登鳯岡有作南天漠漠楚江明八表光華際太清身在兩間為砥柱望窮千里抱金城寥寥宇宙如無客獵獵風雲似有情誰識謝公珍重意東山髙卧計蒼生次韻臨川許謙維翰見寄二首湖海才名白髮多歸休丱角舊行窩寰區浩蕩推兼濟胸宇清明足飲和談道為誰揮玉塵趨時從自笑金鵝相從愧我為疵癘圭玷由來尚可磨又木杯清潤稱藤槃草屋幽深卧榻安琪樹拂雲丹鳯老洞簫吹月玉龍寒著書未試圯橋履倣古猶裁薛縣冠此去瀛洲如可約秋風攜手駕青鸞答洞陽道者廣修爭似學無為息得貪求是子時禍若許禳天受諂福如可致道容私萬殊不别根荄在一念初萌影響隨若到此途猶有步無中光景自家知答中孚道者二首體為居宅四肢親神氣完全是主人內守謹嚴防物誘中虛靜定發天真英英道萼三田暖拍拍仁風萬象春光景本然如此好熙熙未讓葛天民又得失場中掉臂行陶然人我兩忘情虛懷應物非同俗端坐澄心是養生姤就中孚成渾沌離消無妄見光晶君如不識庖犧畫太極轘轅本異名訪艾逸虛不值二首髙士棲神石室遙獨騎𤣥鶴訪參寥長生寶笈翻金軸延夀丹泉汲玉瓢一縷簫聲空裏聽千山雲氣望中消無因把臂琴窗夕共話桑田看海潮又羽軿飛騖適無方過客留延坐紫房玉碗瑶花新練乳寶爐雲篆夙煎香寰中雅致林泉勝世外髙蹤日月長遙睇青山覿神采泠風重約覲虛皇對酒偶書四首髙樹黃雲際逺天秋風鴻雁滿長川孔融北海無消息安石東山有嵗年夷散自應耽道味經綸誰復踵常編塵埃回首知何限物色幽懷到酒邉其二氛祲冥冥嵗月深鏡中華髮苦相侵非關志士淹忠憤自信仁人蓄素心經緯有程稽往古英雄無夢慨來今惟憑淺酌澆愁酒舒嘯束皋碧玉岑其三平生仁願及蒼生齟齬憂思殆玉成枯槁未蘇霖雨在烽烟暫息海田更榑桑麗日光華近芒碭游雲氣宇清且共芳樽澆磊磈南天昨夜泰階平其四當杯入手莫辭頻一曲清歌四座春世外雲天皆自得胸中海宇遂同仁曼容不飲期成學崇質留行慰養親猶待德輝來下日金苞並照羽儀新次韻劉二紹過上藍訪友二首海嶠東邉眩錦暾幽尋應到上藍村山中酒擬流霞豔席上人如美玉溫琴操九皋招獨鶴劒歌遙夜倒芳樽東平佳句張公谷遲我留題次小軒又天上星辰識少微人間隱者芰荷衣千章老樹雲成幄四面青山玉作圍肖象有懷求築野非熊無夢到漁磯淮南不盡登臨興朗詠招歌䇿馬歸偕表兄劉二紹訪友留飲求書因而有贈二首龍安豪客氣如龍秩秩賔筵異味重少室山林無俗氣桐江水石有遺蹤能詩總羡劉公幹不飲休嫌邴曼容最愛野亭梧竹裏牙籖文史足三冬又歸來一榻卧松雲徙倚簷峰對夕曛月滿溪山尋虎迹秋空牛斗識龍文多君早負青雲器老我狂書白練裙不是山隂逢道士可能乘興換鵝羣次韻劉二紹菊節日與友興雲嶠登髙之作他鄉此日共登臺八表微茫望眼開江海嵗時佳節換山川雲物杪秋來風琴清宴歡朋集鶴髮髙堂憶子回枉辱親親敦世好望雲慚舉菊花杯遊正觀寺次劉紹韻二首黃花樵悴倚東籬碧草廉纖蔓曲池入室早逢僧慧可來遊還共鄭當時山川佳氣寰中勝雲水髙蹤世外期今日上方隨喜去秪應祗樹採三芝又緑竹新編護檻籬清泉緩引放生池拈花已得單傳意彈指何妨出定時牧笛斜陽黃犢下釣臺秋水白鷗期相攜喜共煙霞賞况有淮南詠紫芝遊福山寺老樹繁隂瑣閴寥飛湍百折窵岧嶤仁深苦海非無筏度廣迷津亦有橋薝蔔花林行處見醍醐甘露坐來招絶勝惠逺青蓮社何必匡廬望紫霄入山後復次前韻鷲嶺風雲護閴寥繡峰雲樹倚岧嶤人疑廬阜邀蓮社澗似天台跨石橋陶令已諧開士約虞人何薦大夫招遙瞻錫影回蒼峽始覺鈴聲下紫霄返棹圖野人自愛住江干緑鬢歸來一榻安好樹成林多杞梓狂流入海息波瀾欲從范蠡尋歸櫂更向任公覔釣竿如此青山明月夜扁舟無那劒空彈王鶴林造墨聞道鶴林王墨卿松煙金屑乳瓊英分來羽客丹砂和借得嫦娥玉杵成九域輿圖增煥發千秋紀載覩文明憑君莫入編修館唇吻雌黃失正情元音遺響卷六
