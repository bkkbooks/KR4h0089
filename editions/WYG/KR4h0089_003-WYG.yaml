body:
  text: 元音遺響巻三元胡布撰七言古詩張子𤣥畫梅詩為季充先生賦清河之子鐵石腸寒玉為操冰為裳湘簾風靜小窻夜月澹梨雲飛夢長夢中彷彿孤山下西湖處士知我者弱水茫茫玉笛寒翠禽聲起鞦韆架碎冰和墨幻璚真桃腮杏臉慚丰神一片江南秋水白天香亂擈羅浮春有時半折臙脂顆酒暈衝寒晚香破有時斜抹縞衣籠絶似黄昏澹煙涴補之寫手近代竒清河獨師王㑹稽平生自得冰玉骨脱略毫素囘天機閩南十九徴揮翰萬幅瑶花蒼鐵榦更須蓓蕾待和羮千古圗酸表雄觀䝉山春曉圗為周清之賦愛蓮先生孫子賢置郵三載来杭川軺車盈盈驛騎駛公館一飯無留延畫師乗閒拂毫素萬里䝉山生尺楮家鄰鄒魯邈歸途宦薄閩門澹遊趣故山春明萬彚隂青陽旭日開中林泉分五乳石流淨苔蝕璚崖甘露深琳宫晶熒倚天表絳樹㣲茫接空杳東峯斜月照行人北鄙蒼煙度歸鳥圗中鄉國夢中詩魏闕身心江海思此日職司忠有在他年丘壠孝無違我亦雍丘種𤓰老憂天之人共鄉堡何時一曲望江南同上蒙山拾瑶草題方壺嶰谷朝陽老壺心受李後王筆力肩齊金少海時於毫素灑清泠㡬葉瀟湘發天籟玉鈎金錯勢不同屈鐵盤薄驚神工干將錯莫閟秋影劒羽淅瀝吹霜風緑金莖上日杲杲甘露盈條翠香好掣鼇東海筋榦存待鳯蒼梧繁實老餘梢裊裊干虹霓伶倫取韻成㕘差鈞天九奏欲備薦韶濩雲英相倡隨養䝉濡澤空山道松古梅芳交逸操侵天蔽日㑹有時九夏炎威迹如掃壺子天機龍虎精虚心勁節邈生成隃糜煖暈璚瑶色繭楮寒芒風雨聲置之髙軒光雪墅鳯咮蒼凉楚雲暮玉軸泠風莫巻舒鸞翎神采將飛騖老將歎長風飛沙三萬里漠漠平原戰塵裏漢家諸將氣如雲萬騎飲馬天山水天山水深寒入骨苜蓿經霜吐花紫塞嶂縁雲玉堞長邉秋泣月金鉦起昔年従事將軍青寘顔山石曽刻名前年斬頭八九萬幕南始見無王庭竒材劒客爭交結王公貴人皆折節名譽起身刀劒中勲庸忽在王侯列幸逢聖治罷弓刀得兔猶勝走狗勞不同曲逆遊雲夢錫壤分符表威重畫圗麟閣貌生時裹屍馬革得全歸成功受禄榮㢘退太平金玉寳耆頥間經五原獵禽獸信馬邊場剪楊栁黄沙帶水尚熏腥白骨如山半摧朽始慙富貴在一身萬死豈盡無辜人不惜萬死易一生猶希百世享尊榮死者一一富貴心當得瓦礫變黄金天地生金起爭戰世上黄金不願見清明日作黄雲滿江江樹紫碧草荒城繞流水平原歌哭雜悲驩㡬處松楸裂新紙死者白骨委路岐生者不歸何處所煙華澹澹鳥飛来野田無主生桑梓昔年大官厭粱肉攘攘僕妾衣紈綺尊酒須傾十家産搥楚見血瀝膏髓東鄰無田坐凍餒百草糠籺盡竟死夫病在床子乞食鄉里紛紛説兵事西隣有田牛入官男女殷勤供耒耜徴需不足来囹圄喘息奄奄面如鬼河西大家日求趁終嵗無人戀針指擔頭鰕莱徒紛紜辛苦得錢爭換米三邊百戰矢如雨十室八九驅瘟癘翁死垂頭尚顧子子死父母無全計吁嗟乎天胡不仁豈若假手塗生類就使横屍積山壘銅駝金谷皆荆杞周宣中興偉臣在枉死呻吟眷仁治偏禆戮力建武功上徳有道存經緯小農食飽大農喜樂嵗終身保妻子羈臣拭目瞻治平當使八表皇風被贈龎將軍龎將軍虬髯㦸烈凌秋旻當闗叱咤萬夫勇一語不合輕王臣去年謝事歸東海鶡冠縞衣佩蘭􅉅斛雷手語託素心轉闗濩索通悲灑君不是賀懐智石槽鐵撥雲雷氣又不是康崑崙激流鏦錚金鐵渾玉盤驪珠千萬轉春氷百裂黄河奔髙堂秋空夜氣昏中天月色爛若銀請君别按伊州調不作青衫灑淚人殿前生桂樹金花濕露溶青𤨏玉宫繁手匀秋顆翠隂亂月散香塵十二闌干曉風過驚烏起飛仙子殘舞鸞交枝凉葉翻銀縈玓瓅熏羅被翠鏤搔頭綰鳯鬟鳯鬟羞花悼春逺欲倩春時花滿眼憂且吟寸草爇火林可燃尺鐵鑿石山為穿快劒斫水徒勞割利口詆聾何用言人生所貴推時美萬語不矜一語喜武乙何尤死暴雷盜跖端居保遐紀衛鞅嘗陳帝王道直以霸術符君好向使相容客舍人詎知法令為强暴明君素矜賈誼才時將不偶反見灾當其魯鈍保年夀何物鵩鳥興悲哀黄河不異流清濁一入大海勝杯勺混混魚龍奮頭角跳蝦走蟹相㕘錯行者苦短論苦長邪人邪正祥不祥縦能鞭石填滄海亦有愚公計太行楊妃春睡圗蘭湯濕玉臙脂軟雲螺隨枕腮紅淺漁陽鼙皷夢中驚不似三郎喚不醒亡國冶容留粉墨此夢至今醒未得題方壺雲山蕭寺圗山人行樂溪橋東蒻帽衲子欣相逢相逢相攜成一笑老刹有路山南通山南青瓊十二峯雲嵐列綵蒼景重請君為我激長嘯萬木古壑號天風行雲躡屐度飛磵龍光走潭碧珠粲雄山之神不敢呵物變金沙界長坂長坂迴塘紫篠林薝蔔花香貝葉深歴歴晨鍾翠微出朝光斜切玉山岑一逕浮莎青錦織喬松偃羽寒蛟色金繩耿光揺佛日鐵鳯交簷威梵國世尊寥寥空殿秋龍象慘戚隂風颼山僧逢迎禮闊略遥指寳華當白樓白樓之西小有洞僧伽文釋三千衆瞿曇石上説根源旃檀閣裏㕘疑夢山人瞑坐天雨飄醍醐味冷夙煩消從此靜通成大徹迴頭世火謾焚燒出塵直出塵中幻浪説三途起八難此軀此相即真空八難何曽有空幻畫裏寰區塵眼塵風雲色界幻天真壺仙為幻區中眼難幻區中眼外人題朗吟飛過洞庭湖圗純陽早得莊列術飄然凌空履芒忽岳陽樓觀千萬人望眼依微生恍惚此皆幻譎籠世目神觀一返如轉燭何風可乗虚可憑吹天地影掛粒粟當時寫圗局形肖詩以遣真傳者誚此人應與此樓齊不爾那容海門嘯河山色界非道心囘仙豈泥區中音為君擊節夢中曲八表無倪何處尋道士魏晦初詩混混鴻濛彈丸戲兆形分裂為天地厥初生人自二氣抱一吹萬奠品彚剛嘘柔吸互成體誕靈為物昧常始至士返真宅無滓窮身所受復元理洞以明明削涯涘𤣥根灌溉達軒陛何以誠之心合意逍遥自然湛無際此與晦初非二義子其佩言味道味聽箏堂送朱啓文歸虎林省親秦人破瑟促瑶柱翻作清商去聲譜唳鶴羣髙咽素雲雛鸎語滑烘春樹故家王謝挹風流罷笛徐將玉撥搊桓伊雙手金縢曲風繞鵾弦璧月秋欲鼓陽春和彌寡調髙誰是知音者改撥驪歌慰壯遊白雲冉冉吴山下題方壺寄虞還淳金錯刀老壺胸宇珠璣海散作文章敷五采筆端磊砢金錯刀㸃染風雲噫大塊璚枝矯矯浴月明劒羽獵獵吹秋清千年龍髯老不化㡬葉鳯咮寒無聲金張華館苦欲置購以千金人莫貰殷勤寫寄虞仙家虚堂白日雷霆氣虞仙霞佩凌空翔挟之綃帛虎盤囊臨風莫展青瑶軸㑹化神龍去紫蒼題方壺臨金顯宗金錯刀贈劉二紹卯金飛書子壺子欲覔琅玕寫生紙壺子箧中金錯刀少海天機忍相遺拂開蜀昶古硬黄信筆揮搨騰干將虬枝獵獵閟秋影龍氣習習吹寒芒玉竿蒼涼屈鐵利鈎距生風漲清泚上清宫裏狡獪成題以保成摹筆戲幽軒白石對此君勁節虚心為寫真仙翁帝子俱物化劒羽空餘鸞鳯文卯金珍襲置邃閣太乙青藜映銛鍔披圗長嘯挹清芬天外泠風灑寥廓題王子慶畫開元寺圗吕蒙故宅清溪側山木林林峭空碧千秋化作梵王宫唐年錫以開元額門前喬柯鐵屈蟠階下流水龍遊盤坐開寳月擁金相梵徹雨花飄玉闌丹青傑出蒼山表雲際髙俯青空杪鴻漸遥分一掬泉獅峯不放千林曉松濤入夜亂溪聲燈鏡連宵助月明清淨域中觀小刼金銀色界照重城兹山未許他峰並古塔不讓閩南盛一原堂上演大乗玉璣東序超無證我来亭上尋紫芝名籃兩醉春風期見花解得西來意擊竹因聞向上機畫裏幻成塵境幻具眼良工心手粲巻圗長嘯激清風一色虚空覿神觀背面鞦韆美人圗妾夫二十顔如玉綺户銀窻照華屋屋前桃李花錦團屋後鞦韆栁隂曲百尺䈥竿駐綵旗同心寳帶挽朱絲髙天下地鴛鴦結去月來風連理枝夫今不歸傷獨自翠被春深積殷漬熏香消盡曉帷寒乳燕歸来小簾紫玉雁慵梭瑟上塵金鈿羞帖鏡中春挂絲微染鴉黄淺收淚生憎粉汗匀寥寥雁字雲中度望望羊車去時路不須囘首怨東風背面啼痕灑瑶柱題畫緑潤紅殷春似織梁家紈綺無消息百花香底醉遊蜂小院寒輕翠簾窄飛来青鳥栁枝柔戢羽憑風為食謀小物從来操毒蟄未應一啄向饑喉題方壺古木風湍圗為潘真卿賦畸人平生山水癖經行領略多竒蹟見圗何啻坐山樊悦目洗心看水石何物昂蔵挺老株青蒼㸃綴忽成圗天風撇裂起毫素龍氣溟漲當交衢攣拳培塿森凉玉逺挹泓渟湛寒緑飛湍九折天外來萬壑瑶華灑空谷猗惟應龍潛九淵靜者一志安林泉眼中偃蹇柱碧落絶似端倪窮化先畸人流玩有餘暇何意同心在林下老壺仙筆世罕儔半幅瀟湘玉無價山城鑒賞如雲屯寳子新作同璵璠因之毫墨感知己泠風巻送潘黄門題闗河秋晚圗為曽子常賦半生慣作江湖客畫裏青山似相識長憶江南緑樹秋千峰落照摧行色傍水人家草屋深憑闌浩嘯豁冲襟南天漠漠鳥飛盡潮落空江龍夜吟漁舟隔岸縈浦溆莎逕蒼茫入煙路桃花源出武陵溪山閣排風杪秋駐兩翁矍鑠巢許儔崇闗之北茅堂幽登登囘顧蹇驢客撩亂瀑花天際流曽厓竦峭凌危棧絶似青城度盤磵瞿唐豔澦勢東奔鳥道縁雲接西坂掃門古老意安閒覿面雲㟼跨石壇中田金碧開日觀天東一峯横黛鬟野橋流水楓林赤去去迢遥抵沙磧山川今古行路難駑駿同途受驅䇿幻夢塵勞見畫圗却從空闊望寰區浮林俯仰紛萬有一息端倪歸化初曽君好古嘉竒蹟圖史相親置東壁更覔更生和我歌青藜千古同輝赫百鵲圗威鳯髙翔九千仞徳輝不下無餘聞人間鳥雀勢如雲㨿地經天已成陳金苞誰復覩九章耳根啁唽聲相忘不如百鵲入圗畫俛啄飛鳴相頡頏空山老樹清溪曲渴飲膏泉食野粟巢成不用占吉方太嵗何由在窮谷天河搆架嵗一来不雜囚飛盜啅材何年傾耳喜音至陳我六符瞻泰階百鷺圗連雲葭菼汀煙緑雪鳥飛来集溪曲林下幽棲飲啄清虞羅彈射何能逐青㝠鎩翮非無志鵰鶚横秋不厭欲自愧摩天翼南運猶堪刷羽隨鴻鵠䕫龍班班来校序振彼西雝戾清肅容儀燕舞美君臣我客翩翩雅幽淑絶無鷗鳥同棲啄活水魚肥山有粟白衣何啻百為羣一志相攜戀林麓寥天霞散霜月皎一舉冲霄豁心目秖應𤣥鶴共歸来髙結雲巢傍梧竹題倪雲林畫為劉二紹賦昔在松陵識幻霞仙風雅度玉無瑕泖湖秋水通吴㑹攜手同登星漢槎俱邀劒履侯王第玉饍珍鮭濁無味多情紫步袁使君館以髙軒顔緑綺緑綺泠泠瓊作臺流蘇香拂碧霞杯題封烜赫壁間出珂佩琳琅天外来傾心放意塵臺古知我鴻濛事鶱舉至今金骨尚塵寰碧眼方瞳浪相許曉移綵鷁三髙祠青絲蓴脆鱸魚肥雪花水鳥供異饌九醖時傾金屈巵軟羅蜀纈飄巾幘翠氅初来􅄢賔國醉呼蒲璧換黄庭遥見掉頭心不懌却従寳帶望九峯囘橈蕩漾横江龍袁使倚枕髙士醉我獨披襟乗晚風過従小隱湖東曲繞逕蒼梧夹脩竹溪亭金碧帶斜陽一抹飛煙澹華屋青瑶盌薄犀筯輕紫鱗出釜炊黄精明珠屑粉如璚液舌乳西施香骨清琅玕誌刻邾儀仲草聖来游陳盖衆時同緑綺架閣君三珠樹底鸞簫弄轉盼相攜二十年展圗如見雲林仙瓏璁苔石玉在璞偃蹇喬柯龍際天掣鼇長得侵雲幹㡬棄鸞翎入神觀當時筆底覿風雲此日人間竦竒玩東平寳愛如瑶琨以我知心徴舊言千秋交誼悵何釋遥託髙情長嘯軒贈地理鄭升逺博望河源探水磧青囊孤首窮泉脈景純驗此類成書孚子因之相隂宅蓬萊形勢三山壯青海明堂相主客弱流襟帶鳯麟洲射的嵌空出其側中田黍珠為正穴三花結秀呈虚白傍臨君位餘可推堆堆囘囘人莫測君臨仙士側臨人富有賢才禆至徳寰中險曲定背向枯槁㘭凹下青黒犯之逆道戾天經醜類縱横滿家國鄭君學古搜𤣥秘更擬游衍周南北山之西為帝堯蔵周漢闗陜環竒蹟不用聨綿惑九疑雙瞳湛湛君應識咸陽松楸隘蓁莽帶礪河山障區域就中祥雲蟄王氣聖徳文言掞方䇿桀紂遺汚死無後過指虚寢呵幽魄仁人死歸尚何顧七十二冡姦雄坼若從美惡責由來堯舜之子無瑕慝賢愚根本自二氣百爾慎此非祥覿君子小人艮有以孟子期之五世澤君行閲歴由内觀習坎技龍體全式孰肯心田符地靈天下自此民無阨我有清明方寸地中虚七穴相通直君還具眼得真蹤便許名髙列仙籍奉寄林鴻子羽我客樵川方十日君亦入闗尋寓室北橋青眼識同心古寺琴樽話稠密浮雲軒冕委敝屣四顧天壤窮儔匹酒酣長嘯吐虹霓磊磈填胸恍如失君下三山度劒津我留杭邑未彌旬忽聞行李有蹉跌太息中道生緇磷長天茫茫白日曉一氣吹萬迴陽春樊籠豈得繫麟鳯即喜透網遺窮鱗太原冷氊蟄文掾書來羨爾無懐民冶遊縱飲足肆志冲抱灑灑凌秋旻我欲從之路遐阻嵗暮褰裳畏零露明年花栁晉安春握手狂吟醉何處江海間闗人物改往事囂虚難此數風雲遺夢去無蹤俯仰閒情亘終古離鸞别調寄瑶軫餘韻蒼凉繞閩楚何當把袂挹泠風刷羽南圖事鶱舉次韻臨川李進士衡元成見寄并求字二首早嵗相知不相見况聞清譽如郵傳太平經濟蟄英芒江海文章掣奔電鄴侯家學富胸宇世梗都無一毫罥青年虎榜早題名逆旅洪都嘗問絹新詩慷慨慰林下繭紙題封白於練鍾王墨妙我何有彷彿雲煙筆端見倘歸少室掃蓬户拂拭心畫龍蛇展眼中塵俗君所鄙雲鶴遊天足揮遣懐仙有意汗漫期願托泠風一披巻其二弱嵗窺天管中見為儒鄙俚窮經傳一從落魄燕粤來自倚文芒扇流電南圗羽翮風暫息秋水襟期塵不罥謫仙許與神交意下筆㓜婦矜黄絹多君逸思凌穹昊一峡文瀾寫飛練傾胸耿耿付閴寥吾道卑卑時隱見青㝠九萬期簸蕩有翅垂天思一展不然拂袖去城闕長嘯空山百憂遣達人出處貴自然天壤閒雲任舒巻太白問月圗翰林失意辭金馬散漫雄文繼騷雅一種停杯問月情自言舉世無知者盛時冠盖隘神州豪爽巳應無比儔填胸磊磈付杯酒嘯咤風雲江海秋畫圖睥睨寥天表問答深衷契㝠杳當年心事竟誰同萬古茫茫海天小文章英誼八百年貌得玉樹臨風前月明亦有金樽酒此意千秋誰與傳次韻臨川饒䕫秀才見贈法書不可見稽古看石刻孰與辨正鋒如沙以錐畫古人渾朴鄙澆漓俗眼不識隗囂碑授受心傳晉李衛二王咄咄為深知法敗顔栁諸賢輩偽流八法承其次要皆彷彿得緒餘各自成家岐亦異近人聾瞽無師授髙者唐刻鮮有同况敢毫芒希漢魏揮遣於人何所宗君今有學繼騷雅物鑑妍嗤孰云寡胡為蹂雜龍與蛇虎犬未聞能並駕窮源入道自有門逆順偏正歸評論千秋傳後法何在時名濫厠徒晨昏公孫劒器飛晴雪吐沓光芒亦人傑好籠長頸伺周迴勿與癡人談墨訣無為天師為逺峯東堂作秋林僧舍求題老壺畫史擅一代尺素寒芒掃飛黛吾甥幻筆得天機授受傳心貌形外逺公老禪清梵餘扶藜信步猶龍居談𤣥造詣無二致丘壑風雲同巻舒西原雪晴玉為質展拂璚臺耀秋日飛光運肘古墨香㸃染溟漲龍鸞蔚須彌堂堂柱法身性海泱漭川無垠秋林花雨淨如洗茅屋清泉薝蔔村儼然東隠章溪曲翠竹黄花瞭心目青天雲氣徹荒墟相對跏趺小山緑堂中之人緇素流一㸃湛波千峯秋遥情空闊際無相桮渡隱隱凌滄洲山川今古不盡興人境相忘表殊勝還師仙筆圖幻空蕩蕩虚空絶安柄昱方畫贈逺峯逺峯求題壺公學徒真幻工吾甥入室俞方從甥今主教俞方侍弟子妙筆師髙風顒師起詣僧中雄俞方契誼相混融閒來揮灑起斑剥暝色欎渤開鴻濛孤峯南峙表天柱一水東注環晴虹長林草屋倚怪石蒼蘚古磵生秋容隂風慘慄嘯虓虎雲氣下上隨飛龍老禪得此狀無色位置丘壑僧堂中僧堂東隠白雪壁拂拭古意看題封鸞綾玉軸好神采對鏡情忘幻泡空空虚湛湛非影象此意貌得非凡庸因師更覔太古畫羲聖無端一畫窮次韻余樵谷見寄求書之作江波月色環古城榜歌悠悠思濯纓雙魚錦字過眼明書致樵谷通清名掞辭滔滔文翰精混龎正氣師天成謂余草聖如伯英一掃澆漓浮俗驚我自正鋒虚腕生雷奔電繞海沸騰恍如公孫渾脱舞赤幟翩翩漢歸楚流光擫鐵啓迷悟川泳雲飛殆天助為君鈎格展毫素識者其誰儼聲譽神交眷眷遣呵護千里之親如目覩姑山肯枉笙鶴度贈子延年𤣥鹿脯南豐縣丞章好徳贈草書歌走筆次韻答之司徒筆法連城價運腕光芒洞神化三春桑柘老飢蠶六合風雲驅戰馬正鋒屈鐵舒流霆右軍咄咄李衛驚虎卧龍跳迅鶱翥遊絲飛帛潛充盈章君筮仕青霄上墨訣翩翩氣豪爽朅來投贈感相知鈎格傳心無背向蘭亭貯匣古墨斑雲鶴悠悠天色寒鍾王在世止如此餘子紛紛空慨歎次韻鄧子方真人見寄南陽髙士神仙氣家住雲林好山水才名當世李謫仙意義千秋魯連子一杯一曲紫玉簫泠風天外招松喬方瞳炯炯睨萬古浪迹蓬丘憩𤣥圃飄飄琴鶴度璚林笑咤風雲生玉塵仙翁自是黄綺流威稜豪爽凌滄洲遺我織成雲錦段天機不許世人求題畫為張孺文作壯遊汗漫成陳迹緑水青山慣相識老年展巻起遐思魏闕江湖心歴歴茆堂囂虚六月寒漁樵語話臨風湍扁舟同是寄萍梗天地浩蕩心胸寛却從蘿逕通幽谷芳樹環林草為屋碧波如練野橋横有客歸來抱貞獨我昔華髮從神州師彼子長為逺遊河山形勢豁心目浩素耿耿凌清秋西風霜鬢不相待良圗萼草人誰在但見肉從髀裏生那知容貌鏡中改卜居泉石效隱淪始覺半生㡬誤身只今畫裏見箕潁意外脱畧超紅塵悠然之軒有逸士讀書灌畦安所事㝠搜或擬探草𤣥載酒時能問竒字山中雅致惬鄙懐沃洲可買移家来桃花春水武陵路絶似劉阮迷天台太平經濟付年少草澤期頥我同調填胸磊磈不可留散漫髙天劃長嘯髙天指顧雲霞流悵望玉花連十洲他時蓬島邈佳勝更擬元龍百尺樓次韻臨川洪韶九成有贈平生肝膽國士風快意鵰鶚摶青空千秋氣義炳火日過眼浮華非所鍾五峯洪子美徳容浩以炯炯窺瞢瞢朅來投翰秉至公知子學問如麟龍有才棲棲甘養蒙唯感契誼當雲從勉脩天爵歸有道珂珮指日明光宫觀禱即事璧月流光玉臺露青瑶玓瓅三珠樹盤螭鏤篆騰紫霞雲母交窻引霏霧翠仙離離翠羽軿九章迭奏參差璚寥天雲錦遏空碧時雨寳華歸望青𤣥黄太史三天史清心肅神覲天帝祈民福夀考終命善人相延保世世香風灑灑聆至言靜定嘘吸成汞鉛萬山明月出滄海一片秋水涵長天矯首鴻濛禮無上八垠湛湛瞻虚曠轉頭金玉五枝燈一瞬囘光燭無象琴操採薇操彼腥腐為氤氲兮紛舉世而飴之曰趨風而委順兮悼冉冉而危之冀可免於萬一兮顧衷私而違之匪獨善於斯須兮慨大義而歸之山之薇兮潔而肥之既得以療吾飢兮我則宜之採芝操嗟嗟皓天甘彼巖穴肆志游盤以茹芳潔深谷髙陵光被日月非我羽翼豈我喉舌飄颻還山天下勇決邈矣唐虞保身明哲八公操猗歟青紫被體而微兮味以珍鮭充腸而肥兮吞啖腥羶馨香則遺兮玩彼長物清明遂疲兮天錫公其來下兮吸光彩而騰雲螭披閶闔而過北斗兮俯塵世如淤泥示要道之不煩兮澹虚中而無為願相攜於玉京兮惟太清之是歸歌平圃歌帝之平圃連崑丘仁麟祥鳯居其洲堯廷來儀瑞聖世魯狩反悼非時遊先王揖讓化成效天人感格臻嘉猷非時為祥乃為咎不見哲人興古憂聖人出黄河清泰階平甘露降庭醴泉生布卿雲耀景星粤若稽古兆休禎天人合萬化并五常並脩見玉英天則瑞聖何徴元元延佇久屏營曰縱暴以亟盈休傾之否泰可迎肅後塵播先聲鳯凰覽徳輝來庭囂歊息區宇寧聖人出仁風興紫陽仙子歌紫陽玉貌絶世華雲琚羽服擁丹霞翔鳯徘徊九霄上蟠龍步驟五雲車上元仙子同旌輦玉轡苔裳囘南面青䭀還邀紫府仙𤣥棃不逐崑崙宴婺娥纖歌彈月箏雙成妙舞參差璚三十一枝風色勁秋空亂灑步虚聲不分錦衾留洛浦情知霞佩遺交甫一從鸞鶴去西華雲雨樓臺想南楚紫霞仙尉當青霄清心端簡聆囘鑣賜以長生碧瑶笈仙經脈望蠧塵銷佩服仙經食脈望一雙青鳥遥相向别乗綵鳯導飛璚逍遥黍珠騰玉京若之何歌天地昏昏日月薄蝕泰山為陵河海流逆杞人忘憂林類乃賊宋人竒玉卞和寳石離婁掩蔡烏獲無力相逢衢路側欲進詎能前詰屈羊腸坂覆車繼後先保退涉逆流鹿豕為我縁㝠㝠障霧集隂風凄以旋饑渴猶可忍單裾濕不牽願得乗桴浮洪濤日滔天幽隂舞鰌鱔毒唇坐嘘煙願得棲巖穴蛇虺肆蜿蜒惡草尚被藉瘡痍且蔓延西南有古莽不照日月明東北有阜落嘉苗所不生天髙邈難攀地厚載可勝由來雖怵惕既往亦徒行若之何兮憂内平毋以為此傷中情禍有仇綏福有膺劇亂委治實相經滄海桑田終變更理有極否泰符徴西王母歌雲和琴瑟飛瓊弄青鳥鸞繙曉通夢夜光珠綴九霞冠王母親傳密香送上元六山火玉佩緑金之笈丹景㑹辟非更出紫錦囊酒闌五鳯鮫綃隊俯觀流景念濁世貴富浮榮等汚穢紛拏外景織深衷蔽障靈光城郭敝促今成古烏兔走蟻壤營營不囘首生生天元具大有飲澹除華㡬人受東方暫之紫泥海歸遣明生拉隂宰揮呵雷霆用不難抱一還元致交泰重以千年女鹿脯碧桃杯寛納區宇清涼五内消隂滓一真冏若超今古不惜真詮泄至道六甲靈飛確皇寳直從虚湛復本元歴刼吾當錫仙誥新霽後望西山作曉雲城闕霽宿雨氛埃淨東旭披素光西峯倒圓景山川庶物秀洪南仙迹竒標昔所探舞鳯三江週沔水奔龍九疊障靈巖靈巖芳潤生佳木楩楠如金杞梓玉楚材幽森挺楨榦楚俗熙和地饒沃繁花媚栁照江城兵後樓臺列將營玉勒曉風看騎氣金鉦夜月靜邊聲陳家待客空懸榻宋室求賢浪得名君山傑閣空中影並峙薇垣代藩屏三川紺緼春四時一片緑雲秋萬頃堂堂考皷鏗鯨鐘浦樹溪林衛㡬重天道宏文垂麗日和風膏雨渥恩濃水國之妖業蜃子劇來禍民干地紀都仙太史夙所𨽻天帝錫以長生璽玉淵飛刃馘潛妖鐵柱中流遏洪水下感遺黎樂道真至今江海淨無塵雲中雞犬通仙路畫裏牛羊識幻身壯遊跼蹐留吳越仙景參差殊未謁何意南來作楚囚新亭舉目白蘋洲鴻門玉碎羣雄散芒碭雲空王氣收此景此時傷偪側填胸磊砢紛如織孔聖因知北鄙竒謝公遂愛東山屐東山屐齒躡青雲時止時行道不羣為君一掬南溟水天下蒼生滌垢氛毛將軍古劒歌炎精烈烈赤幟王手掣匣龍威四方澤中巨蟒迎刃斷玉碎鴻門并楚漢鋒霜濯濯不居功年深玉蝕紫苔封芝山名將應時起神物啓閟涵秋水純鈎太阿同冶歐卞家餘材琫蒼虬剸妖刳佞靖六國毫芒不動臙脂坼置之金鏤螭錦囊批鱗擫匣騰晶光平津望氣勞心力雷令於官竟何益爭如脱頴少年時今日髙堂佩陸離願俾將軍夀金鐵寰宇清澄似明月還樸歌為許從善賦二儀奠位清濁判舒為萬有羅輝煥三才設造無纖竄兆形賦質枝縁幹以情矯偽物欲亂知覺既生渾龎散至士悼世不返汗示道析理囘迷誕葆靈於體止流漫教出師成從侃侃上徳佩服内凝浣下愚笑毁忽而慢猗歟許子夙昭貫懇懇求師走江漢立雪止闇夜達旦求已元元畫爻彖用為風雲守成算斂蔵韜神保和緩八方軌則等浮幻掃掠痕瑕入神觀一真湛冏復虚綄柄斗于北當南看天人恢拓固無間還樸澄澄理彌粲與隱者陳洞陽論三教我昔放白鹿天行杖青藜雄文烈焰照萬古勢局軒冕披雲霓皋䕫無文不識字堯舜言傳心法是衰周季時民異心坦途蔚開柱下史乃有仙風皷㝠漠宏儒上智優不作西方大言理則同聖者以之捷徑中我乃從容即交萃因知三宗不在外調笑文章天地間流觀豪傑風塵内亦有當世䇿恥陳封禪書時命若腐草光輝燭泥塗囘視色身幻長物何纏縈一貫唯達道逆氣求長生爾來九萬嵗得之無為天下寧瞭然區㝢中蟻壤八極何營營鯤化之南有天池泉脈湛湛波淪漪自從一掬洗心眼飛光天門射紫㣲胸中培塿累萬億囘風電掃了無迹崑崙西出榑桑東月出月落經天中鳴龍嘯虎風雲表仰髙鑽堅入㝠杳宏之芥子六合寛斂之穹壤一塵小亞聖三月不違仁西來直指心在身漆園實得息起踵數子理見超凡倫要當脱略凌萬仞明如青空擊秋隼衆人萬語畢一言獨於黙者領本原能方其體用其圓何不世外行觀天敕勒歌敕勒川環隂山氊作穹廬觴酒弦彈牛羊萬計各有羣動有禮節情逾真土風渾龎徳澤熈淳視民如已一體歸同仁地偏西北庶類殷中國聖域何能馴王子喬王子喬緱山笙鶴望亦勤分明舉手謝時人蔑彼天子貴獨善愛一身嵩髙山三十春道成飛馭玉臺津拉浮丘覲紫皇排閶闔凌昊蒼黍珠遊樂殊未央王子喬棄仁而不為身謀已多仙道誠樂矣嗟爾遺民顒望何長相思三首長相思久離别此身雖逺情還徹一寸心千愁結羌笛怨邊秋離人倚樓月鯉書歸封斷雁錦迴文滅其二長相思久離别單于臺上伊州月玉帳寒金鉦徹三年故國人百里隂山雪暮雨塞塵黄哀笳隴雲咽其三長相思望歸難羅幃斷夢㡬時還欹月枕掩雲鬟紅樓春尚淺翠被曉猶寒滴堦朝雨絶淚眼不曽乾同熊經彭聿宋季陳介陳亨嘉陳景夀遊翠雲闗得磵字手䇿緑玉杖嶙峋涉天梯雲峰峙六合面面翠鬟低我昔乗風陟武夷俯臨三十六曲之迴溪嵐花霧彩漾空碧摩蕩日月相交輝長松百尺大十圍怪石嵑􅙙虬龍飛空山無人風落木半夜月出青猿啼東平劉生劃長嘯手中龍泉電光繞三山鸞鶴不可留一片行雲入秋杪璚軒逍遥君玉頰明珠紅笑指白石洞揮霍雙青龍為予歴陳華與嵩天台南來雁宕之髙峯膏泉輸并注其下奔馬萬仞開鴻濛雲闗雙穴天河通捲浪八極周崆峒乃聞異人演至義毘羅法門開不二二士從容獨後來龍蛇翰墨雲花墜西來老翁追莫及石樓青虚壁鐵立照影空潭得月明掉頭歸去天風急念我三生主玉林天下名山諧夙心自聞躍馬泉中柱恨不一覩鏘璆琳屈指十年滄海變逍遥君登九華殿予亦騎龍擁翠鸞東歸麻姑尋紫壇長年青䭀飯食實翠琅玕飛來紫霞凌羽翰竦身忽在青㝠端一皷剛風挟素月列峯照眼金斑斕白馬秀出雲林山爛銀查堆如彈丸卓筆之峯出其右手接南斗挹囘轅攀蘿縁石坂汲水松花磵笑殺鶴上人吹笙碧桃晚三時玉女吐蘭臭九門霹靂巨鼇吼隂崖風雨碧波涼潭底雷文赤蛟走脱我紫綺裘因之雙佩玦濯足巖下泉凌空掃瑶雪莫碎白玉斗且拂珊瑚枝山花與醉客何處不相宜請君看取天目之西陲嶄然枝傾天崿頽人靈八百萬不啻一土抔請君看取崑崙之北角萬斧昆吾不能斫巨靈一劈迹如削亂鬼衝風六時作一山一水直萬錢且復對此酣歌眠黄河九曲猶清濁泰山髙髙荆棘天致身福地人中仙何用戚戚悲流年願從置酒三百斛一斛為君揮百篇贈瞽師吳炯中君不見文成將軍叶五聲京房易學窮三星管公器識薄何鄧蒼生已信誤寧馨我生半生江海上河圗星史多招訪十年歸濯三谷流思得異人歌逺遊五峯吳子好才氣逺来談天折經緯黄鐘律厯森玉衡紫微天元發金記生死之門三十六子盍居之迹仙躅帝恐泄道隕厥身可憐雙瞳如滅燭文成京房非至人子今内養充陽神河海形勝瞭衷曲堯舜之主巢由賓小儒行蔵安足云大聖厄宋窮蔡陳當時天地快一擲金盤采奪萬人勲功成治定潁川水尚友赤松攜列子垂天鎩雲㝠漠間子能相從海上山若遇少年天日表髙歌此曲豁心顔烏生八九子城上烏夜棲城頭樹城頭樹弱枝本輕棲飛不定啞啞聲強承彭澤飯示靈方朔經火流王屋瑞幕集楚師傾一年乳雛將八九毳毛纔生剥黄口棲冠昔在曽氏先墮翼長驚羿弓後雛多巢轉狹風髙葉早凋時啼御史府直填織女橋不學奔波覆車粟却歸空城身局促月明無枝猶有樹鷹隼飛来驚不去隴頭水山隆隆路疊重哀笳沈落月空吹裂悲風驚沙起隴雲隂隂覆隴水不是隴水聲辛酸千古萬古英雄流淚血至今幽咽不曽乾惻惻篇問子何惻惻杯水吞舟苦崩迫仲尼一人在魯國刮眼刳精不之識後世乃有秦始皇操弧挟矢坐天堂先王禮樂成灰燼下愚黔首安可當上古之世鴻荒民中古熈和雜澆淳仲尼遑遑来相弔三月愁眉不得伸何况萬人掩坑穴足一蹴踏燕趙裂逸翮雲横四海秋大旗風掃六國血魯連恥帝東蹈海李斯挟書西入秦上蔡獵犬歎丞相望夷鹿馬惑國君沛中劉生好隆凖烏合一舉當九門躡足附耳䇿雄略天張雲巻登乾元量能恢宏布大恩子孫王業四百年殘嬴豈無萬年計大寳猶多一再傳獨漉篇獨漉獨漉水濁見月水濁可澄心濁傷明泥深道苦挽行無侣非不獨行獨行多虎蒼蒼長松獵獵大風客有所懐如青天虹明明旭日横天東出鵬羽鎩秋陽光若失錦繡入火文章膏煤火滅成塵不異藁灰驥發遲遲志在千里刀不斬仇孰以施利嵩嶽何髙海水何深穹壤其極不如寸心鰕䱉篇戢戢鰕䱉如塵如毛自江達海逐浪乗濤終然假水力江海任逢遭揚鬚播鬛不盈分毫列隊排波得志滔滔乃復笑潛龍養志事天遨屈身濁水湄風雷走江皋魚目皆見哂鰕䱉軒軒勢相髙欲見葉公葉公懼豫且制我於兒曹鉛刀一割利誰復識昆刀猛虎落坑陷反愧當路獒時來無貴賤天地可能逃行路難四首膝上青桐枝朱絲琅琅金作徽傾君三雅爵皷我九奏泠風辭拂君蒼龍切玉之雄劒解我紫鳯承珠之寳犀繫取夸父西追之白日照以太乙夜光之青藜紅顔不留白日暮凡愚上智俱塵土衆人刼刼眼前榮黔婁取足身後名眼前身後知何用但見纍纍北邙塚其二染玉易改色中心宛然守故白何言㷀㷀傷踧踖素懐因今念疇昔拊劒以浩歌繁星朗朗當天河繁星豈無光不似明月何掉頭咄嗟心轗軻誰能聲折膺天譌還君白馬雙玉璧殫決河流良太息其三鐵網滿江海珊瑚網易求文犀一照水萬里將横流君不見紂寳金玉棄善人死衣寳玉自焚身唐堯三尺土階上八元八凱承華勲殘嬴赫起六國吞魯連恥之去若雲沛上吕翁得佳婿平良以之心使臂入闗但遣收圖書善人相延四百嵗失人難得人易寳玉富國家何曽延萬世石崇金谷園財多𦵏無地誰能滅至寳善人行當起其四苗生萬穗千穗成野草無種日交榮藉令野草可食實田不耰鋤牛不耕東鄰有子業儒術仁義檢身動合律衣不蔽體登年飢才恥周時世見欺不似西家出無賴十八行兇當義師義師一旦遭驅逐身率醜惡横路岐至今家富丁力壯自矜年少五男兒贏餘肯濟東鄰子書生財輕重羞恥明朝人去空茆茨行雲無方不可止閭閻傳笑何班班富貴豈同貧士顔草花苗實異根蔕苗當實時草自殷君看跖蹻負浮美何似仲尼陳蔡間逺如期排閶闔遨紫清長風結佩霞引旌拉禦寇攜莊周觀化八紘逍遥遊跨東海濯洧盤酌漿斗柄長闌干澆沆瀣和隂陽臂挽六龍駐三光翻雲笈閲寳書潛啓九籥窮天圗伏絳闕祈洪私請君遐齡民夀期弭患􅊣登福嘉天下普洽國無譁帝憫誠聆昌言卿雲翔空當九門錫璚醴勞玉筵惠慶繁祉益夀年服宏徳顧子民荅天忠君孝養親母自孽冒毒機生蹈五常死不違陌上桑清箏且徐徐聽我歌羅敷羅敷入豔里閭提籠采桑當路隅使君停五馬顧問何温如黄鸎自啼蝶自舞羅敷有夫君有婦此身肯學野鴛鴦豈得提籠自采桑妾家夫婿侍中郎黄金為門玉作堂腰間碧雪鵝肪佩耳畔翠雲魚鬛璫人人矜妾佳夫婿雄才英英照天地生来一諾重千金人誇金張竊獨鄙夫才婦色兩恢諧各有節義臨身乖使妾家貧成獨處夢魂亦繞青陵臺君早去莫延佇君妻肯采桑亦有道邊樹道邊車騎眼中花何不迴顧向君家上邪榮公爵幽石卿寵厲氣感類從上下同體正以正觸邪邪以邪矯正汚流引濁源曲木無端影申商髙位弊國政李斯濫刑秦祚罄仁虐俱抱材道合必授柄衆楚咻齊君尚攸宜善善惡惡毁譽交譏㝠㑹從心物自来根荄符契理不違君誠好樂下委隨善淫鏡鑒萬世規吟東武吟弱穉讀古書十三知大義訓習粗可觀傾鄉值戎事十七從征戰隨軍謹溝壘自懼弛負勞不敢廢文史楚楚揮翰成措辭通性理十九客閩師顒卭四方使嘗挟金鏡䇿上窺唐虞際亟欲洗囂煩廓清掃氛翳既冠責成效侃侃牧庶類宏仁願亦溥志大竟乖惠圓方世齟齬徳惡異倫擬鷹犬血爪牙鷦鷯則林避長饑信陶詠餘富徴黔謐匪曰恃末才儒先委時棄風雲息胸宇澤濟韜涯涘聞道一何先未老心如醉貞情安晚節虚冏挹仙氣向来滯形迹囘顧析非是何歎失東隅桑榆良有遂次韻許維翰見示龍虎山吟三十年来憩龍虎天闗地軸相騫踞就中真靈呵護神仙居𤣥圃閬風無閒住陽平治𨽻青城山飛度此地成還丹温温鑪鼎崛起仙巖畔綿綿嗣系欎羅班千有餘年猶龍宏教起累朝錫號侈爵四海崇髙美至道忘忘湛一真至人無我為元始輔元翊運禆化工竅補混沌天玲瓏竒山射的峯巒似怪石鳯麟洲渚同鬼工絶巖呈巧搆龍井古壑開幽宫以誠投之致應格有物往復施報無終窮塵湖琵琶接突兀雲林白馬拱衛當成功天上地下三十六一轘轅中幻海屋太和元化體同仁一氣相親自敦睦吾甥眉宇真天人帝錫玉笈金宫籙金宫籙集百祥臻五福臻五福公侯名爵位神仙不與憂患承天禄麟角吟歌我麟角吟傾君熊耳材堂中三千士一一笑顔開君不見蔡丞相曷鼻巨肩不可向躍馬食肉四十年富貴何曽有形狀又不見漢黥王輸作驪山為叛亡羣雄躡足定楚漢兔死鳥盡良弓蔵人生貧賤多論議龍飛虎變知誰是伊尹從來五就湯魯連畢竟羞秦帝長城三萬里禍在蕭墻起碩儒無事向遭坑亭長何曽識文字天長地久今如此黄河清濁皆流水不見愁雲咽隴頭何限英雄眼中淚去亦不足惜來亦不足矜但願髙標迴白日春花秋月醉良朋黄金堆山嶽美酒為君酤北斗作酒杓東海作酒壺勸君飲君君莫辭風雲感㑹在須臾何乃局局悲榮枯當使功成拂衣去攜取西施遊五湖元音遺響巻三
