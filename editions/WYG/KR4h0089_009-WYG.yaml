body:
  text: 元音遺響巻九附元張達撰太和篇龍興汪生索賦一氣未肇判太和渾絪緼如何盤古氏琢喪揚囂塵遂使末俗下居然昧常倫上窺太和際邈若蕕與薰汪生富春秋惻惻一問津拜父濠水湄涕涙盈衣巾事母竭甘㫖色養終冬春太和署軒屏庶類同厥身階庭芝蘭秀水木魚鳥親人生茍適意豈計富與貧我来屬多難感子厚意陳要我賦太和令我愧無垠不覩太和事焉知太和淳身違太和時心存太和真舉手謝太和相攜歸隱淪義婦辭為王佐妻萬氏作結髪事閨閫盟心同死生如何中棄捐不得長合并邇者被嘉命校藝赴吳城臨岐重寄託肅穆候親庭㫖甘毋或缺旦夕善寢興斯情靡有違庶用慰徂征豈不戀兹愛所憂在國程自從分别来魂夢但怔營歸途冒霜露果為二豎嬰百藥鮮一效良工徒折肱拊膺哭九京白日昧光晶蒼旻胡不仁妾身獨㷀㷀婦人失所天貴富何足榮生命雖云艱獨生寧自經跂予慕髙躅感此雙涕零時俗薄倫敘骨肉猶相輕何况合恩義焉識墨與繩夫有忠孝誠婦有義烈稱清風播萬古粲粲垂令名太史采篇什此辭良可徴君子齋巻為邵文斌作卜地結華構夙昔嚴興居諒哉成徳士秉心恒晏如弃置塵俗累玩守聖賢書斯文未墜地小大任巻舒自匪不器資焉能識㡬微篇章契道真觴酌陶情娛晞髪暴暘谷潄齒臨清渠放意横八區俛仰貴不渝徳業日已崇庶用復其初允矣君子與廓然霄壤俱十一月十九日題原上鳴脊鴒僶俛思急難如何二十載恂恂遘憂患綵服明曉日菽水怡令顔諒哉致婉愉朂率無間言前除風雪交北堂霜露繁紫荆日萎絶華髮萃九原陟岵獨延佇復誰念覊艱載歌棠棣詩惻愴摧肺肝夢二子集慶城中寓所江水淨篹篹鯉魚俱遡遊歸鴻盡北嚮不為報安否前者附書去到家應一月空有上林期翻令消息絶昨夢中男至仍似昔時癡殷勤論家事十問九解頥稚子笑相語遥指江頭路記得月圓時阿爺從彼去悽悽猶逆旅欵欵疑歸家妻孥各會面歡笑還咨嗟覺来失所在摸索空宇中蓬屋荻為户颯颯来悲風人生寄百歳我今已過半俛仰夢幻間浩歌發長嘆題成和公義字説成子有至性端居常晏如名言謹佩服肅穆古制初濟物懐恵愛秉心無鉏鋙温温春陽集藹藹衆卉舒耕鑿肆餘暇還讀案上書有時忽而笑掩巻重嗟吁得意任所遇焉知毁與譽荷鋤蓺芳甸把釣臨清渠客至供脱粟採掇園中蔬上堂具甘㫖炊黍膾鮮魚且復自懽樂瀟灑送居諸顧慚覊旅士學問靡所儲安得從爾游講習暫依於朂爾慎所趨慰我離索居贈别魏士昭南遊積雪直川陸河流沍氷澌僑居已傷懐言别復此時我切桑梓念子志風雲期出處雖殊致寵榮應自知驚飊蕩六合曀曀隂霾垂羣動悉奔伏衆卉紛攘披登陟一瞻眺白雲在天涯朂爾慎所持以慰居者思斗室詩蕭驛丞索賦甲寅二月濟南堰頭鎮蕭侯任天性脱畧違氛垢築室清河濆容膝僅如斗竒懐曠緬邈廣厦知何有月色淨庭除波光揺户牖興至即髙歌客来每沽酒篇章互酬答翰墨紛左右十年守一官不厭清塵後退食詠康衢那能計榮朽怡情步芳甸延目睇層阜澹然至人心外物信芻狗雲山深處圖金谿何氏索賦山色逗竒秀雲光澹冲融斯游日成趣幽杳焉可窮樂意魚鳥適曠懐猿鶴通讀書長松下斸藥林藪中體倦時一息閉闗保𤣥冲于焉謝簪紱即爾徂春冬羽客衒豪素揮灑寫清風何當解塵鞅嵗晏逺相從雪夜感懐雪霰大如拳風吹墮檐端鏦錚迸萬瓦令我心苦酸跼蹐敗絮中徹夜不成寐譏裁今昔事直欲迴天地梁温有率土原憲無置錐兇殘必軒翥忠信反離披感念五情熱狂呼呌蒼昊徒然宰化育不肯均覆燾那得寫此曲逺寄雲中人竒懐莫汝訴誰識明月珎忠賢啓壯圖達士乗逸興意適自為娛功成孰能並而我且僵卧棲棲無與儔何由共攜手繼此清夜遊期爾各努力僶俛加飡飯時来倘會遇式副平生願雜言四十九首大化運亭毒三光燭乾坤氣機往復来一理妙屈伸咨爾萬物育流形見陶甄綱維孰云是主宰道固神其二隂陽始清濁萬物邈以分不有聖神作天工誰與陳盤古代主宰庖犧肇人文仰觀則懸象近取譬乃身允矣立民祿財成盡經綸其三神農教耕稼所重在民食軒居垂衣裳端拱作民則休風扇五帝堯舜興讓徳舉世躋雍熙曽何知帝力其四大禹拜昌言夙聞精一語帝鴻既以抑受命主中土吾聞𤣥圭錫明徳日斯普尚憶胼胝憂江流思萬古其五桀紂棄成憲炰焚恣淫威有邦起仁人大旱興雲霓惟彼湯與武征誅適逢時南巢放獨夫盟津鑠王師扶義匪貪位奉天恤民痍猶聞夷叔議叩馬以陳辭其六泰伯恥翦商泯蹤去宗國文王有天命終不失臣職小心日寅畏羑里聞演易惟彼至徳稱宣尼誠感激其七六籍著聖道昭昭日行空仲尼茍不作萬古誠昏蒙吾觀春秋成經世由至公斯志倘有遂興周在其東夢奠豈虚垂百王仰休風其八力政弊强秦商斯廢王道焚坑事誣天失鹿宜不保所悲炎劉興制作徒草草當時去古近遺意尚可攷云何事茍簡亂政乃循蹈遂令三王迹泯没如電掃安得起兩生從之展懐抱其九八政先食貨裕民為國基農桑茍不給禮義焉所施所以制民産先王有恒規一夫或失所慮患起細微鴻雁賦中澤王風始云衰相將念嗷嗷流冗斯可悲其十五典係彜倫降𠂻有恒性聖人日恭巳命教先庶政欽哉司徒職敷播始由敬振徳時在寛從容俾就正後来何茍簡所好非所令三季嘅澆漓黎民罔興行孰似返淳龎遐遵有虞盛其十一聖人繼大寳心法傳厥中一徳無過差千齡事攸同堯舜相揖遜殷周誅彼兇揆道本無異天行惟至公其十二九卦處憂患巽云以行權居變不失常時中義斯全竊柄事弗順逐君成矯䖍誰云鄭祭仲可與伊摯肩其十三禮樂化民具斯須難去身躬行本敬和制作諧天人鳴鳥以之至土風由是淳夸毗何卑卑經國徒虚文固陋昧常典哇淫喪天真其十四民則具君身形端影斯正聖神治天下所貴能盡性恢綱播𢎞範熙載凝庶政率土咸宅心禎祥播休詠宜彼皇極君自天成永命其十五易道首咸恒闗雎著風始人倫本夫婦外治由内理閨門尚雍睦淫辟罔干紀率禮斯蹈和王猷以成美傷哉牝雞晨乃爾播姦宄孰復戒隂凝齊家先正已其十六天下亦大具匪容小力持無賢倀如瞽詭説焉足隨㢘来昔造佞箕子早見累𢎞血化為碧周網不能支所以元首哲股肱克綱維賡歌戒叢脞萬事良由隳其十七君徳本於學得師聖則然成昭與君疇千古光遺編我愛版築士致君有名言惟學念素志進􅁱若淵泉愚闇基世禍瞽行成自専厥首用顛殞邦家徒棄捐其十八祖龍遊沙丘秦鹿特競獲尉佗入南夷陳勝呼楚澤中原竟糜爛黔首罹鋒鏑世無隆準人誰與拯沈溺芒碭雲氣起長劒誠不忒扶義振三綱休光並四百云何千載下尚力不尚徳其十九貝錦進輕翾家邦逢酖毒觸龍誠成佞桀惡彌以沃傷哉龍逄死松社走麋鹿殷鑒諒匪遥舉行一何酷㢘来煽兇禍大聖遭僇辱玉馬忽朝周誰云罄忠告尚憶都俞音天風𦕈鳴玉其二十詐力有時盡戰爭自遺患佳兵誠不祥其事乃好還秦人昔虎視項氏初入闗猛氣讋六國雄風拔河山屠毒慘未已燎原恣兇殘不戢竟自焚哀哀誰與憐其二十一立國本忠厚推恩王者心文景有遺愛休光到如今吾聞當時詔惻隠由中忱豈但足勝殘田閭免呻吟斯意何寂寞民勞汔誰任其二十二分土古来有哲王務安邊虚内以事外經邦道非然周雅詠薄伐漢兵出祁連天威豈不伸彼土終棄捐卓爾金城畧屯師丐留田持重實逺計武功信由全其二十三霸力見假仁足云輔衰季桓文世不爾周道其久墜恢功却荆楚摟合振凋弊明禁整頽綱朝王興曠制遂令横潰時猶復識名義所嗟原本淺詭遇由小器功烈如彼卑謀為終徇利其二十四三季世下降貪淫日漸寖國風成僭差侈靡斯莫禁權奸務平奪安宴懐毒酖民情滋效尤展轉益以甚傷哉賈生涕痛哭時連衽其二十五漢武喜開邉雄心事争逐鑿空探河源因勢縻近屬大宛獻神馬玁狁潛北谷𢎞矣衛霍功天山繼遐躅中原竟凋弊省已乃多慾不有輪臺音民奚去荼毒其二十六九五位中正聰明不宜昏執疑来讒口持斷開枉門所以負黼扆古来警君身翫彼履隂柔竪閹敢持鈞猶豫棄剛斷審言循偽真終焉喪賢傅漢元成不君其二十七懐寵足喪身饕淫自貽咎多車奔秦鍼窟室死伯有古来功名士器量隨所受匪徳負浮榮焉能以持久黙觀隂陽化消長順常守知止曷不先終焉見臧否其二十八大鵬升天池翼若垂天雲搏擊九萬里茫茫渾埃塵斥鷃日啁啾翺翔止荆榛騰躍不數仞亦云任其真情性不自適誰能安厥身其二十九造父昔善馭抑縦不窮馬鳴鸞日有節轍迹遍天下賤工何拘拘揮箠不遑舍終焉盡馬力奔弊傷解瓦哲人契斯理為治尚寛假艱虞懼銜橛綏撫道安雅億兆奚可窮誰其戒東野其三十為治有大政米鹽非所宜秦皇日衡書勞瘁誠可悲軒后皆垂拱有虞亦無為䕫龍時滿朝皥皥臻雍熈其三十一扁鵲謂桓侯君疾在腠理於時用湯熨所患猶可靡桓侯不深信諱疾忌言已病至乃迎之無能救其死其三十二和氏識秦王又識楚王心三獻乃見刖豈云遇知音我有太古瑟朱絃間徽金一彈降靈雨再鼓丹鳯吟師襄久不作子野亦已沈持之蒼梧野日暮浮雲深掩泣更延佇徘徊九嶷岑其三十三十五讀詩書十六學劒術二十事荒遊揚帆泛溪浡扶桑睇初曉水底見日出鰲抃動三山金光時滅没良遊竟成夢局迹愧華髮安得招鳯麟瀛洲看明月其三十四九達去榛傷險途冒風水窮達理之常所貴端厥履簞瓢樂顔巷帯索懽榮啓聖賢數有竒云何事姦宄乖張越常分負乗致㓙否哀彼幕上巢忘軀輩由已其三十五賞罰奉天心綱常日攸植武公據曲沃以孽戕宗國九伐有所施王誅詎容釋云何東周君刑用乃爾辟一軍俾為侯跋扈竟接迹嗟彼三晉封其来豈朝夕其三十六顯道善天下韜行臧厥躬用舍奚與已疇能保厥中堯舜相授受素王走西東窮達亦自天于時嘅汚隆觖望匪􅁱正宣淫基禍㓙嗣宗何其愚乃爾悲途窮其三十七鼠玉本殊器方言偶云同懐璞過鄭郊周人亦何蒙名實恥不符鳯凰異昆虫宵人負釁戾矯偽徒為恭哲匠有明鑒瑜瑕當類從其三十八嚴陵負孤介巢許見髙志光武昔下之東鄰崇節義乃知風化原信自人主致茍能激頽風孰不恥汚穢其三十九太古去我逺登髙思凄其風雲何茫茫飛羽時安之𣺌莽俯一氣空荒曠無涯蕭蕭寒聲来㵳波増我悲慷慨發孤詠憑虚振余衣其四十典午卑六經清談賤名檢紛紛飾莊老曠逺類行險濫觴自夷甫陶誕行莫掩神州竟陸沈千古有汚玷其四十一陽道貴日舒興邦全士氣哲人嘅云亡家國宜殄瘁傷哉黨錮禍媒孽于漢世羣隂紛内訌排擯先所忌孰不戒履霜艱虞有前備弱齡不好弄蘭畹結芳佩聿慕田子風凜然餘節槩其四十二登髙盼神州觀秀向嵩岱嘯歌風雲起懐古何慷慨年来桑田變嵗月悵斯邁流離阮籍途撫迹傷狭隘獨夜發哀音凄其激天籟其四十三王業昔偏安孔明任開濟鞠躬日盡瘁欲以報先帝方其事經畧謀畫信前計煥矣渭上師姦雄誠懾氣天心胡不祐志決身竟斃緬彼八陣存千秋餘涕淚其四十四二五妙生成馬圖泄𤣥造人文肇羲畫則象存易道吾觀竒耦間至理極冲浩萬化本一原先天豈云老發揮繼三聖神明恣精討九師何區區異論淆醜好其四十五書紀帝王道遺編火于秦嗟哉伏生傳幸益孔壁文六體備明訓昭昭條彜倫雖無百篇完終見至治因繼述有成憲君行本諸身其四十六六義本情性于時見興衰覽之思無邪亦曰興於詩刪定有深意勸懲義無遺兹焉鑒善惡諷詠開民彜齊韓何専門毛鄭徒棲棲至理自矛盾于今傷背馳其四十七魯叟昔成經憲章垂萬世聖人不得位于是見微意悄然事筆削有志文武治是非明天心褒貶達王事麟出豈非時允為春秋至其四十八儀禮備經制周官如合模大哉姬公言文武道在兹王澤日薫蒸漸摩洽肌膚百年禮樂興萬世昭良圖誰云出隂謀蠡測徒區區其四十九負下未易居下流多謗議撝謙不違則悔吝非已致在陳孔何歉居東旦無懟榮辱自外来中虚識明志自矜兆瑕釁妄想服憂悸折翼庸得飛傷行誠罔利所嗟負性險疲滑喪中慮樂善吾敢忘知非仰前智詠懐十二首夜中喟然嘆撫瑟發孤憤交遊徧海内零落殆已盡蕭條感知已飲恨中自隠騏驥不用良秋霜蕙花殞愴愧激清歌衣沾涕徒抆其二把酒勸流景為余駐飛光促中多憂虞世故莽茫茫幽若黯霜露蒹葭睇青蒼登髙望浮雲不見鳴鳥翔塊爾獨傷處秋思凌八荒其三種蓮洿池中根淺萌未樹風波日潛驤華耀寧復吐鳬鷖傷鎩翮悵悵獨爾顧豈無荃與蘅嵗月逼霜露嗟我懐美人逍遥嘆遲暮其四邪徑捷轘轅康莊塞荆榛趨舍既異路誰能復隨羣作苦念田家值兹伏臘辰酒酣仰天呼盡醉同比隣生世聊復爾委身亦奚論其五懸黎出寳匣爛然光滿目宋人貴燕石按劒不爾蓄抱真方什襲待價斯韞匵舉世無賞音何勞楚庭哭其六端居抱岑戚世故繁乃慮身卑動見尤悒欝誰與語出門瞰中澤鴻雁傷落羽寒風時悲號白日窘隂霧寂寞稻粱謀憂来淚如注其七大海渺無際敝舟駕洪流狂飊怒屏翳駭浪興陽侯維楫中道失揺揺寸心愁所具本不素没身竟何尤其八世情靡如意忽忽若有亡欲學廣成子沈憂焉可忘烈火燎中野洪流没川梁經途塞夔虚㝠室悲游光達生茍不然身命何能當其九昔我遊邯鄲悲歌上叢臺黄雲蔽原野秋色南中来愴怳弔陳迹繁華空綠苔平原君不見知已安在哉志士無蠖屈山林有遺材興言惜往日千古餘悲哀其十霜氣肅大澤虞衡方有為緣山置罘罝遐邇寧逸飛列格掩狡兔彎弧墜鵾雞披林踐幽荒探薄窮險巇所中必翮羽流磻豈虚機焉見凌雲雀飄颻極天涯其十一少年負長劒猛志厲秋霜獨見絶衆慮髙翔起遐方燕趙徧轍跡周秦慨興亡河山欎雲飛壯觀思悠揚及此悲局促鬢髪華已蒼樊籠豈不念短翮情自傷其十二闊别慨參商懐思極令晨積憤莽胸臆所親路無因嵗月不我與曜靈下西津零霜衆芳歇鶗鴂徒悲辛杳杳念索處栖栖愧離羣髙山獨有奏牙曠誰其人寄復見心上人杪秋靚遥夜木落中帷響攬衣不遑寐起視明月朗南雲矯鴻雁候氣悽以愴援琴傷我悰懐人嘆河廣憶昔奉末契蕭閒詣方丈清談霏玉屑了悟示天壤眷兹别離久塵務紛鞅掌年華感流邁身世悲俯仰時有東林思何能共来往寄防季潭上人華雨散白日法雲徧空海菩提妙真相厯刼恒不改吾師探天根圓對朗如解澄源滅諸惱掩室時自在汨余游苦波智性日昏騃𤣥闗昧精進六入競沈痗如何久離索執熱孰云灑安得憇旃林西来擥芳茝送嚴鵬飛助教告老囘桃縣解組適閒身蕭條丘中賞故山跨梁宋秋色多榛莽囘車戀桑梓父老共来往伏臘倒樽盆髙歌遞清響孤雲眇嵩少一葦嘆河廣何所見相思長淮沙月朗真意軒欎抱塞氷炭迷陽瘁吾神有生亦懸贅曷若陶吾真大化本自然天君絶纖塵中虚自閒豫畦町徒紛紜我屋此山下開軒緬青雲松風行共逺流水春盈津理至情自適悠然太初民咄爾誰與此懐哉彭澤人其二寂感意彌曠雄觀契天真大塊斯噫氣洪爐煽無垠誰將悟吹萬一理通𤣥根匡坐對山月悲歌入寥旻重闈堂為丁允共題臨川有孝子構堂署重闈誓報罔極恩養志思弗違念昔童豎日豺狼塞郊圻母姙父義死太母是為依提攜風塵際倉卒將安歸迨今幸樹立深仰鞠育慈伯也奉祖母試吏旴水湄季也守桑梓事母竭甘肥各言遂厥志庶使行不虧我聞服髙義盛嘆重歔欷勉哉慎所執始終無或渝觀風倘相及請試陳兹辭讀劉伶傳劉伶好遊山荷鍤嘗自隨死𦵏必以禮殯殮乃所宜茍云曠達懐安用埋蔵為晝夜與寒暑如斯往復之暴骨棄中野銘勛樹穹碑百年等塵土榮辱定焉如往哲或可作吾將議其微贈别施伯暈負疴卧衡宇過客陳苦辭政值九日勝遽興千里思黄華適蓓蕾醁醑復淋漓稱夀捧清酌怡顔舞斑衣于此不為樂居然就分攜長塗積霧壅水陸羅蛟螭舟車一失守悔吝坐相推所以達識者臨岐審先㡬鳯山際漢表旴水赴海涯囘顧山水會白雲長在兹撫膺但延佇握手知能期去矣慎所趨勿為行子欺交柯圖為徐子真作種植紀昌運維善為休徴相期樹交柯居然家道興真契果有驗雙盖供前楹兒孫日熾盛帑廪逾豐盈詩書列髙座青紫羅廣庭朅来四百年世胄飄華纓奈何人事易刼火焚林坰當時古櫧樟一旦成榛荆但見掃地赤不睹參天青空餘風雲合無復虬龍陞應念培植勤載使柯葉榮毋徒玩粉墨撫巻謾勞情曽氏母挽謌辭怕見隴雲合忍歌薤露晞居然壅氛沴溘爾下慈闈令子効戎幕良人事幽棲一朝失所助兩地同其悲涷雨灑長薄驚風蕩交衢情来但感念誰不増歔欷先澤齋巻為黄以實作層構躡雲標偏楹跨風麓珎蔵百氏典巻巻自緘束重是前代人摩挲屢曛旭每常舒巻會悽惋輒盈目憶昔冠學初竒文貪積蓄柰何值變故一旦成蕩覆寇火暨淫霖漂焚棄空谷焉知三十載編帙弗載矚安得從爾遊大觀恣所欲風簾逆朝暾雨楹燒夕燭饜飫九流迷馳驅四庫錄匪惟娛識界且以慰𠂻曲感此復徒然相看反悲蹙揮毫寫新詠鄙吝聊自沃贈黄空明髙士敦古學持心常了了體存虚𤣥初用徹品類表昭示顯沈瞢若鑑靈臺沼匪徒燭曠逺亦弗昧纎小軒農通内典誦説達清曉親知多俊彦名聞著根杪憶昔南州翁引痾苦相擾一裁刀圭劑二竪頃刻剿載感厚意陳揄揚那肯少雄辭聳崢嶸妙札馳騕褭生平慕竒術芳躅無由紹聞此倍欣然臨風首頻矯願言諧宿心行矣襲佳兆歴山祖餞圖贈别蕭郎中之官陕西素楮揮𤣥靄寫此相思緒沙頭一瓢酒酌别秋城暮長安豪侠地在昔矜王度畫諾慎嘉猷庶㡬存畏慕揮手從此辭願言保貞固雖無萬里途何由重會遇漠漠秦川雲離離歴山樹貽爾慎巻舒豈為誇豪素贈别孫思明穴蟲辨隂曀巢鳥驚早寒所以知微士不為異患干孫侯抱利器射䇿来吳關楊葉已百中錯節試一刋春風動歸興慷慨懐悲酸稽首謝絳闕掛冠趨考槃方舟晚相遇意過平生歡倩論發幽賾脱跳盤中丸視彼昧㡬者孰能識其端浮雲翳大壑短水翻長瀾君歸適歡會我往足憂艱岐路一分手壯懐良已彈釣水步清淺采山陟㠝岏斯遊儻可遂酌酒開芳顔齋居有感遥遥萬里道恨恨千古心人生駒隙間胡乃苦其身庭除滋碧草桑梓翳白雲髙齋掩扉坐時聞簷鐸聲對月月光爾何榮覆地寫我形我形無汚雜我心自清明願得生翅翎九萬隨鵬程大風浩泠泠扶揺遊太清夏至聞蟬有感昔嵗值兹晨聞蟬在齊郡已畏别期賒還憂日方永予今卧鄉國妻子得相省却念平生言愁来愈難整秋齋夜卧有感俛黙抱愚拙空齋獨掩扉清風入牕户明月下床幃念彼林居叟行行深夜歸何言躡髙躅徒使寸心違夜遊竹間憶髙士葉季文竹裏風月好獨遊深夜時月光與竹色鑑映無塵緇我心政如此清興適在斯那得意中人復此同襟期寄廬山陳汝言林卧疏塵事閉門春草深東風偶然来披拂壁間琴感彼動中意􅀈予靜者心坐看西日馳落景惜頽侵我本楚狂人望氣江海隂南来託孤劒然諾唾千金豈不眷勲庸而甘與浮沈當世屬大度志氣尚難任皷刀矜餘力叩角有知音何必蹈東海功成還舊林夜思痩骨榻痕清虚堂蟲響小怊悵萬古情朦朧一牕曉古意驪龍頷下珠光彩奪明月所適盡惛朦孤忱向誰雪感遇我有一寳劒鋒芒照膽寒無人能識鑑留取自家看元音遺響巻九
